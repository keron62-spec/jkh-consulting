<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amplitude Demo | Jeremy Harrilal</title>
    
    <!-- Modern Amplitude SDK (v2) with your API key -->
    <script src="https://cdn.amplitude.com/script/61a7757800aeb4ea0e6f5471d9af5704.js"></script>
    <script>
        // Initialize Amplitude with configuration
        window.amplitude.init('61a7757800aeb4ea0e6f5471d9af5704', {
            fetchRemoteConfig: true,
            autocapture: {
                attribution: true,
                fileDownloads: true,
                formInteractions: true,
                pageViews: true,
                sessions: true,
                elementInteractions: true,
                networkTracking: true,
                webVitals: true,
                frustrationInteractions: {
                    thrashedCursor: true,
                    errorClicks: true,
                    deadClicks: true,
                    rageClicks: true
                }
            }
        });
        console.log('✅ Modern Amplitude SDK initialized with API key');
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 16px;
            font-size: 2rem;
        }
        p {
            color: #666;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-secondary {
            background: #48bb78;
            color: white;
        }
        .status {
            margin-top: 32px;
            padding: 12px;
            background: #f7fafc;
            border-radius: 12px;
            color: #4a5568;
            font-size: 14px;
        }
        footer {
            margin-top: 24px;
            font-size: 12px;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Amplitude Analytics Demo</h1>
        <p>Click a button below to see real-time event tracking in action.<br>Each click sends data to Amplitude.</p>
        
        <div class="button-group">
            <button id="signup-btn" class="btn-primary">📝 Sign Up</button>
            <button id="demo-btn" class="btn-secondary">🎥 Request Demo</button>
        </div>
        
        <div class="status" id="status-message">
            Click a button to track an event. Check the browser console (F12) for details.
        </div>
        
        <footer>
            Amplitude Implementation | Jeremy Harrilal | Modern SDK (v2) with Autocapture
        </footer>
    </div>

    <!-- Custom Event Tracking Script -->
    <script>
        // Wait for Amplitude to be fully ready
        function waitForAmplitude(callback) {
            if (typeof window.amplitude !== 'undefined' && typeof window.amplitude.track === 'function') {
                callback();
            } else {
                setTimeout(function() { waitForAmplitude(callback); }, 100);
            }
        }
        
        waitForAmplitude(function() {
            console.log('🎯 Amplitude SDK ready — adding custom event tracking');
            
            // Get buttons
            const signupBtn = document.getElementById('signup-btn');
            const demoBtn = document.getElementById('demo-btn');
            const statusDiv = document.getElementById('status-message');
            
            function updateStatus(message, isSuccess = true) {
                statusDiv.innerHTML = message;
                statusDiv.style.background = isSuccess ? '#e6fffa' : '#fff5f5';
                statusDiv.style.color = isSuccess ? '#276749' : '#c53030';
            }
            
            // Track Sign Up button click with custom properties
            if (signupBtn) {
                signupBtn.addEventListener('click', function() {
                    window.amplitude.track('CTA Click', {
                        button: 'Sign Up',
                        page: 'Landing Page',
                        url: window.location.href,
                        timestamp: new Date().toISOString()
                    });
                    console.log('✅ Custom event tracked: Sign Up clicked');
                    updateStatus('✅ "Sign Up" clicked! Custom event sent to Amplitude. Autocapture also tracks this click.');
                });
            }
            
            // Track Request Demo button click with custom properties
            if (demoBtn) {
                demoBtn.addEventListener('click', function() {
                    window.amplitude.track('CTA Click', {
                        button: 'Request Demo',
                        page: 'Landing Page',
                        url: window.location.href,
                        timestamp: new Date().toISOString()
                    });
                    console.log('✅ Custom event tracked: Request Demo clicked');
                    updateStatus('✅ "Request Demo" clicked! Custom event sent to Amplitude. Autocapture also tracks this click.');
                });
            }
            
            console.log('🎯 Custom tracking ready — buttons will send both autocapture and custom events');
        });
    </script>
</body>
</html>
