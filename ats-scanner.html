<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free ATS Resume Scanner | JKH Consulting</title>
    <meta name="description" content="Get your resume scored by an AI-powered ATS scanner. Instant feedback on formatting, keywords, and what recruiters actually see.">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L3589N2B7D"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-L3589N2B7D');
    </script>

    <!-- Amplitude SDK -->
    <script src="https://cdn.amplitude.com/script/61a7757800aeb4ea0e6f5471d9af5704.js"></script>
    <script>
        window.amplitude.init('61a7757800aeb4ea0e6f5471d9af5704', {
            fetchRemoteConfig: true,
            autocapture: {
                pageViews: true,
                sessions: true,
                elementInteractions: true
            }
        });
    </script>

    <!-- Contentsquare (Hotjar) Tracking -->
    <script src="https://t.contentsquare.net/uxa/5f94e8837c5a5.js"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #6b7280;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            min-height: 300px;
            padding: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 20px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .file-upload {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 60px 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f9fafb;
        }

        .file-upload:hover {
            background: #f3f4f6;
            border-color: #764ba2;
        }

        .file-upload input {
            display: none;
        }

        .file-upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .score-display {
            text-align: center;
            padding: 40px;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            position: relative;
        }

        .score-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
        }

        .score-label {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .score-excellent { color: #10b981; }
        .score-good { color: #3b82f6; }
        .score-moderate { color: #f59e0b; }
        .score-poor { color: #ef4444; }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
            text-align: left;
        }

        .results-section {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
        }

        .results-section h3 {
            color: #1a365d;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        .issues-table {
            width: 100%;
            border-collapse: collapse;
        }

        .issues-table th,
        .issues-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: top;
        }

        .issues-table th {
            background: #f9fafb;
            font-weight: 600;
            color: #374151;
        }

        .priority-high { 
            color: #ef4444; 
            font-weight: 600;
        }

        .priority-medium { 
            color: #f59e0b; 
        }

        .priority-low { 
            color: #6b7280; 
        }

        .strengths-list, .missing-keywords-list {
            list-style: none;
            padding: 0;
        }

        .strengths-list li, .missing-keywords-list li {
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .strengths-list li:before {
            content: "✅ ";
            color: #10b981;
        }

        .missing-keywords-list li:before {
            content: "🔍 ";
            color: #f59e0b;
        }

        .buzzword-item {
            background: #fef2f2;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #ef4444;
        }

        .role-match-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
        }

        .match-percentage {
            font-weight: bold;
            color: #667eea;
        }

        .email-capture {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 30px;
            border-radius: 12px;
            margin-top: 30px;
            text-align: center;
        }

        .email-input {
            display: flex;
            gap: 10px;
            max-width: 500px;
            margin: 20px auto 0;
        }

        .email-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
        }

        .email-input button {
            width: auto;
            padding: 12px 30px;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .privacy-note {
            font-size: 12px;
            color: #6b7280;
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
            .email-input {
                flex-direction: column;
            }
            .email-input button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Cloudflare Worker Proxy Endpoint
        const WORKER_URL = "https://ats-proxy.keron62.workers.dev";

        function ATSScanner() {
            const [activeTab, setActiveTab] = useState('paste');
            const [resumeText, setResumeText] = useState('');
            const [fileName, setFileName] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [email, setEmail] = useState('');
            const [emailSent, setEmailSent] = useState(false);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setFileName(file.name);
                const reader = new FileReader();
                
                reader.onload = (event) => {
                    setResumeText(event.target.result);
                };
                
                reader.readAsText(file);
            };

            const analyzeResume = async () => {
                if (!resumeText.trim()) {
                    alert('Please paste your resume text or upload a file first.');
                    return;
                }

                setLoading(true);
                setResult(null);

                // Track analysis start in Amplitude
                if (window.amplitude) {
                    amplitude.track('Resume Analysis Started', {
                        source: activeTab,
                        timestamp: new Date().toISOString()
                    });
                }

                try {
                    const response = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ resumeText: resumeText })
                    });

                    const data = await response.json();
                    
                    if (data.error) {
                        console.error('Worker Error:', data.error);
                        throw new Error(data.error || 'Analysis failed');
                    }

                    if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                        let jsonText = data.candidates[0].content.parts[0].text.trim();
                        jsonText = jsonText.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                        const parsedResult = JSON.parse(jsonText);
                        setResult(parsedResult);
                        
                        // Track successful analysis in Amplitude
                        if (window.amplitude) {
                            amplitude.track('Resume Analysis Completed', {
                                total_score: parsedResult.total_score,
                                label: parsedResult.label,
                                issue_count: parsedResult.all_issues ? parsedResult.all_issues.length : 0
                            });
                        }
                    } else {
                        throw new Error('Invalid response format from worker');
                    }
                } catch (error) {
                    console.error('Analysis error:', error);
                    alert('Error analyzing resume. Please try again. Error: ' + error.message);
                    
                    // Track error in Amplitude
                    if (window.amplitude) {
                        amplitude.track('Resume Analysis Error', {
                            error: error.message
                        });
                    }
                } finally {
                    setLoading(false);
                }
            };

            const handleEmailSubmit = async () => {
                if (!email || !email.includes('@')) {
                    alert('Please enter a valid email address');
                    return;
                }

                // Track email capture in Amplitude
                if (window.amplitude) {
                    amplitude.track('Email Captured', {
                        email_domain: email.split('@')[1],
                        score: result?.total_score
                    });
                }

                // Track in Google Analytics
                if (typeof gtag !== 'undefined') {
                    gtag('event', 'generate_lead', {
                        'event_category': 'ATS_Scanner',
                        'event_label': email
                    });
                }

                setEmailSent(true);
                alert('Full report will be sent to: ' + email + '\n\n(Email integration coming soon - your data has been captured)');
            };

            const getScoreColor = (score) => {
                if (score >= 90) return 'score-excellent';
                if (score >= 80) return 'score-good';
                if (score >= 70) return 'score-moderate';
                return 'score-poor';
            };

            const getScoreGrade = (score) => {
                if (score >= 90) return 'Excellent';
                if (score >= 80) return 'Good';
                if (score >= 70) return 'Moderate';
                return 'Needs Work';
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>🎯 ATS Resume Scanner V2</h1>
                        <p>AI-powered analysis based on recruiter psychology + ATS parsing</p>
                    </div>

                    <div className="card">
                        {!loading && !result && (
                            <>
                                <div className="tabs">
                                    <button 
                                        className={`tab ${activeTab === 'paste' ? 'active' : ''}`}
                                        onClick={() => setActiveTab('paste')}
                                    >
                                        📋 Paste Text
                                    </button>
                                    <button 
                                        className={`tab ${activeTab === 'upload' ? 'active' : ''}`}
                                        onClick={() => setActiveTab('upload')}
                                    >
                                        📄 Upload File
                                    </button>
                                </div>

                                {activeTab === 'paste' && (
                                    <div>
                                        <textarea
                                            placeholder="Paste your resume text here..."
                                            value={resumeText}
                                            onChange={(e) => setResumeText(e.target.value)}
                                        />
                                        <button onClick={analyzeResume}>
                                            Analyze My Resume
                                        </button>
                                    </div>
                                )}

                                {activeTab === 'upload' && (
                                    <div>
                                        <label className="file-upload">
                                            <input 
                                                type="file" 
                                                accept=".txt"
                                                onChange={handleFileUpload}
                                            />
                                            <div className="file-upload-icon">📁</div>
                                            <div>
                                                {fileName ? (
                                                    <strong>{fileName}</strong>
                                                ) : (
                                                    <>
                                                        <strong>Click to upload</strong> or drag and drop<br/>
                                                        <small>Supports .txt files</small>
                                                    </>
                                                )}
                                            </div>
                                        </label>
                                        <button 
                                            onClick={analyzeResume}
                                            disabled={!resumeText}
                                            style={{marginTop: '20px'}}
                                        >
                                            Analyze My Resume
                                        </button>
                                    </div>
                                )}
                            </>
                        )}

                        {loading && (
                            <div className="loading">
                                <div className="spinner"></div>
                                <p>Analyzing your resume...</p>
                                <small>This may take 15-20 seconds</small>
                            </div>
                        )}

                        {result && (
                            <div className="score-display">
                                <div className="score-circle">
                                    <svg width="200" height="200">
                                        <circle
                                            cx="100"
                                            cy="100"
                                            r="90"
                                            fill="none"
                                            stroke="#e5e7eb"
                                            strokeWidth="12"
                                        />
                                        <circle
                                            cx="100"
                                            cy="100"
                                            r="90"
                                            fill="none"
                                            stroke={result.total_score >= 90 ? '#10b981' : 
                                                   result.total_score >= 80 ? '#3b82f6' :
                                                   result.total_score >= 70 ? '#f59e0b' : '#ef4444'}
                                            strokeWidth="12"
                                            strokeDasharray={`${(result.total_score / 100) * 565} 565`}
                                            strokeLinecap="round"
                                            transform="rotate(-90 100 100)"
                                        />
                                    </svg>
                                    <div className={`score-number ${getScoreColor(result.total_score)}`}>
                                        {result.total_score}
                                    </div>
                                </div>

                                <div className={`score-label ${getScoreColor(result.total_score)}`}>
                                    {getScoreGrade(result.total_score)}
                                </div>

                                {result.recruiter_scan_verdict && (
                                    <div style={{marginTop: '10px', fontSize: '14px', color: '#6b7280'}}>
                                        {result.recruiter_scan_verdict}
                                    </div>
                                )}

                                <div className="results-grid">
                                    {/* Left Column - Strengths & Market Positioning */}
                                    <div className="results-section">
                                        <h3>✅ What's Working Well</h3>
                                        {result.strengths && result.strengths.length > 0 ? (
                                            <ul className="strengths-list">
                                                {result.strengths.map((strength, idx) => (
                                                    <li key={idx}>{strength}</li>
                                                ))}
                                            </ul>
                                        ) : (
                                            <p>No strengths identified</p>
                                        )}

                                        {result.market_positioning && (
                                            <>
                                                <h3 style={{marginTop: '20px'}}>📊 Market Positioning</h3>
                                                <p><strong>Level:</strong> {result.market_positioning.level}</p>
                                                <p><strong>Assessment:</strong> {result.market_positioning.assessment}</p>
                                                {result.market_positioning.recommended_roles && (
                                                    <>
                                                        <p><strong>Recommended Roles:</strong></p>
                                                        <ul>
                                                            {result.market_positioning.recommended_roles.map((role, idx) => (
                                                                <li key={idx}>{role}</li>
                                                            ))}
                                                        </ul>
                                                    </>
                                                )}
                                            </>
                                        )}

                                        {result.missing_keywords && result.missing_keywords.length > 0 && (
                                            <>
                                                <h3 style={{marginTop: '20px'}}>🔍 Missing Keywords</h3>
                                                <ul className="missing-keywords-list">
                                                    {result.missing_keywords.map((keyword, idx) => (
                                                        <li key={idx}>{keyword}</li>
                                                    ))}
                                                </ul>
                                            </>
                                        )}
                                    </div>

                                    {/* Right Column - Role Match & Buzzwords */}
                                    <div className="results-section">
                                        {result.role_match && result.role_match.length > 0 && (
                                            <>
                                                <h3>🎯 Role Match Scores</h3>
                                                {result.role_match.map((role, idx) => (
                                                    <div key={idx} className="role-match-item">
                                                        <span>{role.role}</span>
                                                        <span className="match-percentage">{role.match_percentage}%</span>
                                                    </div>
                                                ))}
                                            </>
                                        )}

                                        {result.buzzwords_detected && result.buzzwords_detected.length > 0 && (
                                            <>
                                                <h3 style={{marginTop: '20px'}}>⚠️ Buzzwords Detected</h3>
                                                {result.buzzwords_detected.map((buzzword, idx) => (
                                                    <div key={idx} className="buzzword-item">
                                                        <strong>"{buzzword.word}"</strong><br/>
                                                        <small>{buzzword.context}</small><br/>
                                                        <small style={{color: '#ef4444'}}>{buzzword.verdict}</small>
                                                    </div>
                                                ))}
                                            </>
                                        )}

                                        {result.immediate_fixes && result.immediate_fixes.length > 0 && (
                                            <>
                                                <h3 style={{marginTop: '20px'}}>🔧 Immediate Fixes</h3>
                                                <ul>
                                                    {result.immediate_fixes.map((fix, idx) => (
                                                        <li key={idx} style={{marginBottom: '10px'}}>{fix}</li>
                                                    ))}
                                                </ul>
                                            </>
                                        )}
                                    </div>
                                </div>

                                {/* All Issues Section - Full List */}
                                {(result.all_issues || result.critical_weaknesses) && (
                                    <div className="results-section" style={{marginTop: '20px'}}>
                                        <h3>📋 All Identified Issues ({result.all_issues ? result.all_issues.length : (result.critical_weaknesses ? result.critical_weaknesses.length : 0)})</h3>
                                        <table className="issues-table">
                                            <thead>
                                                <tr>
                                                    <th>Priority</th>
                                                    <th>Issue</th>
                                                    <th>Location</th>
                                                    <th>How to Fix</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {(result.all_issues || result.critical_weaknesses || []).map((issue, idx) => (
                                                    <tr key={idx}>
                                                        <td className={`priority-${issue.priority ? issue.priority.toLowerCase() : 'medium'}`}>
                                                            {issue.priority || 'Medium'}
                                                        </td>
                                                        <td>
                                                            <strong>{issue.issue}</strong>
                                                        </td>
                                                        <td>
                                                            <small style={{color: '#6b7280'}}>{issue.location || 'General'}</small>
                                                        </td>
                                                        <td>{issue.fix || issue.suggestion || 'Review and improve'}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {/* Score Breakdown Table */}
                                {result.breakdown && (
                                    <div className="results-section" style={{marginTop: '20px'}}>
                                        <h3>📊 Score Breakdown</h3>
                                        <table className="issues-table">
                                            <thead>
                                                <tr>
                                                    <th>Category</th>
                                                    <th>Score</th>
                                                    <th>Max</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr><td>Header & Contact</td><td>{result.breakdown.header_contact || 0}</td><td>10</td></tr>
                                                <tr><td>Keyword Density</td><td>{result.breakdown.keyword_density || 0}</td><td>20</td></tr>
                                                <tr><td>Quantified Results</td><td>{result.breakdown.quantified_results || 0}</td><td>20</td></tr>
                                                <tr><td>Action Verbs</td><td>{result.breakdown.action_verbs || 0}</td><td>15</td></tr>
                                                <tr><td>Formatting & Structure</td><td>{result.breakdown.formatting_structure || 0}</td><td>10</td></tr>
                                                <tr><td>Skills Section</td><td>{result.breakdown.skills_section || 0}</td><td>10</td></tr>
                                                <tr><td>Length & Brevity</td><td>{result.breakdown.length_brevity || 0}</td><td>5</td></tr>
                                                <tr><td>Publications & Projects</td><td>{result.breakdown.publications_projects || 0}</td><td>5</td></tr>
                                                {result.breakdown.recruiter_scan_penalty !== undefined && (
                                                    <tr><td>Recruiter Scan Penalty</td><td>{result.breakdown.recruiter_scan_penalty}</td><td>0</td></tr>
                                                )}
                                                {result.breakdown.buzzword_repetition_penalty !== undefined && (
                                                    <tr><td>Buzzword/Repetition Penalty</td><td>{result.breakdown.buzzword_repetition_penalty}</td><td>0</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {/* Email Capture for Full Report */}
                                <div className="email-capture">
                                    <h3>📧 Get Your Full Report</h3>
                                    <p>Enter your email to receive a detailed PDF with all findings, personalized recommendations, and a complete action plan.</p>
                                    {!emailSent ? (
                                        <div className="email-input">
                                            <input
                                                type="email"
                                                placeholder="your.email@example.com"
                                                value={email}
                                                onChange={(e) => setEmail(e.target.value)}
                                            />
                                            <button onClick={handleEmailSubmit}>
                                                Send Full Report
                                            </button>
                                        </div>
                                    ) : (
                                        <p style={{color: '#10b981', fontWeight: 'bold', marginTop: '20px'}}>
                                            ✅ Full report will be sent to {email}
                                        </p>
                                    )}
                                </div>

                                <button 
                                    onClick={() => {
                                        setResult(null);
                                        setResumeText('');
                                        setFileName('');
                                        setEmail('');
                                        setEmailSent(false);
                                        
                                        // Track new scan in Amplitude
                                        if (window.amplitude) {
                                            amplitude.track('New Scan Started', {});
                                        }
                                    }}
                                    style={{marginTop: '30px', background: '#6b7280'}}
                                >
                                    Scan Another Resume
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="back-link">
