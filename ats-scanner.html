<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ============================================================
        // CONSTANTS & CONFIGURATION
        // ============================================================
        
        const WORKER_URLS = {
            STANDARD: "https://ats-resume-only.keron62.workers.dev",
            COMPARE: "https://ats-proxy.keron62.workers.dev",
            AGGREGATOR: "https://ats-aggregator.keron62.workers.dev",
            FOUNDRY: "https://ats-foundary.keron62.workers.dev/extract",
            PDFJS_EXTRACT: "https://ats-pdfjs-extract.keron62.workers.dev",
            AZURE: "https://ats-parser.keron62.workers.dev/azure",
            STAGE_2: "https://ats-stage-2-parser.keron62.workers.dev"
        };
        
        const FILE_SIZE_LIMIT = 10 * 1024 * 1024;
        const REQUEST_TIMEOUT = 30000;
        const JD_CACHE_KEY = "jd_keywords_cache";
        
        const RESUME_BUILDERS = {
            'createfreecv': { name: 'CreateFreeCV.com', rating: 5, label: 'Excellent', class: 'rating-excellent', rec: 'Highly recommended - produces clean ATS-friendly PDFs' },
            'microsoft_word': { name: 'Microsoft Word', rating: 5, label: 'Excellent', class: 'rating-excellent', rec: 'Gold standard - use "Save as PDF"' },
            'google_docs': { name: 'Google Docs', rating: 4, label: 'Good', class: 'rating-good', rec: 'Good - use "Download as PDF"' },
            'canva': { name: 'Canva', rating: 2, label: 'Poor', class: 'rating-poor', rec: 'Avoid for ATS - injects obfuscated code' },
            'novoresume': { name: 'Novoresume', rating: 1, label: 'Avoid', class: 'rating-avoid', rec: 'Not recommended - known to break ATS' },
            'unknown': { name: 'Unknown Builder', rating: 3, label: 'Unknown', class: 'rating-poor', rec: 'Test your PDF before applying' }
        };
        
        // ============================================================
        // UTILITY FUNCTIONS
        // ============================================================
        
        function safeRender(data, renderFn, fallback = null) {
            if (!data || !Array.isArray(data) || data.length === 0) return fallback;
            return data.map(renderFn);
        }
        
        function getScoreGrade(score) {
            if (score >= 90) return 'Excellent';
            if (score >= 80) return 'Good';
            if (score >= 70) return 'Moderate';
            return 'Needs Work';
        }
        
        function getCredibilityLabel(score) {
            if (score >= 90) return { label: 'Highly Credible', color: 'high' };
            if (score >= 80) return { label: 'Credible', color: 'high' };
            if (score >= 70) return { label: 'Moderately Credible', color: 'moderate' };
            if (score >= 60) return { label: 'Questionable Credibility', color: 'moderate' };
            return { label: 'Low Credibility', color: 'low' };
        }
        
        function getRiskBadgeClass(riskLevel) {
            if (!riskLevel) return 'risk-medium';
            const level = riskLevel.toLowerCase();
            if (level === 'low') return 'risk-low';
            if (level === 'high') return 'risk-high';
            return 'risk-medium';
        }
        
        function calculateInterviewLikelihood(result) {
            const ats = (result.total_ats_score || 65) / 100;
            const fit = (result.fit_score || 60) / 100;
            const credibility = (result.credibility_score || 65) / 100;
            const alignment = (result.semantic_analysis?.alignment_score || 5) / 10;
            let bloomMultiplier = result.bloom_analysis?.bloom_multiplier || 1.0;
            bloomMultiplier = Math.min(1.25, Math.max(0.75, bloomMultiplier));
            const positionScore = Math.abs(result.semantic_analysis?.position_score || 0);
            const semanticMultiplier = Math.max(0.5, (100 - (positionScore * 10)) / 100);
            const qualityScore = ats * fit * credibility * alignment * bloomMultiplier * semanticMultiplier;
            return Math.min(25, Math.max(0, Math.round(25 * Math.exp(-3 * (1 - qualityScore)))));
        }
        
        function getInterviewFlag(score) {
            if (score >= 20) return { text: "🚀 Apply Immediately", class: "flag-deep-green" };
            if (score >= 13) return { text: "✅ Strong Yes", class: "flag-strong-green" };
            if (score >= 8) return { text: "👍 Yes", class: "flag-green" };
            if (score >= 3) return { text: "⚠️ 50/50", class: "flag-orange" };
            return { text: "🔴 Consider Other Roles", class: "flag-red" };
        }
        
        function getApplyRecommendation(score) {
            if (score >= 20) return { text: "🚀 APPLY IMMEDIATELY", context: "Top 1% of candidates. Perfectly positioned." };
            if (score >= 13) return { text: "✅ STRONG YES", context: "Top 10% of candidates. Aligns well with requirements." };
            if (score >= 8) return { text: "👍 YES", context: "Decent match. Minor improvements could help." };
            if (score >= 3) return { text: "⚠️ 50/50", context: "Long shot. Strengthen your resume first." };
            return { text: "🔴 CONSIDER OTHER ROLES", context: "Target different level or strengthen significantly." };
        }
        
        function detectResumeBuilder(junkPatterns, text) {
            if ((text.includes('xmp:') && text.includes('rdf:')) || junkPatterns.includes('stream_operators')) return RESUME_BUILDERS['canva'];
            if (text.includes('/Creator( Microsoft Word)') || text.includes('Microsoft Word')) return RESUME_BUILDERS['microsoft_word'];
            if (text.includes('Google Docs')) return RESUME_BUILDERS['google_docs'];
            if (text.toLowerCase().includes('createfreecv')) return RESUME_BUILDERS['createfreecv'];
            if (junkPatterns.includes('random_strings') && junkPatterns.includes('metadata')) return RESUME_BUILDERS['novoresume'];
            return RESUME_BUILDERS['unknown'];
        }
        
        function analyzePDFQuality(text) {
            const numbers = (text.match(/\d/g) || []).length;
            const letters = (text.match(/[A-Za-z]/g) || []).length;
            const ratio = letters / (numbers + 1);
            let score = 100, issues = [], junkPatterns = [];
            
            if (ratio > 0.7 && !text.includes('xmp:') && !text.includes('rdf:') && text.length > 500) {
                return { score: 100, is_clean: true, needsFallback: false, issues: [], junk_patterns: [], stats: { total_chars: text.length, numbers_count: numbers, letters_count: letters, junk_chars: 0, clean_chars: letters } };
            }
            
            const streamMatches = (text.match(/\b\d+\s+\d+\s+\d+\s+\d+\s+\d+\s+\d+\s+d1\b/g) || []).length;
            if (streamMatches > 5) {
                issues.push({ type: 'PDF Stream Obfuscation', severity: 'high', message: `Detected ${streamMatches} PDF stream operators`, fix: 'Use "Save as PDF" instead of "Print to PDF"' });
                score -= Math.min(25, streamMatches * 3);
                junkPatterns.push('stream_operators');
            }
            if (text.includes('xmp:') || text.includes('rdf:') || text.includes('?xpacket')) {
                issues.push({ type: 'Metadata Injection', severity: 'medium', message: 'Embedded XMP/RDF metadata detected', fix: 'Export from Microsoft Word directly' });
                score -= 10;
                junkPatterns.push('metadata');
            }
            if (ratio < 0.4 && numbers > 300) {
                issues.push({ type: 'High Noise Ratio', severity: 'high', message: `High number-to-text ratio (${numbers} numbers vs ${letters} letters)`, fix: 'Use Microsoft Word → Save as PDF' });
                score -= 20;
                junkPatterns.push('high_noise');
            }
            
            score = Math.max(0, Math.min(100, Math.round(score)));
            return { score, is_clean: score >= 70, needsFallback: score < 60, issues, junk_patterns: junkPatterns, detected_builder: detectResumeBuilder(junkPatterns, text), stats: { total_chars: text.length, numbers_count: numbers, letters_count: letters, junk_chars: text.length - letters, clean_chars: letters } };
        }
        
        function highlightJunk(text, junkPatterns) {
            let h = text;
            if (junkPatterns.includes('stream_operators')) h = h.replace(/\b\d+\s+\d+\s+\d+\s+\d+\s+\d+\s+\d+\s+d1\b/g, m => `<span class="junk-stream">${m}</span>`);
            if (junkPatterns.includes('random_strings')) h = h.replace(/\b[A-Z0-9]{4,8}\b/g, m => `<span class="junk-random">${m}</span>`);
            if (junkPatterns.includes('metadata')) h = h.replace(/xmp:|rdf:|rdf:Description|\?xpacket/g, m => `<span class="junk-metadata">${m}</span>`);
            return h;
        }
        
        // ============================================================
        // COMPONENTS
        // ============================================================
        
        const ScoreCard = ({ title, value, max = 100, color = null, badge = null }) => (
            <div className="score-card">
                <h4>{title}</h4>
                <div className="score-value" style={color ? { color } : {}}>{value}</div>
                <div className="score-label">/{max}</div>
                {badge && <div className={`interview-flag ${badge.class}`}>{badge.text}</div>}
            </div>
        );
        
        const FlagList = ({ title, flags, type = "credibility" }) => {
            if (!flags?.length) return null;
            return (
                <div style={{ marginTop: '20px' }}>
                    <h4 style={{ marginBottom: '10px', color: '#1a365d' }}>{title}</h4>
                    {flags.map((flag, idx) => (
                        <div key={idx} className={type === "credibility" ? "credibility-flag-item" : "flag-item"}>
                            <strong>⚠️ {flag.type?.replace(/_/g, ' ').toUpperCase() || 'Flag'}</strong>
                            <div style={{ marginTop: '5px' }}>{flag.issue}</div>
                            <div className="flag-suggestion">💡 {flag.suggestion}</div>
                        </div>
                    ))}
                </div>
            );
        };
        
        const ScoreBreakdown = ({ breakdown }) => {
            if (!breakdown) return null;
            const categories = [
                { key: 'header_contact', label: 'Header & Contact', max: 10 },
                { key: 'keyword_density', label: 'Keyword Density', max: 20 },
                { key: 'quantified_results', label: 'Quantified Results', max: 20 },
                { key: 'action_verbs', label: 'Action Verbs', max: 15 },
                { key: 'formatting_structure', label: 'Formatting & Structure', max: 10 },
                { key: 'skills_section', label: 'Skills Section', max: 10 },
                { key: 'length_brevity', label: 'Length & Brevity', max: 5 },
                { key: 'publications_projects', label: 'Publications & Projects', max: 5 }
            ];
            return (
                <div className="results-section" style={{ marginTop: '20px' }}>
                    <h3>📊 Score Breakdown</h3>
                    <table className="issues-table"><thead><tr><th>Category</th><th>Score</th><th>Max</th></tr></thead><tbody>
                        {categories.map(cat => (<tr key={cat.key}><td>{cat.label}</td><td>{breakdown[cat.key] || 0}</td><td>{cat.max}</td></tr>))}
                        {breakdown.recruiter_scan_penalty !== undefined && <tr><td>Recruiter Scan Penalty</td><td>{breakdown.recruiter_scan_penalty}</td><td>0</td></tr>}
                        {breakdown.buzzword_repetition_penalty !== undefined && <tr><td>Buzzword/Repetition Penalty</td><td>{breakdown.buzzword_repetition_penalty}</td><td>0</td></tr>}
                    </tbody></table>
                </div>
            );
        };
        
        const BloomLevelBadge = ({ level, count, example }) => {
            const classes = ['bloom-level-1', 'bloom-level-2', 'bloom-level-3', 'bloom-level-4', 'bloom-level-5', 'bloom-level-6'];
            const exampleText = (example || "").substring(0, 80);
            return (
                <div style={{ marginTop: '8px', fontSize: '13px' }}>
                    <span className={`level-badge ${classes[level - 1] || classes[0]}`}>Level {level}</span>
                    <span> {count} bullet{count !== 1 ? 's' : ''}</span>
                    {exampleText && <span style={{ color: '#6b7280', marginLeft: '10px' }}>— "{exampleText}..."</span>}
                </div>
            );
        };
        
        // ============================================================
        // MAIN APP COMPONENT
        // ============================================================
        
        function ATSScanner() {
            const [isComparisonMode, setIsComparisonMode] = useState(false);
            const [resumeText, setResumeText] = useState('');
            const [rawResumeText, setRawResumeText] = useState('');
            const [resumeFileName, setResumeFileName] = useState('');
            const [resumeParseError, setResumeParseError] = useState(null);
            const [resumePdfHealth, setResumePdfHealth] = useState(null);
            const [extractionMethod, setExtractionMethod] = useState(null);
            const [azureHealth, setAzureHealth] = useState(null);
            const [pdfQuality, setPdfQuality] = useState(null);
            const [showAtsEyeView, setShowAtsEyeView] = useState(false);
            const [structuredResume, setStructuredResume] = useState(null);
            const [jobDescriptionText, setJobDescriptionText] = useState('');
            const [jobDescriptionFileName, setJobDescriptionFileName] = useState('');
            const [jdSkills, setJdSkills] = useState([]);
            const [jdRoles, setJdRoles] = useState([]);
            const [isExtractingKeywords, setIsExtractingKeywords] = useState(false);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [email, setEmail] = useState('');
            const [emailSent, setEmailSent] = useState(false);
            const [showCredibilityShortExplainer, setShowCredibilityShortExplainer] = useState(false);
            const [showPositionExplainer, setShowPositionExplainer] = useState(false);
            const [analysisStage, setAnalysisStage] = useState('');
            
            // Extraction functions (simplified)
            async function extractWithDocx(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = async e => {
                        try { const result = await mammoth.extractRawText({ arrayBuffer: e.target.result }); resolve({ text: result.value, method: 'docx', confidence: 98, pages: 1 }); }
                        catch (err) { reject(new Error('Failed to parse DOCX')); }
                    };
                    reader.onerror = () => reject(new Error('Failed to read file'));
                    reader.readAsArrayBuffer(file);
                });
            }
            
            async function extractWithAzure(file) {
                const formData = new FormData(); formData.append('file', file);
                const response = await fetch(WORKER_URLS.AZURE, { method: 'POST', body: formData });
                const data = await response.json();
                if (data.success && data.text?.length > 100) return { text: data.text, method: 'azure', confidence: 95, pages: data.pages || 1 };
                throw new Error(data.error || 'Azure extraction failed');
            }
            
            async function extractWithPDFjsExtract(file) {
                const formData = new FormData(); formData.append('file', file);
                const response = await fetch(WORKER_URLS.PDFJS_EXTRACT, { method: 'POST', body: formData });
                const data = await response.json();
                if (data.success && data.text?.length > 100) return { text: data.text, method: 'pdfjs-extract', confidence: 85, pages: data.pages || 1 };
                throw new Error(data.error || 'pdf.js-extract failed');
            }
            
            async function extractWithQualityCheck(file) {
                if (file.name.endsWith('.docx')) return extractWithDocx(file);
                if (file.type === 'text/plain') {
                    const reader = new FileReader();
                    const text = await new Promise((resolve, reject) => {
                        reader.onload = e => resolve(e.target.result);
                        reader.onerror = () => reject(new Error('Failed to read text file'));
                        reader.readAsText(file);
                    });
                    return { text, method: 'plain-text', confidence: 100, pages: 1 };
                }
                try {
                    const result = await extractWithPDFjsExtract(file);
                    const quality = analyzePDFQuality(result.text);
                    if (quality.needsFallback) {
                        const azureResult = await extractWithAzure(file);
                        azureResult.quality_analysis = quality;
                        azureResult.was_fallback = true;
                        azureResult.raw_text = result.text;
                        return azureResult;
                    }
                    result.quality_analysis = quality;
                    return result;
                } catch (error) {
                    return extractWithAzure(file);
                }
            }
            
            async function callStage2Parser(rawText) {
                const response = await fetch(WORKER_URLS.STAGE_2, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ resumeText: rawText }) });
                const data = await response.json();
                return data.error ? null : data;
            }
            
            async function extractKeywordsWithFoundry(text) {
                try {
                    const response = await fetch(WORKER_URLS.FOUNDRY, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
                    const data = await response.json();
                    if (data.success) return { skills: (data.skills || []).filter(s => s.length > 2 && isNaN(parseFloat(s))), roles: data.roles || [], orgs: data.organizations || [] };
                } catch (e) { console.warn(e); }
                return null;
            }
            
            const handleResumeUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > FILE_SIZE_LIMIT) { setResumeParseError(`File too large. Max ${FILE_SIZE_LIMIT / 1024 / 1024}MB`); return; }
                
                setResumeFileName(file.name);
                setResumeParseError(null);
                setLoading(true);
                setAnalysisStage('Processing file...');
                
                try {
                    const result = await extractWithQualityCheck(file);
                    const quality = result.quality_analysis || analyzePDFQuality(result.text);
                    setPdfQuality(quality);
                    setExtractionMethod(result.method === 'azure' ? '✅ Azure DI' : result.method === 'pdfjs-extract' ? '📄 pdf.js-extract' : '📄 ' + result.method);
                    setRawResumeText(result.raw_text || result.text);
                    setResumeText(result.text);
                    
                    const structured = await callStage2Parser(result.text);
                    if (structured) setStructuredResume(structured);
                    
                    setAnalysisStage('');
                    setLoading(false);
                } catch (err) {
                    setResumeParseError(err.message);
                    setLoading(false);
                }
            };
            
            const handleJDUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setJobDescriptionFileName(file.name);
                setLoading(true);
                setAnalysisStage('Loading job description...');
                try {
                    let text = '';
                    if (file.type === 'text/plain') {
                        const reader = new FileReader();
                        text = await new Promise((resolve, reject) => {
                            reader.onload = e => resolve(e.target.result);
                            reader.onerror = () => reject(new Error('Failed to read file'));
                            reader.readAsText(file);
                        });
                    } else if (file.type === 'application/pdf') {
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const content = await page.getTextContent();
                            text += content.items.map(item => item.str).join(' ') + '\n';
                        }
                    } else if (file.name.endsWith('.docx')) {
                        const arrayBuffer = await file.arrayBuffer();
                        const docxResult = await mammoth.extractRawText({ arrayBuffer });
                        text = docxResult.value;
                    } else throw new Error('Unsupported file type');
                    
                    setJobDescriptionText(text);
                    setAnalysisStage('Extracting keywords...');
                    setIsExtractingKeywords(true);
                    const cached = localStorage.getItem(JD_CACHE_KEY);
                    let keywords = null;
                    if (cached) {
                        const parsed = JSON.parse(cached);
                        if (parsed.hash === text.substring(0, 200) + text.length) keywords = parsed.keywords;
                    }
                    if (!keywords) {
                        keywords = await extractKeywordsWithFoundry(text);
                        if (keywords) localStorage.setItem(JD_CACHE_KEY, JSON.stringify({ hash: text.substring(0, 200) + text.length, keywords, timestamp: Date.now() }));
                    }
                    if (keywords) {
                        setJdSkills(keywords.skills || []);
                        setJdRoles(keywords.roles || []);
                    }
                    setIsExtractingKeywords(false);
                    setAnalysisStage('');
                    setLoading(false);
                } catch (err) {
                    setJobDescriptionParseError(err.message);
                    setLoading(false);
                }
            };
            
            const analyzeResume = async () => {
                if (!resumeText.trim()) { alert('Please provide resume text'); return; }
                if (isComparisonMode && !jobDescriptionText.trim()) { alert('Please provide a job description'); return; }
                
                setLoading(true);
                setAnalysisStage('Analyzing with AI...');
                
                try {
                    let finalResult;
                    if (!isComparisonMode) {
                        const response = await fetch(WORKER_URLS.AGGREGATOR, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                llm_analysis: { header_issues: [], missing_keywords: [], bullets_analysis: [], bloom_analysis: { average_bloom: 3.5, expected_bloom: 3.5, gap: 0 } },
                                structured_resume: structuredResume || { parsed: true, detected_level: "Mid/Associate", total_years_experience: 3, summary: "", skills: [], header: {}, experience: [] },
                                job_description: null
                            })
                        });
                        const data = await response.json();
                        if (data.error) throw new Error(data.error);
                        data.interview_likelihood_score = calculateInterviewLikelihood(data);
                        data.pdf_health = resumePdfHealth;
                        finalResult = data;
                    } else {
                        const hasKeywords = jdSkills.length > 0 || jdRoles.length > 0;
                        const response = await fetch(WORKER_URLS.COMPARE, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                resume: structuredResume, resumeText, resumePdfHealth,
                                jobDescriptionText: hasKeywords ? null : jobDescriptionText,
                                jd_keywords: hasKeywords ? { skills: jdSkills, roles: jdRoles } : null
                            })
                        });
                        const data = await response.json();
                        if (data.error) throw new Error(data.error);
                        if (data.candidates?.[0]?.content) {
                            let jsonText = data.candidates[0].content.parts[0].text.trim();
                            jsonText = jsonText.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                            let parsed;
                            try { parsed = JSON.parse(jsonText); }
                            catch { const match = jsonText.match(/\{[\s\S]*\}/); if (match) parsed = JSON.parse(match[0]); else throw new Error('Could not parse JSON'); }
                            parsed.interview_likelihood_score = calculateInterviewLikelihood(parsed);
                            parsed.pdf_health = resumePdfHealth;
                            finalResult = parsed;
                        } else throw new Error('Invalid response');
                    }
                    setResult(finalResult);
                } catch (err) { console.error(err); alert('Error analyzing resume'); }
                finally { setLoading(false); setAnalysisStage(''); }
            };
            
            // Render helpers
            const renderPDFQualityWarning = () => {
                if (!pdfQuality || pdfQuality.is_clean) return null;
                const builder = pdfQuality.detected_builder;
                return (
                    <div className={`pdf-quality-warning ${pdfQuality.score < 50 ? 'critical' : 'warning'}`}>
                        <div className="warning-header"><span className="warning-icon">⚠️</span><h3>PDF Quality Issues Detected</h3>{builder?.rating <= 2 && <span className={`builder-rating ${builder.class}`}>{builder.label}</span>}</div>
                        <p><strong>PDF Quality Score: {pdfQuality.score}/100</strong></p>
                        <div className="quality-score"><div className="score-bar"><div className="score-fill" style={{ width: `${pdfQuality.score}%` }}></div></div></div>
                        {builder?.rating <= 2 && <div className="issues-list"><h4>📋 Resume Builder Detected:</h4><p><strong>{builder.name}</strong> - {builder.rec}</p><p><strong>✅ Recommended alternative:</strong> CreateFreeCV.com or Microsoft Word</p></div>}
                        <div className="issues-list"><h4>⚠️ Issues Found:</h4><ul>{pdfQuality.issues.slice(0, 4).map((issue, i) => (<li key={i}><strong>{issue.type}:</strong> {issue.message}<br /><span className="fix-suggestion">→ {issue.fix}</span></li>))}</ul></div>
                        <div className="action-buttons"><button className="btn-primary" onClick={() => setShowAtsEyeView(!showAtsEyeView)}>{showAtsEyeView ? 'Hide' : 'Show'} ATS Eye View</button></div>
                        {showAtsEyeView && rawResumeText && (
                            <div className="comparison-grid">
                                <div className="before"><strong>🔴 What the ATS Actually Sees:</strong><div className="junk-highlight" dangerouslySetInnerHTML={{ __html: highlightJunk(rawResumeText.substring(0, 2000), pdfQuality.junk_patterns) }} /><div className="stats"><span className="bad">🗑️ Junk: {pdfQuality.stats.junk_chars} chars</span><span className="good" style={{ marginLeft: '8px' }}>📝 Content: {pdfQuality.stats.clean_chars} chars</span></div></div>
                                <div className="after"><strong>✅ What It Should Look Like:</strong><div style={{ whiteSpace: 'pre-wrap', fontFamily: 'monospace', fontSize: '12px' }}>{resumeText.replace(/[^\x20-\x7E\x0A\x0D]/g, '').substring(0, 2000)}</div></div>
                            </div>
                        )}
                        <div className="disclaimer-box"><strong>📌 Why this matters:</strong> Corrupted PDFs are automatically rejected by ATS systems before a human sees them.</div>
                    </div>
                );
            };
            
            const JDKeywordsSection = () => {
                if (!isComparisonMode || (jdSkills.length === 0 && jdRoles.length === 0)) return null;
                return (
                    <div className="jd-keywords-section">
                        <div className="jd-keywords-title">📋 JD Keywords Extracted</div>
                        {jdSkills.length > 0 && <div><span style={{ fontSize: '12px', color: '#6b7280' }}>Skills:</span>{jdSkills.map((s, i) => <span key={i} className="jd-keyword-badge">{s}</span>)}</div>}
                        {jdRoles.length > 0 && <div style={{ marginTop: '8px' }}><span style={{ fontSize: '12px', color: '#6b7280' }}>Roles:</span>{jdRoles.map((r, i) => <span key={i} className="jd-keyword-badge">{r}</span>)}</div>}
                        <div style={{ fontSize: '11px', color: '#6b7280', marginTop: '8px' }}>🤖 Extracted via Azure Foundry Language Service</div>
                    </div>
                );
            };
            
            return (
                <div className="container">
                    <div className="header"><h1>🎯 ATS Resume Scanner V8.6</h1><p>AI-powered analysis of formatting, keywords, and recruiter psychology</p></div>
                    <div className="card">
                        <div className="mode-switch-container"><div className="mode-switch"><button className={`mode-option ${!isComparisonMode ? 'active' : ''}`} onClick={() => setIsComparisonMode(false)}>📄 Standard Mode</button><button className={`mode-option ${isComparisonMode ? 'active' : ''}`} onClick={() => setIsComparisonMode(true)}>🎯 Compare with Job Description</button></div></div>
                        
                        {!loading && !result && (
                            <div>
                                <div className="input-panel"><h3>📋 Resume</h3><textarea placeholder="Paste your resume text here..." value={resumeText} onChange={(e) => setResumeText(e.target.value)} rows={12} /><div className="file-upload-area"><input type="file" accept=".txt,.pdf,.docx" onChange={handleResumeUpload} id="resume-upload" /><label htmlFor="resume-upload" style={{ cursor: 'pointer' }}><div className="file-upload-icon">📁</div><div>Upload Resume (.txt, .pdf, .docx)</div></label>{resumeFileName && <div className="file-name">📄 {resumeFileName}</div>}{extractionMethod && <div className="file-name" style={{ color: '#10b981' }}>{extractionMethod}</div>}</div>{resumeParseError && <div className="parse-error">⚠️ {resumeParseError}</div>}{resumeText && !resumeParseError && <div className="success-message">✅ Resume loaded. {resumeText.length} characters.</div>}</div>
                                {isComparisonMode && (
                                    <div className="input-panel" style={{ marginTop: '20px' }}><h3>🎯 Job Description</h3><textarea placeholder="Paste the job description here..." value={jobDescriptionText} onChange={(e) => setJobDescriptionText(e.target.value)} rows={10} /><div className="file-upload-area"><input type="file" accept=".txt,.pdf,.docx" onChange={handleJDUpload} id="jd-upload" /><label htmlFor="jd-upload" style={{ cursor: 'pointer' }}><div className="file-upload-icon">📁</div><div>Upload Job Description (.txt, .pdf, .docx)</div></label>{jobDescriptionFileName && <div className="file-name">📄 {jobDescriptionFileName}</div>}{isExtractingKeywords && <div className="file-name" style={{ color: '#f59e0b' }}>🔍 Extracting keywords...</div>}{!isExtractingKeywords && jdSkills.length > 0 && <div className="file-name" style={{ color: '#10b981' }}>✅ {jdSkills.length} skills extracted</div>}</div>{jobDescriptionParseError && <div className="parse-error">⚠️ {jobDescriptionParseError}</div>}{jobDescriptionText && <div className="success-message">✅ {jobDescriptionText.length} characters</div>}</div>
                                )}
                                <button className="analyze-btn" onClick={analyzeResume} disabled={!resumeText.trim() || (isComparisonMode && !jobDescriptionText.trim())}>{isComparisonMode ? 'Analyze Resume Against Job Description' : 'Analyze My Resume'}</button>
                            </div>
                        )}
                        
                        {loading && (<div className="loading"><div className="spinner"></div><p>Analyzing your resume...</p>{analysisStage && <div className="loading-stage">{analysisStage}</div>}<small>This may take 15-30 seconds</small></div>)}
                        
                        {result && (
                            <div className="results-container">
                                {result.fallback_used && <div className="fallback-note">ℹ️ {result.fallback_note || `Analysis completed using ${result.model_used}`}</div>}
                                {renderPDFQualityWarning()}
                                <JDKeywordsSection />
                                
                                <div className="score-grid">
                                    <ScoreCard title="ATS Score" value={result.total_ats_score} />
                                    {resumePdfHealth?.issues && <ScoreCard title="📄 PDF Health Score" value={getPdfHealthScore()} />}
                                    {result.fit_score !== null && <ScoreCard title="🎯 Fit Score" value={result.fit_score} />}
                                    {(() => { const score = result.interview_likelihood_score || calculateInterviewLikelihood(result); const flag = getInterviewFlag(score); return <ScoreCard title="📞 Interview Likelihood" value={score} badge={flag} />; })()}
                                    <ScoreCard title="⚠️ Risk Level" value={<div className={`risk-badge ${getRiskBadgeClass(result.risk_level)}`}>{result.risk_level || 'Medium'}</div>} />
                                </div>
                                
                                {(() => { const score = result.interview_likelihood_score || calculateInterviewLikelihood(result); const rec = getApplyRecommendation(score); return (<div className="apply-box"><h3>🎯 SHOULD YOU APPLY?</h3><div className="apply-recommendation">{rec.text}</div><div className="apply-context">{rec.context}</div><div className="apply-context" style={{ marginTop: '8px', fontSize: '12px' }}>Based on ATS {result.total_ats_score} | Fit {result.fit_score || 'N/A'} | Credibility {result.credibility_score}</div></div>); })()}
                                
                                <div className="tooltip" style={{ textAlign: 'center', marginBottom: '15px', fontSize: '12px', color: '#6b7280' }}>📊 How is Interview Likelihood calculated?<span className="tooltip-text">Formula: 25% × e^(-3 × (1 - Quality_Score))<br/>Quality_Score combines ATS, Fit, Credibility, Alignment, Bloom, and Semantic scores.<br/>A 15% score means: apply to 7 similar roles → expect 1 interview.</span></div>
                                
                                {result.credibility_score !== undefined && (
                                    <div className="credibility-container">
                                        <div className="credibility-header"><span className="credibility-title">🔒 Credibility Score</span><span className={`credibility-badge ${getCredibilityLabel(result.credibility_score).color}`}>{getCredibilityLabel(result.credibility_score).label}</span></div>
                                        <div><div className="credibility-bar"><div className="credibility-fill" style={{ width: `${result.credibility_score}%` }}></div></div></div>
                                        <div className="explainer" onClick={() => setShowCredibilityShortExplainer(!showCredibilityShortExplainer)}>Credibility Score Explained (Click here)<div className={`explainer-content ${showCredibilityShortExplainer ? 'show' : ''}`}><strong>What is the Credibility Score?</strong><br/>Measures how believable your resume is based on career trajectory, education-title fit, metric plausibility, and cognitive complexity.<br/><br/><strong>What the score means:</strong><br/>90-100: Highly credible, 80-89: Credible, 70-79: Moderately credible, 60-69: Questionable, Below 60: Low credibility</div></div>
                                        <FlagList title="📈 Career Trajectory Flags" flags={result.credibility_analysis?.career_plausibility_flags} />
                                        <FlagList title="🎓 Education-Title Flags" flags={result.credibility_analysis?.education_title_flags} />
                                        <FlagList title="📊 Metric Plausibility Flags" flags={result.credibility_analysis?.metric_plausibility_flags} />
                                        <FlagList title="🎭 Acting Title Flags" flags={result.credibility_analysis?.acting_title_flags} />
                                        {result.credibility_analysis?.recency_note && <div style={{ marginTop: '15px', fontSize: '13px', color: '#6b7280', fontStyle: 'italic' }}>📅 {result.credibility_analysis.recency_note}</div>}
                                    </div>
                                )}
                                
                                {result.semantic_analysis && (
                                    <div className="semantic-container">
                                        <div className="semantic-header"><span className="semantic-title">🎭 Semantic Positioning</span><span className={`semantic-badge ${result.semantic_analysis.position_score >= -1.5 && result.semantic_analysis.position_score <= 1.5 ? 'green' : Math.abs(result.semantic_analysis.position_score) <= 3.5 ? 'orange' : 'red'}`}>{result.semantic_analysis.position_score < -3.5 ? 'Severely Under-positioned' : result.semantic_analysis.position_score < -1.5 ? 'Moderately Under-positioned' : result.semantic_analysis.position_score < 0 ? 'Slightly Under-positioned' : result.semantic_analysis.position_score === 0 ? 'Perfectly Positioned' : result.semantic_analysis.position_score <= 1.5 ? 'Slightly Over-positioned' : result.semantic_analysis.position_score <= 3.5 ? 'Moderately Over-positioned' : 'Severely Over-positioned'}</span>{result.role_type_detected && <span className="industry-badge">Industry: {result.role_type_detected}</span>}</div>
                                        <div className="semantic-stats"><div className="semantic-stat"><div className="semantic-stat-label">Position Score</div><div className="semantic-stat-value">{result.semantic_analysis.position_score > 0 ? '+' : ''}{result.semantic_analysis.position_score}</div></div><div className="semantic-stat"><div className="semantic-stat-label">Detected Level</div><div className="semantic-stat-value">{result.semantic_analysis.detected_level || 'N/A'}</div></div><div className="semantic-stat"><div className="semantic-stat-label">Confidence</div><div className="semantic-stat-value">{result.semantic_analysis.confidence || 0}%</div></div></div>
                                        <div className="position-scale"><div className="scale-line"><div className="scale-marker" style={{ left: `${((result.semantic_analysis.position_score + 5) / 10) * 100}%` }}></div></div><div className="scale-labels"><span>Under-positioned (-5)</span><span>Aligned (0)</span><span>Over-positioned (+5)</span></div></div>
                                        <div><div className="alignment-bar"><div className="alignment-fill" style={{ width: `${(result.semantic_analysis.alignment_score / 10) * 100}%` }}></div></div></div>
                                        <div className="explainer" onClick={() => setShowPositionExplainer(!showPositionExplainer)}>ℹ️ How to read this score (Click here)<div className={`explainer-content ${showPositionExplainer ? 'show' : ''}`}><strong>POSITION SCORE (-5 to +5)</strong><br/>Measures whether your resume language matches your experience level.<br/><br/><strong>What it means:</strong><br/>-1.5 to +1.5: Perfectly aligned<br/>Beyond ±3.5: Critical mismatch</div></div>
                                        <FlagList title="Semantic Flags" flags={result.semantic_analysis.flags} type="semantic" />
                                    </div>
                                )}
                                
                                {result.bloom_analysis && (
                                    <div className="v8-section"><div className="results-section"><h3>🌿 Bloom's Taxonomy Analysis</h3><div className="bloom-stats"><div className="bloom-stat"><div className="bloom-stat-label">Avg Bloom Level</div><div className="bloom-stat-value">{result.bloom_analysis.average_bloom_level}</div></div><div className="bloom-stat"><div className="bloom-stat-label">Expected Level</div><div className="bloom-stat-value">{result.bloom_analysis.expected_bloom_level}</div></div><div className="bloom-stat"><div className="bloom-stat-label">Gap</div><div className="bloom-stat-value" style={{ color: result.bloom_analysis.bloom_gap > 0 ? '#ef4444' : result.bloom_analysis.bloom_gap < 0 ? '#f59e0b' : '#10b981' }}>{result.bloom_analysis.bloom_gap > 0 ? '+' : ''}{result.bloom_analysis.bloom_gap}</div></div></div>
                                    {safeRender(result.bloom_analysis.bullets_by_level, (item, i) => <BloomLevelBadge key={i} level={item.level} count={item.count} example={item.example} />)}</div></div>
                                )}
                                
                                {safeRender(result.grammar_issues, (issue, i) => (<div key={i} className="grammar-item"><div className="error-type">{(issue.error_type || 'grammar').toUpperCase()}</div><div className="original">"{(issue.original_text || issue.text || "").replace(/"/g, '')}"</div><div style={{ fontSize: '12px' }}>❌ {issue.issue || 'Grammar issue detected'}</div><div className="suggestion">✅ {issue.suggestion || 'Review and correct'}</div></div>))}
                                
                                {safeRender(result.missing_tools, (tool, i) => (<div key={i} className="missing-tool-item"><strong>{tool.tool_name || tool.name || "Unknown tool"}</strong> {tool.category && <span style={{ color: '#6b7280' }}>({tool.category})</span>}<div className="flag-suggestion">💡 {tool.suggestion || 'Add to Skills section if experienced'}</div></div>))}
                                
                                {safeRender(result.weak_metrics_details, (metric, i) => (<div key={i} className="weak-metric-item" style={{ borderLeftColor: '#ef4444' }}><div className="original">"{metric.bullet_text || metric.text || ""}"</div><div style={{ fontSize: '12px' }}>❌ {metric.reason || 'Weak metric detected'}</div><div className="suggestion">✅ {metric.fix || 'Add baseline or context'}</div></div>))}
                                
                                {safeRender(result.suggested_rewrites, (rewrite, i) => (<div key={i} className="rewrite-item"><div><strong>Original:</strong> "{rewrite.original || rewrite.text || ""}"</div><div style={{ marginTop: '8px' }}>❌ {rewrite.issue || 'Needs improvement'}</div><div style={{ marginTop: '8px', color: '#10b981' }}><strong>Suggested:</strong> "{rewrite.suggested_rewrite || rewrite.suggestion || 'Review and improve'}"</div><div style={{ marginTop: '5px', fontSize: '12px', color: '#6b7280' }}>💡 {rewrite.reason || 'Improves clarity and impact'}</div></div>))}
                                
                                <div className="results-grid">
                                    <div className="results-section">
                                        <h3>✅ What's Working Well</h3>
                                        {safeRender(result.strengths, (s, i) => <li key={i}>{s}</li>, <p>No strengths identified</p>)}
                                        {safeRender(result.missing_keywords, (k, i) => <li key={i}>{k}</li>, null, true)}
                                    </div>
                                    <div className="results-section">
                                        <h3>🎯 Role Match Scores</h3>
                                        {safeRender(result.role_match, (role, i) => (<div key={i} className="role-match-item"><span>{role.role}</span><span className={role.match_percentage >= 80 ? "match-strong" : "match-percentage"}>{role.match_percentage}%</span></div>), <p>No role matches identified</p>)}
                                        {safeRender(result.immediate_fixes, (fix, i) => <li key={i} style={{ marginBottom: '10px' }}>{fix}</li>, null, true)}
                                    </div>
                                </div>
                                
                                {safeRender(result.all_issues, (issue, i) => (<tr key={i}><td className={`priority-${(issue.priority || 'medium').toLowerCase()}`}>{issue.priority || 'Medium'}</td><td><strong>{issue.issue}</strong></td><td><small style={{ color: '#6b7280' }}>{issue.location || 'General'}</small></td><td>{issue.fix || issue.suggestion || 'Review and improve'}</td></tr>), null, true, "table")}
                                
                                {result.metric_quality_breakdown && (<div className="results-section" style={{ marginTop: '20px' }}><h3>📊 Metric Quality Breakdown</h3><div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '15px', textAlign: 'center' }}><div><div style={{ fontSize: '24px', fontWeight: 'bold', color: '#ef4444' }}>{result.metric_quality_breakdown.weak_count || 0}</div><div style={{ fontSize: '12px', color: '#6b7280' }}>Weak Metrics</div></div><div><div style={{ fontSize: '24px', fontWeight: 'bold', color: '#f59e0b' }}>{result.metric_quality_breakdown.good_count || 0}</div><div>Good Metrics</div></div><div><div style={{ fontSize: '24px', fontWeight: 'bold', color: '#10b981' }}>{result.metric_quality_breakdown.strong_count || 0}</div><div>Strong Metrics</div></div></div><div style={{ marginTop: '15px', textAlign: 'center' }}>Overall Quality Score: {result.metric_quality_breakdown.overall_score}/100</div></div>)}
                                
                                <ScoreBreakdown breakdown={result.breakdown} />
                                
                                <div className="email-capture"><h3>📧 Get Your Full Report</h3><p>Enter your email to receive a detailed PDF with all findings.</p>{!emailSent ? (<div className="email-input"><input type="email" placeholder="your.email@example.com" value={email} onChange={(e) => setEmail(e.target.value)} /><button onClick={() => { if(email && email.includes('@')){ setEmailSent(true); alert('Full report will be sent to: ' + email); } else alert('Enter valid email'); }}>Send Full Report</button></div>) : (<p style={{ color: '#10b981' }}>✅ Full report will be sent to {email}</p>)}</div>
                                
                                <button onClick={() => { setResult(null); setResumeText(''); setRawResumeText(''); setResumeFileName(''); setResumeParseError(null); setResumePdfHealth(null); setExtractionMethod(null); setAzureHealth(null); setPdfQuality(null); setStructuredResume(null); setShowAtsEyeView(false); setJobDescriptionText(''); setJobDescriptionFileName(''); setJdSkills([]); setJdRoles([]); setEmail(''); setEmailSent(false); setShowCredibilityShortExplainer(false); setShowPositionExplainer(false); setAnalysisStage(''); }} style={{ marginTop: '30px', background: '#6b7280', width: '100%', padding: '16px', borderRadius: '8px', border: 'none', color: 'white', fontWeight: '600', cursor: 'pointer' }}>Scan Another Resume</button>
                            </div>
                        )}
                    </div>
                    <div className="back-link"><a href="https://jkh-consulting.keron62.workers.dev/index.html">← Back to JKH Consulting</a></div>
                    <div className="privacy-note">🔒 Your resume is sent to a secure proxy for analysis. No data is stored permanently.</div>
                </div>
            );
        }
        
        ReactDOM.render(<ATSScanner />, document.getElementById('root'));
    </script>
</body>
</html>
