<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Worker URLs
        const STANDARD_WORKER_URL = "https://ats-resume-only.keron62.workers.dev";
        const COMPARE_WORKER_URL = "https://ats-compare-proxy.keron62.workers.dev";

        function ATSScanner() {
            // Core state
            const [isComparisonMode, setIsComparisonMode] = useState(false);
            const [resumeText, setResumeText] = useState('');
            const [resumeFileName, setResumeFileName] = useState('');
            const [resumeParseError, setResumeParseError] = useState(null);
            const [resumePdfHealth, setResumePdfHealth] = useState(null);
            const [resumeStructure, setResumeStructure] = useState(null);
            const [jobDescriptionText, setJobDescriptionText] = useState('');
            const [jobDescriptionFileName, setJobDescriptionFileName] = useState('');
            const [jobDescriptionParseError, setJobDescriptionParseError] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [email, setEmail] = useState('');
            const [emailSent, setEmailSent] = useState(false);
            const [showCredibilityExplainer, setShowCredibilityExplainer] = useState(false);
            const [showSemanticExplainer, setShowSemanticExplainer] = useState(false);
            const [showPositionExplainer, setShowPositionExplainer] = useState(false);
            const [showCredibilityShortExplainer, setShowCredibilityShortExplainer] = useState(false);
            const [lastAnalysisTime, setLastAnalysisTime] = useState(0);
            const [analysisStage, setAnalysisStage] = useState('');

            // ============================================================
            // PDF STRUCTURE DETECTION (V8.2 NEW)
            // ============================================================
            
            const detectResumeBuilder = (metadata) => {
                const creator = metadata?.info?.Creator || '';
                const producer = metadata?.info?.Producer || '';
                
                const builders = {
                    'Canva': 'Canva',
                    'Novoresume': 'Novoresume',
                    'Zety': 'Zety',
                    'Resume.io': 'Resume.io',
                    'EnhanCV': 'EnhanCV',
                    'CVMaker': 'CVMaker',
                    'Wix': 'Wix',
                    'Adobe Illustrator': 'Adobe Illustrator',
                    'Microsoft Word': 'Microsoft Word'
                };
                
                for (const [key, name] of Object.entries(builders)) {
                    if (creator.includes(key) || producer.includes(key)) {
                        return { detected: true, name: name, creator: creator, isGood: name === 'Microsoft Word' };
                    }
                }
                return { detected: false, name: null, creator: creator, isGood: false };
            };

            const detectMultiColumn = (textContent) => {
                const xPositions = textContent.items.map(item => item.transform[4]);
                const uniqueX = [...new Set(xPositions.map(x => Math.round(x / 50) * 50))];
                return uniqueX.length > 3 && textContent.items.length > 20;
            };

            const detectHeadersByPosition = (textContent, pageHeight) => {
                const headerItems = textContent.items.filter(item => item.transform[5] < pageHeight * 0.15);
                return headerItems.map(item => item.str.trim()).filter(t => t && t.length > 0);
            };

            const getFontMetrics = (textContent) => {
                const heights = textContent.items.map(item => item.height).filter(h => h > 0);
                if (heights.length === 0) return { avgSize: 0, maxSize: 0, minSize: 0 };
                const avgSize = heights.reduce((a, b) => a + b, 0) / heights.length;
                const maxSize = Math.max(...heights);
                const minSize = Math.min(...heights);
                return { avgSize, maxSize, minSize };
            };

            const detectMainTitle = (textContent, fontMetrics) => {
                const largestItems = textContent.items.filter(item => item.height > fontMetrics.avgSize * 1.5);
                const largest = largestItems.sort((a, b) => b.height - a.height)[0];
                if (largest && largest.str.trim().length > 2 && largest.str.trim().length < 50) {
                    return { text: largest.str.trim(), confidence: 'high' };
                }
                return null;
            };

            const detectSectionHeaders = (textContent, pageHeight, fontMetrics) => {
                const potentialHeaders = [];
                const commonHeaders = ['work experience', 'employment', 'education', 'skills', 'certifications', 'projects', 'publications', 'professional experience'];
                
                for (const item of textContent.items) {
                    const text = item.str.trim();
                    if (!text || text.length < 2 || text.length > 40) continue;
                    
                    const isNearTop = item.transform[5] < pageHeight * 0.2;
                    const isLargerFont = item.height > fontMetrics.avgSize * 1.2;
                    const isKnownHeader = commonHeaders.some(h => text.toLowerCase().includes(h));
                    const isAllCaps = text === text.toUpperCase() && text.length > 2;
                    
                    if ((isNearTop && (isLargerFont || isAllCaps)) || isKnownHeader) {
                        potentialHeaders.push({
                            original: text,
                            normalized: normalizeHeaderName(text),
                            confidence: (isNearTop ? 30 : 0) + (isLargerFont ? 25 : 0) + (isKnownHeader ? 20 : 0) + (isAllCaps ? 15 : 0)
                        });
                    }
                }
                
                const uniqueHeaders = new Map();
                for (const header of potentialHeaders) {
                    const key = header.normalized;
                    if (!uniqueHeaders.has(key) || uniqueHeaders.get(key).confidence < header.confidence) {
                        uniqueHeaders.set(key, header);
                    }
                }
                
                return Array.from(uniqueHeaders.values()).sort((a, b) => b.confidence - a.confidence);
            };

            const normalizeHeaderName = (text) => {
                const lower = text.toLowerCase();
                if (lower.includes('work') || lower.includes('employment')) return 'WORK EXPERIENCE';
                if (lower.includes('education')) return 'EDUCATION';
                if (lower.includes('skill') || lower.includes('core competency')) return 'SKILLS';
                if (lower.includes('certification') || lower.includes('license')) return 'CERTIFICATIONS';
                if (lower.includes('project')) return 'PROJECTS';
                if (lower.includes('publication')) return 'PUBLICATIONS';
                return text.toUpperCase();
            };

            const calculateReadabilityScore = (text) => {
                const sentences = text.split(/[.!?]+/).length;
                const words = text.split(/\s+/).length;
                const avgWordsPerSentence = words / Math.max(sentences, 1);
                let score = 'Moderate';
                if (avgWordsPerSentence < 10) score = 'Very Easy';
                else if (avgWordsPerSentence < 15) score = 'Easy';
                else if (avgWordsPerSentence < 20) score = 'Moderate';
                else if (avgWordsPerSentence < 25) score = 'Difficult';
                else score = 'Very Difficult';
                return { avgWordsPerSentence: Math.round(avgWordsPerSentence * 10) / 10, score };
            };

            const analyzePdfStructure = async (pdf, fileSize) => {
                const metadata = await pdf.getMetadata();
                const numPages = pdf.numPages;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 1 });
                const pageHeight = viewport.height;
                const textContent = await page.getTextContent({ normalizeWhitespace: true, disableCombineTextItems: false });
                
                const fontMetrics = getFontMetrics(textContent);
                const isMultiColumn = detectMultiColumn(textContent);
                const headers = detectHeadersByPosition(textContent, pageHeight);
                const mainTitle = detectMainTitle(textContent, fontMetrics);
                const sectionHeaders = detectSectionHeaders(textContent, pageHeight, fontMetrics);
                const resumeBuilder = detectResumeBuilder(metadata);
                
                const standardHeaders = ['WORK EXPERIENCE', 'EDUCATION', 'SKILLS'];
                const foundHeaders = sectionHeaders.map(h => h.normalized);
                const missingHeaders = standardHeaders.filter(h => !foundHeaders.includes(h));
                
                const extractedText = textContent.items.map(item => item.str).join(' ');
                const readability = calculateReadabilityScore(extractedText);
                
                const issues = [];
                if (isMultiColumn) issues.push({ type: 'multi_column', severity: 'high', message: 'Multi-column layout detected', fix: 'Convert to single-column format for ATS compatibility' });
                if (headers.length > 0) issues.push({ type: 'headers_detected', severity: 'medium', message: 'Text detected in header area', fix: 'Move contact information to the body of your resume' });
                if (resumeBuilder.detected && !resumeBuilder.isGood) issues.push({ type: 'resume_builder', severity: 'medium', message: `Generated by ${resumeBuilder.name}`, fix: 'Export as plain text or use Microsoft Word for ATS-friendly PDFs' });
                if (missingHeaders.length > 0) issues.push({ type: 'missing_sections', severity: 'medium', message: `Missing standard sections: ${missingHeaders.join(', ')}`, fix: 'Add clear section headers for better ATS parsing' });
                if (numPages > 2) issues.push({ type: 'page_count', severity: 'low', message: `${numPages} pages detected`, fix: 'Consider condensing to 2 pages' });
                
                const structureMetadata = {
                    pageCount: numPages,
                    hasMultiColumn: isMultiColumn,
                    hasHeaders: headers.length > 0,
                    mainTitle: mainTitle,
                    sectionHeaders: sectionHeaders,
                    missingHeaders: missingHeaders,
                    fontMetrics: fontMetrics,
                    readability: readability,
                    resumeBuilder: resumeBuilder
                };
                
                return { issues, structureMetadata, extractedText };
            };

            const parsePDF = async (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = async function(e) {
                        try {
                            const typedarray = new Uint8Array(e.target.result);
                            const pdf = await pdfjsLib.getDocument(typedarray).promise;
                            
                            let fullText = '';
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const textContent = await page.getTextContent({ normalizeWhitespace: true, disableCombineTextItems: false });
                                const pageText = textContent.items.map(item => item.str).join(' ');
                                fullText += pageText + '\n';
                            }
                            
                            const structureAnalysis = await analyzePdfStructure(pdf, file.size);
                            
                            resolve({ 
                                fullText, 
                                pdf, 
                                structureIssues: structureAnalysis.issues,
                                structureMetadata: structureAnalysis.structureMetadata,
                                extractedText: structureAnalysis.extractedText
                            });
                        } catch (error) {
                            reject(new Error('Failed to parse PDF: ' + error.message));
                        }
                    };
                    reader.onerror = () => reject(new Error('Failed to read file'));
                    reader.readAsArrayBuffer(file);
                });
            };

            // ============================================================
            // FILE UPLOAD HANDLER (WITH STRUCTURE DETECTION)
            // ============================================================
            
            const handleResumeFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setResumeFileName(file.name);
                setResumeParseError(null);
                setLoading(true);
                setAnalysisStage('Analyzing PDF structure...');

                try {
                    let extractedText = '';
                    let pdfHealth = null;
                    let structureMetadata = null;
                    
                    if (file.type === 'text/plain') {
                        setAnalysisStage('Reading text file...');
                        const reader = new FileReader();
                        extractedText = await new Promise((resolve, reject) => {
                            reader.onload = (event) => resolve(event.target.result);
                            reader.onerror = () => reject(new Error('Failed to read text file'));
                            reader.readAsText(file);
                        });
                        setAnalysisStage('Processing text...');
                    } else if (file.type === 'application/pdf') {
                        setAnalysisStage('Parsing PDF structure...');
                        const { fullText, structureIssues, structureMetadata: metadata, extractedText: structuredText } = await parsePDF(file);
                        setAnalysisStage('Extracting text from PDF...');
                        extractedText = fullText;
                        structureMetadata = metadata;
                        
                        pdfHealth = {
                            pageCount: structureMetadata.pageCount,
                            creator: structureMetadata.resumeBuilder?.creator,
                            issues: structureIssues,
                            structure: structureMetadata,
                            textLength: extractedText.length,
                            fileSize: file.size
                        };
                        
                        if (structureMetadata.hasMultiColumn) {
                            console.warn('Multi-column layout detected - ATS may misread');
                        }
                    } else {
                        setResumeParseError('Unsupported file type. Please upload .txt or .pdf');
                        setLoading(false);
                        setAnalysisStage('');
                        return;
                    }
                    
                    if (!extractedText || extractedText.trim().length < 50) {
                        setResumeParseError('Could not extract enough text from the file. Try pasting as text.');
                        setLoading(false);
                        setAnalysisStage('');
                        return;
                    }
                    
                    setResumeText(extractedText);
                    setResumePdfHealth(pdfHealth);
                    setResumeStructure(structureMetadata);
                    
                    if (window.amplitude) {
                        amplitude.track('File Uploaded', {
                            file_type: file.type,
                            file_size: file.size,
                            text_length: extractedText.length,
                            pdf_issues: pdfHealth?.issues?.length || 0,
                            has_multi_column: structureMetadata?.hasMultiColumn || false,
                            resume_builder: structureMetadata?.resumeBuilder?.name || null
                        });
                    }
                    
                    setAnalysisStage('');
                    setLoading(false);
                    
                } catch (error) {
                    console.error('Upload error:', error);
                    setResumeParseError(error.message);
                    if (window.amplitude) {
                        amplitude.track('File Upload Error', {
                            error_message: error.message,
                            file_type: file.type,
                            file_size: file.size
                        });
                    }
                    setLoading(false);
                    setAnalysisStage('');
                }
            };

            const handleJobDescriptionFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setJobDescriptionFileName(file.name);
                setJobDescriptionParseError(null);
                setLoading(true);
                setAnalysisStage('Loading job description...');

                try {
                    let extractedText = '';
                    if (file.type === 'text/plain') {
                        const reader = new FileReader();
                        extractedText = await new Promise((resolve, reject) => {
                            reader.onload = (event) => resolve(event.target.result);
                            reader.onerror = () => reject(new Error('Failed to read text file'));
                            reader.readAsText(file);
                        });
                    } else if (file.type === 'application/pdf') {
                        const { fullText } = await parsePDF(file);
                        extractedText = fullText;
                    } else {
                        setJobDescriptionParseError('Unsupported file type. Please upload .txt or .pdf');
                        setLoading(false);
                        setAnalysisStage('');
                        return;
                    }
                    
                    if (!extractedText || extractedText.trim().length < 50) {
                        setJobDescriptionParseError('Could not extract enough text from the file.');
                        setLoading(false);
                        setAnalysisStage('');
                        return;
                    }
                    
                    setJobDescriptionText(extractedText);
                    setAnalysisStage('');
                    setLoading(false);
                    
                } catch (error) {
                    setJobDescriptionParseError(error.message);
                    setLoading(false);
                    setAnalysisStage('');
                }
            };

            const analyzeResume = async () => {
                if (!resumeText.trim()) {
                    alert('Please provide resume text or upload a file.');
                    return;
                }

                if (isComparisonMode && !jobDescriptionText.trim()) {
                    alert('Please provide a job description or switch to Standard Mode.');
                    return;
                }

                const now = Date.now();
                if (now - lastAnalysisTime < 5000 && lastAnalysisTime !== 0) {
                    alert('Please wait 5 seconds between analyses.');
                    return;
                }
                setLastAnalysisTime(now);
                
                setLoading(true);
                setResult(null);
                setAnalysisStage('Preparing analysis...');

                if (window.amplitude) {
                    amplitude.track('Resume Analysis Started', {
                        mode: isComparisonMode ? 'comparison' : 'standard',
                        timestamp: new Date().toISOString(),
                        resume_length: resumeText.length,
                        has_structure: !!resumeStructure
                    });
                }

                try {
                    const workerUrl = isComparisonMode ? COMPARE_WORKER_URL : STANDARD_WORKER_URL;
                    
                    setAnalysisStage('Sending to analysis engine...');
                    
                    const payload = isComparisonMode 
                        ? { 
                            resumeText: resumeText,
                            jobDescriptionText: jobDescriptionText,
                            structureMetadata: resumeStructure
                          }
                        : { 
                            resumeText: resumeText,
                            structureMetadata: resumeStructure
                          };
                    
                    const response = await fetch(workerUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    setAnalysisStage('Generating results...');

                    const data = await response.json();
                    
                    if (data.error) {
                        throw new Error(data.error || 'Analysis failed');
                    }

                    if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                        let jsonText = data.candidates[0].content.parts[0].text.trim();
                        jsonText = jsonText.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                        const parsedResult = JSON.parse(jsonText);
                        
                        parsedResult.pdf_health = resumePdfHealth;
                        setResult(parsedResult);
                        
                        if (window.amplitude) {
                            amplitude.track('Resume Analysis Completed', {
                                total_score: parsedResult.total_ats_score,
                                credibility_score: parsedResult.credibility_score,
                                fit_score: parsedResult.fit_score,
                                semantic_score: parsedResult.semantic_analysis?.position_score,
                                mode: isComparisonMode ? 'comparison' : 'standard'
                            });
                        }
                    } else {
                        throw new Error('Invalid response format');
                    }
                } catch (error) {
                    console.error('Analysis error:', error);
                    
                    if (window.amplitude) {
                        amplitude.track('Resume Analysis Error', {
                            error_message: error.message,
                            resume_length: resumeText.length,
                            mode: isComparisonMode ? 'comparison' : 'standard'
                        });
                    }
                    
                    alert('Error analyzing resume. Please try again.');
                } finally {
                    setLoading(false);
                    setAnalysisStage('');
                }
            };

            const handleEmailSubmit = async () => {
                if (!email || !email.includes('@')) {
                    alert('Please enter a valid email address');
                    return;
                }

                if (window.amplitude) {
                    amplitude.track('Email Captured', {
                        email_domain: email.split('@')[1],
                        score: result?.total_ats_score
                    });
                }

                if (typeof gtag !== 'undefined') {
                    gtag('event', 'generate_lead', {
                        'event_category': 'ATS_Scanner',
                        'event_label': email
                    });
                }

                setEmailSent(true);
                alert('Full report will be sent to: ' + email);
            };

            const getScoreColor = (score) => {
                if (score >= 90) return 'score-excellent';
                if (score >= 80) return 'score-good';
                if (score >= 70) return 'score-moderate';
                return 'score-poor';
            };

            const getScoreGrade = (score) => {
                if (score >= 90) return 'Excellent';
                if (score >= 80) return 'Good';
                if (score >= 70) return 'Moderate';
                return 'Needs Work';
            };

            const getCredibilityLabel = (score) => {
                if (score >= 90) return { label: 'Highly Credible', color: 'high' };
                if (score >= 80) return { label: 'Credible', color: 'high' };
                if (score >= 70) return { label: 'Moderately Credible', color: 'moderate' };
                if (score >= 60) return { label: 'Questionable Credibility', color: 'moderate' };
                return { label: 'Low Credibility', color: 'low' };
            };

            const getSemanticColor = (positionScore) => {
                if (positionScore >= -1.5 && positionScore <= 1.5) return 'green';
                if (Math.abs(positionScore) <= 3.5) return 'orange';
                return 'red';
            };

            const getPositionLabel = (positionScore) => {
                if (positionScore < -3.5) return 'Severely Under-positioned';
                if (positionScore < -1.5) return 'Moderately Under-positioned';
                if (positionScore < 0) return 'Slightly Under-positioned';
                if (positionScore === 0) return 'Perfectly Positioned';
                if (positionScore <= 1.5) return 'Slightly Over-positioned';
                if (positionScore <= 3.5) return 'Moderately Over-positioned';
                return 'Severely Over-positioned';
            };

            const getScalePosition = (positionScore) => ((positionScore + 5) / 10) * 100;

            const getRiskBadgeClass = (riskLevel) => {
                if (!riskLevel) return 'risk-medium';
                const level = riskLevel.toLowerCase();
                if (level === 'low') return 'risk-low';
                if (level === 'high') return 'risk-high';
                return 'risk-medium';
            };

            const getPdfHealthScore = () => {
                if (!resumePdfHealth?.issues) return null;
                const issues = resumePdfHealth.issues;
                let score = 100;
                for (const issue of issues) {
                    if (issue.severity === 'high') score -= 15;
                    else if (issue.severity === 'medium') score -= 8;
                    else if (issue.severity === 'low') score -= 3;
                }
                return Math.max(0, Math.min(100, score));
            };

            const isPdfHealthCritical = () => {
                const score = getPdfHealthScore();
                return score !== null && score < 70;
            };

            const getPdfHealthLabel = () => {
                const score = getPdfHealthScore();
                if (score === null) return null;
                if (score >= 90) return 'Excellent';
                if (score >= 80) return 'Good';
                if (score >= 70) return 'Moderate';
                if (score >= 60) return 'Poor';
                return 'Critical';
            };

            const getPdfHealthColor = () => {
                const score = getPdfHealthScore();
                if (score === null) return '#6b7280';
                if (score >= 80) return '#10b981';
                if (score >= 70) return '#f59e0b';
                return '#ef4444';
            };

            const getRoleMatchDisclaimer = (roleMatches, atsScore, positionScore) => {
                if (!roleMatches || roleMatches.length === 0) return null;
                
                const strongMatches = roleMatches.filter(m => m.match_percentage >= 80);
                const strongMatchCount = strongMatches.length;
                const isPositionedOutsideRange = Math.abs(positionScore) > 1.5;
                const isLowAts = atsScore < 70;
                
                if (strongMatchCount === 0) {
                    return {
                        type: 'critical',
                        title: 'CRITICAL: No strong role matches detected',
                        message: `Your ATS score (${atsScore}) and positioning score (${positionScore > 0 ? '+' : ''}${positionScore}) are directly limiting your role matches.`,
                        actions: [
                            'Replace weak verbs ("assisted" → "managed" where accurate)',
                            'Add quantified results to bullets without metrics',
                            'Review the "Missing Keywords" section below'
                        ],
                        callToAction: 'Start with "Immediate Fixes" at the bottom of this report'
                    };
                }
                
                if (strongMatchCount === 1) {
                    if (isLowAts || isPositionedOutsideRange) {
                        const isOverPositioned = positionScore > 1.5;
                        const positionAdvice = isOverPositioned 
                            ? 'Your over-positioning score suggests your language may be inflated for your level.'
                            : positionScore < -1.5 
                                ? 'Your under-positioning score suggests your language sounds junior for your level.'
                                : 'Your ATS score indicates missing keywords and weak quantification.';
                        
                        return {
                            type: 'warning',
                            title: '⚠️ You have 1 strong role match. Aim for 2-3.',
                            message: `${positionAdvice} This is limiting you to only 1 strong match.`,
                            actions: [
                                isOverPositioned ? 'Review the "potential_inflation" flags' : 'Replace weak verbs with stronger alternatives',
                                isOverPositioned ? 'Dial back ownership claims where accuracy allows' : 'Add quantified results to bullets',
                                'Add keywords from adjacent roles to broaden your appeal'
                            ],
                            callToAction: 'Aim for 2-3 roles above 80% for better job search breadth'
                        };
                    } else {
                        return {
                            type: 'suggestion',
                            title: '📌 You have 1 strong role match. Aim for 2-3.',
                            message: 'Your resume is well-positioned, but you are currently only competitive for 1 role.',
                            actions: [
                                'Add keywords from adjacent roles',
                                'Tailor your resume to a second target role',
                                'Strengthen the 2nd and 3rd bullet in each role section'
                            ],
                            callToAction: 'Aim for 2-3 roles above 80% to keep your options open'
                        };
                    }
                }
                return null;
            };

            const renderPdfHealthSection = (isCritical) => {
                if (!resumePdfHealth?.issues || resumePdfHealth.issues.length === 0) return null;
                
                const score = getPdfHealthScore();
                const label = getPdfHealthLabel();
                
                const containerClass = isCritical ? 'pdf-health-critical' : 'pdf-health-good';
                
                return (
                    <div className={containerClass}>
                        <h3>{isCritical ? '⚠️ CRITICAL PDF HEALTH ISSUES' : '📄 PDF Health Report'}</h3>
                        <p style={{ marginBottom: '15px' }}>
                            <strong>Score: {score}/100 ({label})</strong>
                            {isCritical && ' — Fix these issues before submitting your resume.'}
                        </p>
                        
                        {/* Structure Summary (V8.2 NEW) */}
                        {resumePdfHealth.structure && (
                            <div className="pdf-issue low" style={{ marginBottom: '15px' }}>
                                <div className="pdf-issue-header">📊 Document Structure Analysis</div>
                                <div className="pdf-issue-fix">
                                    Pages: {resumePdfHealth.structure.pageCount} | 
                                    Readability: {resumePdfHealth.structure.readability?.score || 'Unknown'} |
                                    Main Title: {resumePdfHealth.structure.mainTitle?.text || 'Not detected'}
                                </div>
                            </div>
                        )}
                        
                        {resumePdfHealth.issues.map((issue, idx) => {
                            let icon = '🟡';
                            if (issue.severity === 'high') icon = '🔴';
                            else if (issue.severity === 'low') icon = '🟢';
                            
                            return (
                                <div key={idx} className={`pdf-issue ${issue.severity}`}>
                                    <div className="pdf-issue-header">{icon} {issue.message}</div>
                                    <div className="pdf-issue-fix">{issue.fix}</div>
                                </div>
                            );
                        })}
                        
                        {resumePdfHealth.structure?.missingHeaders?.length > 0 && (
                            <div className="pdf-issue medium">
                                <div className="pdf-issue-header">📋 Missing Standard Sections</div>
                                <div className="pdf-issue-fix">Consider adding: {resumePdfHealth.structure.missingHeaders.join(', ')}</div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>🎯 ATS Resume Scanner</h1>
                        <p>AI-powered analysis of formatting, keywords, and recruiter psychology</p>
                    </div>

                    <div className="card">
                        <div className="mode-switch-container">
                            <div className="mode-switch">
                                <button className={`mode-option ${!isComparisonMode ? 'active' : ''}`} onClick={() => setIsComparisonMode(false)}>📄 Standard Mode</button>
                                <button className={`mode-option ${isComparisonMode ? 'active' : ''}`} onClick={() => setIsComparisonMode(true)}>🎯 Compare with Job Description</button>
                            </div>
                        </div>

                        {!loading && !result && (
                            <div>
                                {!isComparisonMode ? (
                                    <div>
                                        <div className="input-panel">
                                            <h3>📋 Resume</h3>
                                            <textarea placeholder="Paste your resume text here..." value={resumeText} onChange={(e) => setResumeText(e.target.value)} rows={12} />
                                            <div className="file-upload-area">
                                                <input type="file" accept=".txt,.pdf" onChange={handleResumeFileUpload} id="resume-file-upload" />
                                                <label htmlFor="resume-file-upload" style={{ cursor: 'pointer' }}>
                                                    <div className="file-upload-icon">📁</div>
                                                    <div>Click to upload resume (.txt, .pdf)</div>
                                                </label>
                                                {resumeFileName && <div className="file-name">📄 {resumeFileName}</div>}
                                            </div>
                                            {resumeParseError && <div className="parse-error">⚠️ {resumeParseError}</div>}
                                            {resumeText && !resumeParseError && <div className="success-message">✅ Resume loaded. {resumeText.length} characters.</div>}
                                        </div>
                                        <button className="analyze-btn" onClick={analyzeResume}>Analyze My Resume</button>
                                    </div>
                                ) : (
                                    <div className="dual-input-grid">
                                        <div className="input-panel">
                                            <h3>📋 Resume</h3>
                                            <textarea placeholder="Paste your resume text here..." value={resumeText} onChange={(e) => setResumeText(e.target.value)} rows={10} />
                                            <div className="file-upload-area">
                                                <input type="file" accept=".txt,.pdf" onChange={handleResumeFileUpload} id="resume-file-upload-compare" />
                                                <label htmlFor="resume-file-upload-compare" style={{ cursor: 'pointer' }}>
                                                    <div className="file-upload-icon">📁</div>
                                                    <div>Upload Resume (.txt, .pdf)</div>
                                                </label>
                                                {resumeFileName && <div className="file-name">📄 {resumeFileName}</div>}
                                            </div>
                                            {resumeParseError && <div className="parse-error">⚠️ {resumeParseError}</div>}
                                            {resumeText && !resumeParseError && <div className="success-message">✅ {resumeText.length} characters</div>}
                                        </div>
                                        <div className="input-panel">
                                            <h3>🎯 Job Description</h3>
                                            <textarea placeholder="Paste the job description here..." value={jobDescriptionText} onChange={(e) => setJobDescriptionText(e.target.value)} rows={10} />
                                            <div className="file-upload-area">
                                                <input type="file" accept=".txt,.pdf" onChange={handleJobDescriptionFileUpload} id="jd-file-upload" />
                                                <label htmlFor="jd-file-upload" style={{ cursor: 'pointer' }}>
                                                    <div className="file-upload-icon">📁</div>
                                                    <div>Upload Job Description (.txt, .pdf)</div>
                                                </label>
                                                {jobDescriptionFileName && <div className="file-name">📄 {jobDescriptionFileName}</div>}
                                            </div>
                                            {jobDescriptionParseError && <div className="parse-error">⚠️ {jobDescriptionParseError}</div>}
                                            {jobDescriptionText && !jobDescriptionParseError && <div className="success-message">✅ {jobDescriptionText.length} characters</div>}
                                        </div>
                                    </div>
                                )}
                                {isComparisonMode && <button className="analyze-btn" onClick={analyzeResume} style={{ marginTop: '30px' }}>Analyze Resume Against Job Description</button>}
                            </div>
                        )}

                        {loading && (
                            <div className="loading">
                                <div className="spinner"></div>
                                <p>Analyzing your resume...</p>
                                {analysisStage && <div className="loading-stage">{analysisStage}</div>}
                            </div>
                        )}

                        {result && (
                            <div className="results-container">
                                {result.fallback_used && <div className="fallback-note">ℹ️ {result.fallback_note || `Analysis completed using ${result.model_used} due to high demand. Quality unchanged.`}</div>}

                                <div className="score-grid">
                                    <div className="score-card"><h4>ATS Score</h4><div className="score-value" style={{ color: result.total_ats_score >= 90 ? '#10b981' : result.total_ats_score >= 80 ? '#3b82f6' : result.total_ats_score >= 70 ? '#f59e0b' : '#ef4444' }}>{result.total_ats_score}</div><div className="score-label">/100 ({getScoreGrade(result.total_ats_score)})</div></div>
                                    {resumePdfHealth && resumePdfHealth.issues && <div className="score-card"><h4>📄 PDF Health Score</h4><div className="score-value" style={{ color: getPdfHealthColor() }}>{getPdfHealthScore()}</div><div className="score-label">/100 ({getPdfHealthLabel()})</div></div>}
                                    {result.fit_score !== null && <div className="score-card"><h4>🎯 Fit Score</h4><div className="score-value">{result.fit_score}</div><div className="score-label">/100 (Role Match)</div></div>}
                                    {result.interview_likelihood_score !== null && <div className="score-card"><h4>📞 Interview Likelihood</h4><div className="score-value">{result.interview_likelihood_score}</div><div className="score-label">/100</div></div>}
                                    <div className="score-card"><h4>⚠️ Risk Level</h4><div className={`risk-badge ${getRiskBadgeClass(result.risk_level)}`}>{result.risk_level || 'Medium'}</div></div>
                                </div>

                                {isPdfHealthCritical() && renderPdfHealthSection(true)}

                                {result.credibility_score !== undefined && (
                                    <div className="credibility-container">
                                        <div className="credibility-header"><span className="credibility-title">🔒 Credibility Score</span><span className={`credibility-badge ${getCredibilityLabel(result.credibility_score).color}`}>{getCredibilityLabel(result.credibility_score).label}</span></div>
                                        <div><div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '5px' }}><span style={{ fontSize: '14px', color: '#6b7280' }}>Credibility Score</span><span style={{ fontSize: '14px', fontWeight: 'bold', color: '#1a365d' }}>{result.credibility_score}/100</span></div><div className="credibility-bar"><div className="credibility-fill" style={{ width: `${result.credibility_score}%` }}></div></div></div>
                                        <div className="explainer" onClick={() => setShowCredibilityShortExplainer(!showCredibilityShortExplainer)}>Credibility Score Explained (Click here)<div className={`explainer-content ${showCredibilityShortExplainer ? 'show' : ''}`}><strong>What is the Credibility Score?</strong><br/>The credibility score (0-100) measures how believable your resume is.<br/><br/><strong>How it's calculated:</strong><br/>• Career trajectory (do your promotions make sense?)<br/>• Education vs. title<br/>• Metric plausibility<br/>• Cognitive complexity (Bloom)<br/><br/><strong>What the score means:</strong><br/>• 90-100: Highly credible<br/>• 80-89: Credible<br/>• 70-79: Moderately credible<br/>• 60-69: Questionable<br/>• Below 60: Low credibility</div></div>
                                        {result.credibility_analysis?.career_plausibility_flags?.length > 0 && (<div style={{ marginTop: '20px' }}><h4>📈 Career Trajectory Flags</h4>{result.credibility_analysis.career_plausibility_flags.map((flag, idx) => (<div key={idx} className="credibility-flag-item"><strong>⚠️ {flag.type?.replace(/_/g, ' ').toUpperCase() || 'Flag'}</strong><div>{flag.issue}</div><div className="flag-suggestion">💡 {flag.suggestion}</div></div>))}</div>)}
                                        {result.credibility_analysis?.education_title_flags?.length > 0 && (<div style={{ marginTop: '20px' }}><h4>🎓 Education-Title Flags</h4>{result.credibility_analysis.education_title_flags.map((flag, idx) => (<div key={idx} className="credibility-flag-item"><strong>⚠️ {flag.type?.replace(/_/g, ' ').toUpperCase() || 'Flag'}</strong><div>{flag.issue}</div><div className="flag-suggestion">💡 {flag.suggestion}</div></div>))}</div>)}
                                        {result.credibility_analysis?.metric_plausibility_flags?.length > 0 && (<div style={{ marginTop: '20px' }}><h4>📊 Metric Plausibility Flags</h4>{result.credibility_analysis.metric_plausibility_flags.map((flag, idx) => (<div key={idx} className="credibility-flag-item"><strong>⚠️ {flag.type?.replace(/_/g, ' ').toUpperCase() || 'Flag'}</strong><div>{flag.issue}</div><div className="flag-suggestion">💡 {flag.suggestion}</div></div>))}</div>)}
                                        {result.credibility_analysis?.acting_title_flags?.length > 0 && (<div style={{ marginTop: '20px' }}><h4>🎭 "Acting" / Interim Title Flags</h4>{result.credibility_analysis.acting_title_flags.map((flag, idx) => (<div key={idx} className="credibility-flag-item"><strong>⚠️ {flag.type?.replace(/_/g, ' ').toUpperCase() || 'Flag'}</strong><div>{flag.issue}</div><div className="flag-suggestion">💡 {flag.suggestion}</div></div>))}</div>)}
                                        {result.credibility_analysis?.promotion_signals?.length > 0 && (<div style={{ marginTop: '20px' }}><h4>📈 Promotion Signals</h4>{result.credibility_analysis.promotion_signals.map((signal, idx) => (<div key={idx} className="success-message" style={{ background: '#ecfdf5', borderLeft: '4px solid #10b981' }}>✅ {signal}</div>))}</div>)}
                                        {result.credibility_analysis?.recency_note && <div style={{ marginTop: '15px', fontSize: '13px', color: '#6b7280', fontStyle: 'italic' }}>📅 {result.credibility_analysis.recency_note}</div>}
                                    </div>
                                )}

                                {result.semantic_analysis && (
                                    <div className="semantic-container">
                                        <div className="semantic-header"><span className="semantic-title">🎭 Semantic Positioning</span><span className={`semantic-badge ${getSemanticColor(result.semantic_analysis.position_score)}`}>{getPositionLabel(result.semantic_analysis.position_score)}</span>{result.role_type_detected && <span className="industry-badge">Industry: {result.role_type_detected}</span>}</div>
                                        <div className="semantic-stats"><div className="semantic-stat"><div className="semantic-stat-label">Position Score</div><div className="semantic-stat-value" style={{ color: Math.abs(result.semantic_analysis.position_score) <= 1.5 ? '#10b981' : Math.abs(result.semantic_analysis.position_score) <= 3.5 ? '#f59e0b' : '#ef4444' }}>{result.semantic_analysis.position_score !== undefined ? <span>{result.semantic_analysis.position_score > 0 ? '+' : ''}{result.semantic_analysis.position_score}</span> : 'N/A'}</div></div><div className="semantic-stat"><div className="semantic-stat-label">Detected Level</div><div className="semantic-stat-value">{result.semantic_analysis.detected_level || 'N/A'}</div></div><div className="semantic-stat"><div className="semantic-stat-label">Confidence</div><div className="semantic-stat-value">{result.semantic_analysis.confidence || 0}%</div></div></div>
                                        <div className="position-scale"><div className="scale-line"><div className="scale-marker" style={{ left: `${getScalePosition(result.semantic_analysis.position_score)}%` }}></div></div><div className="scale-labels"><span>Under-positioned (-5)</span><span>Aligned (0)</span><span>Over-positioned (+5)</span></div></div>
                                        <div><div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '5px' }}><span style={{ fontSize: '14px', color: '#6b7280' }}>Alignment Score</span><span style={{ fontSize: '14px', fontWeight: 'bold', color: '#1a365d' }}>{result.semantic_analysis.alignment_score}/10</span></div><div className="alignment-bar"><div className="alignment-fill" style={{ width: `${(result.semantic_analysis.alignment_score / 10) * 100}%` }}></div></div></div>
                                        <div className="explainer" onClick={() => setShowPositionExplainer(!showPositionExplainer)}>ℹ️ How to read this score (Click here)<div className={`explainer-content ${showPositionExplainer ? 'show' : ''}`}><strong>POSITION SCORE (-5 to +5)</strong><br/>Measures whether your resume language matches your experience level.<br/><br/><strong>How it's calculated:</strong><br/>• Verb strength ("Led" vs "Assisted")<br/>• Cognitive complexity (Bloom's Taxonomy)<br/>• Your job title vs. years of experience<br/>• Industry expectations<br/><br/><strong>What the score means:</strong><br/>• -1.5 to +1.5 → ✅ Perfectly aligned<br/>• -3.5 to -1.5 → ⚠️ You sound junior<br/>• +1.5 to +3.5 → ⚠️ You sound senior<br/>• Beyond ±3.5 → 🔴 Critical mismatch<br/><br/><strong>ALIGNMENT SCORE (1-10)</strong><br/>• 9-10: Excellent<br/>• 7-8: Good<br/>• 5-6: Fair<br/>• 3-4: Poor<br/>• 1-2: Critical</div></div>
                                        {result.semantic_analysis.flags?.length > 0 && (<div style={{ marginTop: '20px' }}><h4>Semantic Flags</h4>{result.semantic_analysis.flags.map((flag, idx) => (<div key={idx} className="flag-item"><strong>⚠️ {flag.type.replace('_', ' ').toUpperCase()}</strong><div style={{ marginTop: '5px' }}>"{flag.original_text}"</div><div style={{ marginTop: '5px', fontSize: '13px', color: '#ef4444' }}>{flag.issue}</div><div className="flag-suggestion">💡 {flag.suggestion}</div>{flag.example && <div style={{ marginTop: '5px', color: '#667eea' }}>{flag.example}</div>}</div>))}</div>)}
                                        {result.semantic_analysis.recommendations?.length > 0 && (<div style={{ marginTop: '20px' }}><h4>Semantic Recommendations</h4><ul style={{ paddingLeft: '20px' }}>{result.semantic_analysis.recommendations.map((rec, idx) => (<li key={idx} style={{ marginBottom: '8px' }}>{rec}</li>))}</ul></div>)}
                                    </div>
                                )}

                                {result.bloom_analysis && (<div className="v8-section"><div className="results-section"><h3>🌿 Bloom's Taxonomy Analysis</h3><div className="bloom-stats"><div className="bloom-stat"><div className="bloom-stat-label">Avg Bloom Level</div><div className="bloom-stat-value">{result.bloom_analysis.average_bloom_level}</div></div><div className="bloom-stat"><div className="bloom-stat-label">Expected Level</div><div className="bloom-stat-value">{result.bloom_analysis.expected_bloom_level}</div></div><div className="bloom-stat"><div className="bloom-stat-label">Gap</div><div className="bloom-stat-value" style={{ color: result.bloom_analysis.bloom_gap > 0 ? '#ef4444' : result.bloom_analysis.bloom_gap < 0 ? '#f59e0b' : '#10b981' }}>{result.bloom_analysis.bloom_gap > 0 ? '+' : ''}{result.bloom_analysis.bloom_gap}</div></div><div className="bloom-stat"><div className="bloom-stat-label">Assessment</div><div className="bloom-stat-value" style={{ fontSize: '14px' }}>{result.bloom_analysis.bloom_assessment}</div></div></div>{result.bloom_analysis.bullets_by_level && (<div className="bullets-by-level"><strong>Bullets by Cognitive Level:</strong>{result.bloom_analysis.bullets_by_level.map((item, idx) => (<div key={idx} style={{ marginTop: '8px', fontSize: '13px' }}><span className={`level-badge level-${item.level}`}>Level {item.level}</span><span>{item.count} bullet{item.count !== 1 ? 's' : ''}</span>{item.example && <span style={{ color: '#6b7280', marginLeft: '10px' }}>— "{item.example.substring(0, 60)}..."</span>}</div>))}</div>)}{result.bloom_analysis.flags?.length > 0 && (<div style={{ marginTop: '15px' }}>{result.bloom_analysis.flags.map((flag, idx) => (<div key={idx} className="flag-item"><strong>⚠️ {flag.type?.replace('_', ' ').toUpperCase()}</strong><div>{flag.issue}</div><div className="flag-suggestion">💡 {flag.suggestion}</div></div>))}</div>)}</div></div>)}

                                {result.grammar_issues && result.grammar_issues.length > 0 && (<div className="v8-section"><div className="results-section"><h3>📝 Grammar & Spelling Issues</h3>{result.grammar_issues.map((issue, idx) => (<div key={idx} className="grammar-item"><div className="error-type" style={{ color: issue.error_type === 'spelling' ? '#ef4444' : issue.error_type === 'grammar' ? '#f59e0b' : '#3b82f6' }}>{issue.error_type.toUpperCase()}</div><div className="original">"{issue.original_text}"</div><div style={{ fontSize: '12px', marginTop: '5px' }}>❌ {issue.issue}</div><div className="suggestion">✅ {issue.suggestion}</div></div>))}</div></div>)}

                                {result.missing_tools && result.missing_tools.length > 0 && (<div className="v8-section"><div className="results-section"><h3>🔧 Missing Tools Detected</h3>{result.missing_tools.map((tool, idx) => (<div key={idx} className="missing-tool-item"><strong>{tool.tool_name}</strong> <span style={{ color: '#6b7280' }}>({tool.category})</span><div className="flag-suggestion">💡 {tool.suggestion}</div></div>))}</div></div>)}

                                {result.weak_metrics_details && result.weak_metrics_details.length > 0 && (<div className="v8-section"><div className="results-section"><h3>📊 Weak Metrics - Need Improvement</h3>{result.weak_metrics_details.map((metric, idx) => (<div key={idx} className="weak-metric-item" style={{ borderLeftColor: '#ef4444' }}><div className="original">"{metric.bullet_text}"</div><div style={{ fontSize: '12px', marginTop: '5px' }}>❌ {metric.reason}</div><div className="suggestion">✅ {metric.fix}</div></div>))}</div></div>)}

                                {result.suggested_rewrites && result.suggested_rewrites.length > 0 && (<div className="v8-section"><div className="results-section"><h3>✏️ Suggested Rewrites</h3>{result.suggested_rewrites.map((rewrite, idx) => (<div key={idx} className="rewrite-item"><div><strong>Original:</strong> "{rewrite.original}"</div><div style={{ marginTop: '8px' }}>❌ {rewrite.issue}</div><div style={{ marginTop: '8px', color: '#10b981' }}><strong>Suggested:</strong> "{rewrite.suggested_rewrite}"</div><div style={{ marginTop: '5px', fontSize: '12px', color: '#6b7280' }}>💡 {rewrite.reason}</div></div>))}</div></div>)}

                                <div className="results-grid">
                                    <div className="results-section"><h3>✅ What's Working Well</h3>{result.strengths?.length > 0 ? (<ul className="strengths-list">{result.strengths.map((strength, idx) => (<li key={idx}>{strength}</li>))}</ul>) : (<p>No strengths identified</p>)}{result.market_positioning && (<><h3 style={{ marginTop: '20px' }}>📊 Market Positioning</h3><p><strong>Level:</strong> {result.market_positioning.level}</p><p><strong>Assessment:</strong> {result.market_positioning.assessment}</p></>)}{result.missing_keywords?.length > 0 && (<><h3 style={{ marginTop: '20px' }}>🔍 Missing Keywords</h3><ul className="missing-keywords-list">{result.missing_keywords.map((keyword, idx) => (<li key={idx}>{keyword}</li>))}</ul></>)}{result.role_adjustment_note && (<div style={{ marginTop: '15px', padding: '10px', background: '#e0f2fe', borderRadius: '8px', fontSize: '13px' }}>ℹ️ {result.role_adjustment_note}</div>)}</div>
                                    <div className="results-section"><h3>🎯 Role Match Scores</h3>{result.role_match?.length > 0 ? (<>{result.role_match.map((role, idx) => (<div key={idx} className="role-match-item"><span>{role.role}</span><span className={role.match_percentage >= 80 ? "match-strong" : "match-percentage"}>{role.match_percentage}%</span></div>))}{(() => { const disclaimer = getRoleMatchDisclaimer(result.role_match, result.total_ats_score, result.semantic_analysis?.position_score || 0); if (disclaimer) { return (<div className={`disclaimer-box ${disclaimer.type}`}><strong>{disclaimer.title}</strong><br/><br/><p>{disclaimer.message}</p><ul style={{ marginTop: '10px', marginLeft: '20px' }}>{disclaimer.actions.map((action, i) => (<li key={i}>{action}</li>))}</ul><p style={{ marginTop: '10px', fontWeight: 'bold' }}>→ {disclaimer.callToAction}</p></div>); } return null; })()}</>) : (<p>No role matches identified</p>)}{result.immediate_fixes?.length > 0 && (<><h3 style={{ marginTop: '20px' }}>🔧 Immediate Fixes</h3><ul>{result.immediate_fixes.map((fix, idx) => (<li key={idx} style={{ marginBottom: '10px' }}>{fix}</li>))}</ul></>)}</div>
                                </div>

                                {result.all_issues?.length > 0 && (<div className="results-section" style={{ marginTop: '20px' }}><h3>📋 All Identified Issues ({result.all_issues.length})</h3><table className="issues-table"><thead><tr><th>Priority</th><th>Issue</th><th>Location</th><th>How to Fix</th></tr></thead><tbody>{result.all_issues.map((issue, idx) => (<tr key={idx}><td className={`priority-${issue.priority?.toLowerCase() || 'medium'}`}>{issue.priority || 'Medium'}</td><td><strong>{issue.issue}</strong></td><td><small style={{ color: '#6b7280' }}>{issue.location || 'General'}</small></td><td>{issue.fix || issue.suggestion || 'Review and improve'}</td></tr>))}</tbody></table></div>)}

                                {result.metric_quality_breakdown && (<div className="results-section" style={{ marginTop: '20px' }}><h3>📊 Metric Quality Breakdown</h3><div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '15px', textAlign: 'center' }}><div><div style={{ fontSize: '24px', fontWeight: 'bold', color: '#ef4444' }}>{result.metric_quality_breakdown.weak_count || 0}</div><div style={{ fontSize: '12px', color: '#6b7280' }}>Weak Metrics</div></div><div><div style={{ fontSize: '24px', fontWeight: 'bold', color: '#f59e0b' }}>{result.metric_quality_breakdown.good_count || 0}</div><div style={{ fontSize: '12px', color: '#6b7280' }}>Good Metrics</div></div><div><div style={{ fontSize: '24px', fontWeight: 'bold', color: '#10b981' }}>{result.metric_quality_breakdown.strong_count || 0}</div><div style={{ fontSize: '12px', color: '#6b7280' }}>Strong Metrics</div></div></div><div style={{ marginTop: '15px', textAlign: 'center', fontSize: '13px', color: '#6b7280' }}>Overall Quality Score: {result.metric_quality_breakdown.overall_score}/100</div></div>)}

                                {!isPdfHealthCritical() && renderPdfHealthSection(false)}

                                {result.breakdown && (<div className="results-section" style={{ marginTop: '20px' }}><h3>📊 Score Breakdown</h3><table className="issues-table"><thead><tr><th>Category</th><th>Score</th><th>Max</th></tr></thead><tbody><tr><td>Header & Contact</td><td>{result.breakdown.header_contact || 0}</td><td>10</td></tr><tr><td>Keyword Density</td><td>{result.breakdown.keyword_density || 0}</td><td>20</td></tr><tr><td>Quantified Results</td><td>{result.breakdown.quantified_results || 0}</td><td>20</td></tr><tr><td>Action Verbs</td><td>{result.breakdown.action_verbs || 0}</td><td>15</td></tr><tr><td>Formatting & Structure</td><td>{result.breakdown.formatting_structure || 0}</td><td>10</td></tr><tr><td>Skills Section</td><td>{result.breakdown.skills_section || 0}</td><td>10</td></tr><tr><td>Length & Brevity</td><td>{result.breakdown.length_brevity || 0}</td><td>5</td></tr><tr><td>Publications & Projects</td><td>{result.breakdown.publications_projects || 0}</td><td>5</td></tr>{result.breakdown.recruiter_scan_penalty !== undefined && <tr><td>Recruiter Scan Penalty</td><td>{result.breakdown.recruiter_scan_penalty}</td><td>0</td></tr>}{result.breakdown.buzzword_repetition_penalty !== undefined && <tr><td>Buzzword/Repetition Penalty</td><td>{result.breakdown.buzzword_repetition_penalty}</td><td>0</td></tr>}</tbody></table></div>)}

                                <div className="email-capture"><h3>📧 Get Your Full Report</h3><p>Enter your email to receive a detailed PDF with all findings, personalized recommendations, and a complete action plan.</p>{!emailSent ? (<div className="email-input"><input type="email" placeholder="your.email@example.com" value={email} onChange={(e) => setEmail(e.target.value)} /><button onClick={handleEmailSubmit}>Send Full Report</button></div>) : (<p style={{ color: '#10b981', fontWeight: 'bold' }}>✅ Full report will be sent to {email}</p>)}</div>

                                <button onClick={() => { setResult(null); setResumeText(''); setResumeFileName(''); setResumeParseError(null); setResumePdfHealth(null); setResumeStructure(null); setJobDescriptionText(''); setJobDescriptionFileName(''); setJobDescriptionParseError(null); setEmail(''); setEmailSent(false); setShowCredibilityExplainer(false); setShowSemanticExplainer(false); setShowPositionExplainer(false); setShowCredibilityShortExplainer(false); setAnalysisStage(''); }} style={{ marginTop: '30px', background: '#6b7280', width: '100%', padding: '16px', borderRadius: '8px', border: 'none', color: 'white', fontWeight: '600', cursor: 'pointer' }}>Scan Another Resume</button>
                            </div>
                        )}
                    </div>

                    <div className="back-link"><a href="https://jkh-consulting.keron62.workers.dev/index.html">← Back to JKH Consulting</a></div>
                    <div className="privacy-note">🔒 Your resume is sent to a secure proxy for analysis. No data is stored permanently. Analytics help us improve the tool.</div>
                </div>
            );
        }

        ReactDOM.render(<ATSScanner />, document.getElementById('root'));
    </script>
</body>
</html>
