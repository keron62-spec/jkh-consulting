<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // DUAL WORKER ROUTING - V8.1
        const STANDARD_WORKER_URL = "https://ats-resume-only.keron62.workers.dev";
        const COMPARE_WORKER_URL = "https://ats-proxy.keron62.workers.dev";
        const PARSER_WORKER_URL = "https://ats-parser.keron62.workers.dev";

        function ATSScanner() {
            const [isComparisonMode, setIsComparisonMode] = useState(false);
            
            // Resume state
            const [resumeText, setResumeText] = useState('');
            const [resumeFileName, setResumeFileName] = useState('');
            const [resumeParseError, setResumeParseError] = useState(null);
            const [resumePdfHealth, setResumePdfHealth] = useState(null);
            
            // Job Description state (only used in comparison mode)
            const [jobDescriptionText, setJobDescriptionText] = useState('');
            const [jobDescriptionFileName, setJobDescriptionFileName] = useState('');
            const [jobDescriptionParseError, setJobDescriptionParseError] = useState(null);
            
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [email, setEmail] = useState('');
            const [emailSent, setEmailSent] = useState(false);
            const [showCredibilityExplainer, setShowCredibilityExplainer] = useState(false);
            const [showSemanticExplainer, setShowSemanticExplainer] = useState(false);
            const [showPositionExplainer, setShowPositionExplainer] = useState(false);
            const [showCredibilityShortExplainer, setShowCredibilityShortExplainer] = useState(false);

            // ============================================================
            // PDF HEALTH ANALYSIS (V8.1 NEW)
            // ============================================================
            
            const analyzePDFHealth = async (pdf, fileSize) => {
                const metadata = await pdf.getMetadata();
                const numPages = pdf.numPages;
                const issues = [];
                
                // Get first page for layout analysis
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 1 });
                const textContent = await page.getTextContent();
                
                // Extract text items with positions
                const textItems = textContent.items.map(item => ({
                    text: item.str,
                    x: item.transform[4],
                    y: item.transform[5],
                    width: item.width,
                    height: item.height,
                    fontName: item.fontName,
                    fontSize: item.fontSize
                }));
                
                // Detect multi-column (Y-position clustering)
                const yPositions = textItems.map(item => Math.round(item.y));
                const uniqueY = [...new Set(yPositions)];
                const yGaps = [];
                for (let i = 1; i < uniqueY.length; i++) {
                    yGaps.push(uniqueY[i] - uniqueY[i-1]);
                }
                const avgYGap = yGaps.length > 0 ? yGaps.reduce((a,b) => a+b, 0) / yGaps.length : 0;
                const isMultiColumn = avgYGap > 50 && textItems.length > 20;
                
                // Detect header (text at top of page)
                const headerItems = textItems.filter(item => item.y < 100);
                const hasHeaders = headerItems.length > 0;
                
                // Detect footer (text at bottom of page)
                const footerItems = textItems.filter(item => item.y > viewport.height - 100);
                const hasFooters = footerItems.length > 0;
                
                // Resume builder detection
                const creator = metadata.info?.Creator || '';
                const producer = metadata.info?.Producer || '';
                const isResumeBuilder = /Canva|Novoresume|Zety|Resume\.io|EnhanCV|CVMaker|Wix|Adobe Illustrator/i.test(creator + producer);
                
                // Scanned PDF detection (text length vs file size)
                const totalTextLength = textContent.items.map(i => i.str).join('').length;
                const isScanned = totalTextLength < 200 && fileSize > 200000;
                
                // Page count warning
                if (numPages > 2) {
                    issues.push({
                        type: "page_count",
                        severity: "low",
                        message: `${numPages} pages detected`,
                        fix: "Consider condensing to 2 pages for better impact"
                    });
                }
                
                // Multi-column detection
                if (isMultiColumn) {
                    issues.push({
                        type: "multi_column",
                        severity: "high",
                        message: "Multi-column layout detected",
                        fix: "Reformat your resume to a single column for ATS compatibility"
                    });
                }
                
                // Header/footer detection
                if (hasHeaders) {
                    issues.push({
                        type: "header_footer",
                        severity: "medium",
                        message: "Text detected in header area",
                        fix: "Move contact information to the body of your resume"
                    });
                }
                
                // Resume builder detection
                if (isResumeBuilder) {
                    issues.push({

            const parsePDF = async (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = async function(e) {
                        try {
                            const typedarray = new Uint8Array(e.target.result);
                            const pdf = await pdfjsLib.getDocument(typedarray).promise;
                            
                            // Extract text
                            let fullText = '';
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const textContent = await page.getTextContent();
                                const pageText = textContent.items.map(item => item.str).join(' ');
                                fullText += pageText + '\n';
                            }
                            
                            resolve({ pdf, fullText });
                        } catch (error) {
                            reject(new Error('Failed to parse PDF: ' + error.message));
                        }
                    };
                    reader.onerror = () => reject(new Error('Failed to read file'));
                    reader.readAsArrayBuffer(file);
                });
            };
