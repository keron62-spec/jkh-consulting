    <div id="root"></div>

    <script type="text/babel">
        // ============================================================
        // ERROR BOUNDARY (Defensive)
        // ============================================================
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            
            static getDerivedStateFromError(error) {
                return { hasError: true, error: error };
            }
            
            componentDidCatch(error, errorInfo) {
                console.error('React Error Boundary caught:', error, errorInfo);
            }
            
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="container">
                            <div className="card" style={{ textAlign: 'center', padding: '40px' }}>
                                <h2>⚠️ Something went wrong</h2>
                                <p>Please refresh the page and try again.</p>
                                <button 
                                    onClick={() => window.location.reload()} 
                                    style={{ marginTop: '20px', padding: '10px 20px', cursor: 'pointer', background: '#667eea', color: 'white', border: 'none', borderRadius: '8px' }}
                                >
                                    Refresh Page
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // ============================================================
        // SAFE RESULT DEFAULTS (Defensive)
        // ============================================================
        const createSafeResult = (result) => {
            if (!result) return {};
            
            return {
                total_ats_score: result.total_ats_score ?? 0,
                fit_score: result.fit_score ?? null,
                credibility_score: result.credibility_score ?? 0,
                risk_level: result.risk_level ?? 'Medium',
                interview_likelihood_score: result.interview_likelihood_score ?? null,
                model_used: result.model_used ?? 'Gemini',
                fallback_used: result.fallback_used ?? false,
                fallback_note: result.fallback_note ?? '',
                role_type_detected: result.role_type_detected ?? '',
                role_adjustment_note: result.role_adjustment_note ?? '',
                recruiter_scan_verdict: result.recruiter_scan_verdict ?? '',
                breakdown: {
                    header_contact: result.breakdown?.header_contact ?? 0,
                    keyword_density: result.breakdown?.keyword_density ?? 0,
                    quantified_results: result.breakdown?.quantified_results ?? 0,
                    action_verbs: result.breakdown?.action_verbs ?? 0,
                    formatting_structure: result.breakdown?.formatting_structure ?? 0,
                    skills_section: result.breakdown?.skills_section ?? 0,
                    length_brevity: result.breakdown?.length_brevity ?? 0,
                    publications_projects: result.breakdown?.publications_projects ?? 0,
                    recruiter_scan_penalty: result.breakdown?.recruiter_scan_penalty ?? 0,
                    buzzword_repetition_penalty: result.breakdown?.buzzword_repetition_penalty ?? 0
                },
                strengths: Array.isArray(result.strengths) ? result.strengths : [],

        // ============================================================
        // V8.2 INTERVIEW LIKELIHOOD LABELS & EASTER EGGS
        // ============================================================
        const getInterviewLabel = (score, isPerfect = false) => {
            // Easter Egg for perfect score (25%)
            if (isPerfect || score >= 25) {

            return { text: "Consider other roles", color: "#ef4444", bgColor: "#fef2f2", emoji: "" };

        // V8.2 Score Color Coding
        const getScoreColor = (score, type) => {
            if (type === 'ats') {
                if (score >= 95) return '#166534';
                if (score >= 90) return '#22c55e';
                if (score >= 80) return '#86efac';
                if (score >= 70) return '#f97316';

            }
            if (type === 'fit') {
                if (score >= 90) return '#166534';
                if (score >= 80) return '#22c55e';
                if (score >= 70) return '#86efac';
                if (score >= 60) return '#f97316';
                return '#ef4444';
            }
            if (type === 'health') {
                if (score >= 95) return '#166534';
                if (score >= 90) return '#22c55e';
                if (score >= 80) return '#86efac';
                if (score >= 70) return '#f97316';
                return '#ef4444';
            }
            return '#1e293b';
        };

        // V8.2 Resume-Only Interview Likelihood
        const calculateResumeOnlyLikelihood = (atsScore, credibilityScore, alignmentScore, bloomGap) => {
            const ats = atsScore / 100;
            const credibility = credibilityScore / 100;
            const alignment = alignmentScore / 10;
            let bloomMultiplier = 1.0;
            if (bloomGap > 0) bloomMultiplier = Math.min(1.25, 1 + (bloomGap * 0.1));
            if (bloomGap < 0) bloomMultiplier = Math.max(0.75, 1 + (bloomGap * 0.1));
            const qualityScore = ats * credibility * alignment * bloomMultiplier;
            const likelihood = 25 * Math.exp(-3 * (1 - qualityScore));
            return Math.min(25, Math.max(0, Math.round(likelihood)));
        };

        // ============================================================
        // CALCULATION FUNCTIONS - V8.1.1
        // ============================================================
        
        const calculateSemanticMultiplier = (positionScore) => {
            const absScore = Math.abs(positionScore ?? 0);
            const multiplier = (100 - (absScore * 10)) / 100;
            return Math.max(0.5, Math.min(1.0, multiplier));
        };
        
        const calculateBloomMultiplier = (candidateBloom, expectedBloom) => {
            if (!candidateBloom || candidateBloom === 0) return 1.0;
            const expected = expectedBloom ?? 3.5;
            const multiplier = candidateBloom / expected;
            return Math.min(1.25, Math.max(0.75, multiplier));
        };
        
        const getExpectedBloomFromLevel = (detectedLevel) => {
            const levelMap = {
                'Entry/Junior': 2.0,
                'Mid/Associate': 3.5,
                'Senior/Manager': 4.5,
                'Executive/Director': 5.5
            };
            return levelMap[detectedLevel] ?? 3.5;
        };
        
        const calculateFitScore = (alignmentScore, positionScore) => {
            if (alignmentScore === null || alignmentScore === undefined) return null;
            const semanticMultiplier = calculateSemanticMultiplier(positionScore ?? 0);
            const fitScore = (alignmentScore ?? 0) * semanticMultiplier;
            return Math.min(100, Math.max(0, Math.round(fitScore)));
        };
        
        const calculateInterviewLikelihood = (atsScore, fitScore, credibilityScore, alignmentScore, bloomMultiplier, semanticMultiplier) => {
            if (atsScore === null || atsScore === undefined) return null;
            if (fitScore === null || fitScore === undefined) return null;
            if (credibilityScore === null || credibilityScore === undefined) return null;
            if (alignmentScore === null || alignmentScore === undefined) return null;
            
            const ats = atsScore / 100;
            const fit = fitScore / 100;
            const credibility = credibilityScore / 100;
            const alignment = alignmentScore / 10;
            const bloom = bloomMultiplier ?? 1.0;
            const semantic = semanticMultiplier ?? 1.0;
            
            const qualityScore = ats * fit * credibility * alignment * bloom * semantic;
            const likelihood = 25 * Math.exp(-3 * (1 - qualityScore));
            return Math.min(25, Math.max(0, Math.round(likelihood)));
        };

        // ============================================================

        const STANDARD_WORKER_URL = "https://ats-resume-only.keron62.workers.dev";
        const COMPARE_WORKER_URL = "https://ats-proxy.keron62.workers.dev";

        const JD_CACHE_KEY = "jd_keywords_cache_v8";

        // ============================================================
        // PDF HEALTH ANALYSIS
        // ============================================================
        
        const analyzePDFHealth = async (pdf, fileSize) => {
            try {
                const metadata = await pdf.getMetadata();
                const numPages = pdf.numPages;
                const issues = [];
                
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 1 });
                const textContent = await page.getTextContent();
                
                const textItems = textContent.items.map(item => ({
                    text: item.str,
                    x: item.transform?.[4] ?? 0,
                    y: item.transform?.[5] ?? 0
                }));
                
                const yPositions = textItems.map(item => Math.round(item.y));
                const uniqueY = [...new Set(yPositions)];
                const yGaps = [];
                for (let i = 1; i < uniqueY.length; i++) {
                    yGaps.push(uniqueY[i] - uniqueY[i-1]);
                }
                const avgYGap = yGaps.length > 0 ? yGaps.reduce((a,b) => a+b, 0) / yGaps.length : 0;
                const isMultiColumn = avgYGap > 50 && textItems.length > 20;
                
                const headerItems = textItems.filter(item => item.y < 100);
                const hasHeaders = headerItems.length > 0;
                
                const totalTextLength = textContent.items.map(i => i.str).join('').length;
                const isScanned = totalTextLength < 200 && fileSize > 200000;
                
                const creator = metadata?.info?.Creator ?? '';
                const producer = metadata?.info?.Producer ?? '';
                const isResumeBuilder = /Canva|Novoresume|Zety|Resume\.io|EnhanCV|CVMaker|Wix|Adobe Illustrator/i.test(creator + producer);
                
                if (numPages > 2) {
                    issues.push({ type: "page_count", severity: "low", message: `${numPages} pages detected`, fix: "Consider condensing to 2 pages" });
                }
                if (isMultiColumn) {
                    issues.push({ type: "multi_column", severity: "high", message: "Multi-column layout detected", fix: "Reformat to single column for ATS compatibility" });
                }
                if (hasHeaders) {
                    issues.push({ type: "header_footer", severity: "medium", message: "Text detected in header area", fix: "Move contact info to body of resume" });
                }
                if (isResumeBuilder) {
                    issues.push({ type: "resume_builder", severity: "medium", message: `Generated by ${creator || producer || "unknown resume builder"}`, fix: "Export as plain text or use Microsoft Word" });
                }
                if (isScanned) {
                    issues.push({ type: "scanned_pdf", severity: "high", message: "No selectable text found - appears scanned", fix: "Use OCR or recreate as text-based PDF" });
                }
                if (creator.includes("Microsoft Word") || producer.includes("Microsoft Word")) {
                    issues.push({ type: "word_pdf", severity: "good", message: "Generated by Microsoft Word", fix: "No action needed - ATS-friendly" });
                }
                
                return { pageCount: numPages, issues, textLength: totalTextLength, fileSize, creator, producer };
            } catch (error) {
                console.warn("PDF Health analysis failed:", error);
                return { pageCount: 0, issues: [], textLength: 0, fileSize: fileSize, creator: '', producer: '' };
            }
        };

        const parsePDF = async (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        const typedarray = new Uint8Array(e.target.result);
                        const pdf = await pdfjsLib.getDocument({ data: typedarray }).promise;
                        let fullText = '';
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const textContent = await page.getTextContent();
                            const pageText = textContent.items.map(item => item.str).join(' ');
                            fullText += pageText + '\n';
                        }
                        resolve({ pdf, fullText });
                    } catch (error) {
                        reject(new Error('Failed to parse PDF: ' + error.message));
                    }
                };
                reader.onerror = () => reject(new Error('Failed to read file'));
                reader.readAsArrayBuffer(file);
            });
        };

        const getCachedJDKeywords = (jdText) => {
            try {
                const cache = localStorage.getItem(JD_CACHE_KEY);
                if (cache) {
                    const parsed = JSON.parse(cache);
                    const hash = (jdText.substring(0, 200) + jdText.length);
                    if (parsed.hash === hash && parsed.timestamp > Date.now() - 86400000) {
                        return parsed.keywords;
                    }
                }
            } catch (e) { console.warn("Cache read failed:", e); }
            return null;
        };
        
        const setCachedJDKeywords = (jdText, keywords) => {
            try {
                const hash = (jdText.substring(0, 200) + jdText.length);

        // ============================================================
        // MAIN COMPONENT
        // ============================================================
        
        const ATSScanner = () => {
            const [isComparisonMode, setIsComparisonMode] = React.useState(false);
            
            // Resume state
            const [resumeText, setResumeText] = React.useState('');

            let abortController = null;

            // ============================================================
            // FILE UPLOAD HANDLER
            // ============================================================
            
            const validateFile = (file) => {
                const MAX_FILE_SIZE = 10 * 1024 * 1024;
                const ALLOWED_EXTENSIONS = ['.txt', '.pdf', '.docx'];
                const ALLOWED_TYPES = ['text/plain', 'application/pdf', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
                
                if (!ALLOWED_TYPES.includes(file.type) && !ALLOWED_EXTENSIONS.some(ext => file.name.toLowerCase().endsWith(ext))) {
                    return { valid: false, error: 'Unsupported file type. Please upload .txt, .pdf, or .docx' };
                }
                if (file.size > MAX_FILE_SIZE) {
                    return { valid: false, error: 'File too large. Maximum size is 10MB.' };
                }
                if (file.size === 0) {
                    return { valid: false, error: 'File is empty. Please select a valid file.' };
                }
                return { valid: true, error: null };
            };
            
            const handleResumeFileUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                
                const validation = validateFile(file);
                if (!validation.valid) {
                    setResumeParseError(validation.error);
                    return;
                }

                setResumeFileName(file.name);
                setResumeParseError(null);
                setLoading(true);
                
                try {
                    let extractedText = '';
                    let pdfHealth = null;
                    
                    if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
                        const reader = new FileReader();
                        extractedText = await new Promise((resolve, reject) => {
                            reader.onload = (event) => resolve(event.target.result);
                            reader.onerror = () => reject(new Error('Failed to read text file'));
                            reader.readAsText(file);
                        });
                    } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
                        const { pdf, fullText } = await parsePDF(file);
                        extractedText = fullText;
                        pdfHealth = await analyzePDFHealth(pdf, file.size);
                    } else if (file.name.endsWith('.docx') || file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
                        extractedText = await extractDocx(file);
                    } else {
                        setResumeParseError('Unsupported file type');
                        setLoading(false);
                        return;
                    }
                    
                    if (!extractedText || extractedText.trim().length < 50) {
                        setResumeParseError('Could not extract enough text from the file. Minimum 50 characters required.');
                        setLoading(false);
                        return;
                    }
                    
                    setResumeText(extractedText);
                    setResumePdfHealth(pdfHealth);
                    
                    if (window.amplitude) {

                } catch (error) {

                }
            };

            const handleJobDescriptionFileUpload = async (e) => {

                if (!file) return;
                
                const validation = validateFile(file);
                if (!validation.valid) {
                    setJobDescriptionParseError(validation.error);
                    return;
                }

                setJobDescriptionFileName(file.name);
                setJobDescriptionParseError(null);
                setLoading(true);
                
                try {
                    let extractedText = '';
                    
                    if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
                        const reader = new FileReader();
                        extractedText = await new Promise((resolve, reject) => {
                            reader.onload = (event) => resolve(event.target.result);
                            reader.onerror = () => reject(new Error('Failed to read text file'));
                            reader.readAsText(file);
                        });
                    } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
                        const { fullText } = await parsePDF(file);
                        extractedText = fullText;
                    } else if (file.name.endsWith('.docx')) {
                        extractedText = await extractDocx(file);
                    } else {
                        setJobDescriptionParseError('Unsupported file type');
                        setLoading(false);
                        return;
                    }
                    
                    if (!extractedText || extractedText.trim().length < 50) {
                        setJobDescriptionParseError('Could not extract enough text from the file.');
                        setLoading(false);
                        return;
                    }
                    
                    setJobDescriptionText(extractedText);
                    
                    setAnalysisStage('Extracting keywords from job description...');
                    setIsExtractingKeywords(true);
                    
                    let keywords = getCachedJDKeywords(extractedText);
                    if (!keywords) {
                        keywords = await extractJDKeywords(extractedText);
                        if (keywords) {
                            setCachedJDKeywords(extractedText, keywords);
                        }
                    }
                    
                    if (keywords) {
                        setJdSkills(keywords.skills || []);
                        setJdRoles(keywords.roles || []);
                        const estimatedTokens = Math.ceil(extractedText.length / 4);
                        const keywordTokens = ((keywords.skills?.length || 0) + (keywords.roles?.length || 0)) * 6;
                        setTokenSavings(Math.max(0, estimatedTokens - keywordTokens));
                    } else {
                        setJdSkills([]);
                        setJdRoles([]);
                        setTokenSavings(0);

                    setIsExtractingKeywords(false);

                } finally {
                    setLoading(false);
                }
            };

            // ============================================================
            // ANALYZE RESUME
            // ============================================================
            
            const analyzeResume = async () => {
                if (isAnalyzing) return;
                
                if (!resumeText.trim()) {
                    alert('Please provide resume text or upload a file.');

                }

                if (isComparisonMode && !jobDescriptionText.trim()) {
                    alert('Please provide a job description or switch to Standard Mode.');
