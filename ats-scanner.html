<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Worker URLs
        const STANDARD_WORKER_URL = "https://ats-resume-only.jkh-consulting.deno.net";
        const COMPARE_WORKER_URL = "https://ats-jd-compare.jkh-consulting.deno.net";
        const PARSER_WORKER_URL = "https://ats-parser.keron62.workers.dev";

        function ATSScanner() {
            const [isComparisonMode, setIsComparisonMode] = useState(false);
            const [resumeText, setResumeText] = useState('');
            const [resumeFileName, setResumeFileName] = useState('');
            const [resumeParseError, setResumeParseError] = useState(null);
            const [resumePdfHealth, setResumePdfHealth] = useState(null);
            const [jobDescriptionText, setJobDescriptionText] = useState('');
            const [jobDescriptionFileName, setJobDescriptionFileName] = useState('');
            const [jobDescriptionParseError, setJobDescriptionParseError] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [email, setEmail] = useState('');
            const [emailSent, setEmailSent] = useState(false);
            const [showCredibilityShortExplainer, setShowCredibilityShortExplainer] = useState(false);
            const [showPositionExplainer, setShowPositionExplainer] = useState(false);
            const [showInterviewExplanation, setShowInterviewExplanation] = useState(false);
            const [lastAnalysisTime, setLastAnalysisTime] = useState(0);
            const [analysisStage, setAnalysisStage] = useState('');

            // Helper functions
            const getDispositionRecommendation = (score) => {
                if (score >= 20 && score <= 25) return { text: "Apply Immediately", class: "recommendation-immediate", icon: "🚀" };
                if (score >= 15 && score <= 19) return { text: "Strong Yes", class: "recommendation-strong", icon: "✅✅" };
                if (score >= 10 && score <= 14) return { text: "Yes", class: "recommendation-yes", icon: "✅" };
                if (score >= 5 && score <= 9) return { text: "50/50", class: "recommendation-fifty", icon: "⚠️" };
                if (score >= 2 && score <= 4) return { text: "Probably Not", class: "recommendation-other", icon: "❌" };
                return { text: "Consider Other Roles", class: "recommendation-other", icon: "🔄" };
            };
            
            const getActionItemCounts = (allIssues) => {
                if (!allIssues || !Array.isArray(allIssues)) return { critical: 0, important: 0, nice: 0 };
                return {
                    critical: allIssues.filter(i => (i.priority || "").toLowerCase() === "high").length,
                    important: allIssues.filter(i => (i.priority || "").toLowerCase() === "medium").length,
                    nice: allIssues.filter(i => (i.priority || "").toLowerCase() === "low").length
                };
            };
            
            const estimateFixTime = (allIssues) => {
                if (!allIssues || !Array.isArray(allIssues)) return 0;
                let minutes = 0;
                for (const issue of allIssues) {
                    const priority = (issue.priority || "").toLowerCase();
                    if (priority === "high") minutes += 15;
                    else if (priority === "medium") minutes += 8;
                    else minutes += 3;
                }
                return minutes;
            };
            
            const getRemoteReadiness = (resumeText, jdText) => {
                let score = 0;
                const remoteIndicators = ["remote", "work from home", "distributed", "virtual", "zoom", "slack", "teams", "async"];
                const lowerText = (resumeText || "").toLowerCase();
                for (const indicator of remoteIndicators) {
                    if (lowerText.includes(indicator)) score += 15;
                }
                return Math.min(100, score);
            };

            // Azure extraction
            const extractWithAzure = async (file) => {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(`${PARSER_WORKER_URL}/azure`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success && data.text && data.text.length > 100) {
                    return { text: data.text, method: 'azure', confidence: data.confidence || 95 };
                }
                throw new Error(data.error || 'Azure extraction failed');
            };

            // pdf.js layout extraction (fallback)
            const extractWithPDFjsLayout = async (file) => {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                let allItems = [];
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1 });
                    const textContent = await page.getTextContent();
                    
                    const pageItems = textContent.items.map(item => ({
                        text: item.str,
                        x: item.transform[4],
                        y: viewport.height - item.transform[5],
                        page: i
                    }));
                    
                    allItems = allItems.concat(pageItems);
                }
                
                const sorted = allItems.sort((a, b) => {
                    if (Math.abs(a.y - b.y) < 10) return a.x - b.x;
                    return a.y - b.y;
                });
                
                let text = '';
                let lastY = null;
                for (const item of sorted) {
                    if (lastY !== null && Math.abs(item.y - lastY) > 10) text += '\n';
                    text += item.text + ' ';
                    lastY = item.y;
                }
                
                return { text: text, method: 'pdfjs-layout', confidence: 60 };
            };

            // Simple PDF.js for JD
            const parsePDFsimple = async (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = async function(e) {
                        try {
                            const typedarray = new Uint8Array(e.target.result);
                            const pdf = await pdfjsLib.getDocument(typedarray).promise;
                            
                            let fullText = '';
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const textContent = await page.getTextContent();
                                const pageText = textContent.items.map(item => item.str).join(' ');
                                fullText += pageText + '\n';
                            }
                            
                            resolve({ fullText, pdf });
                        } catch (error) {
                            reject(new Error('Failed to parse PDF: ' + error.message));
                        }
                    };
                    reader.onerror = () => reject(new Error('Failed to read file'));
                    reader.readAsArrayBuffer(file);
                });
            };

            // PDF Health detection
            const analyzePdfHealth = async (pdf, fileSize) => {
                const metadata = await pdf.getMetadata();
                const numPages = pdf.numPages;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 1 });
                const pageHeight = viewport.height;
                const textContent = await page.getTextContent();
                
                const xPositions = textContent.items.map(item => item.transform[4]);
                const uniqueX = [...new Set(xPositions.map(x => Math.round(x / 50) * 50))];
                const isMultiColumn = uniqueX.length > 3 && textContent.items.length > 20;
                
                const headerItems = textContent.items.filter(item => item.transform[5] < pageHeight * 0.15);
                const hasHeaders = headerItems.length > 0;
                
                const creator = metadata.info?.Creator || '';
                const producer = metadata.info?.Producer || '';
                const isResumeBuilder = /Canva|Novoresume|Zety|Resume\.io|EnhanCV|CVMaker|Wix|Adobe Illustrator/i.test(creator + producer);
                
                const issues = [];
                if (isMultiColumn) issues.push({ type: 'multi_column', severity: 'high', message: 'Multi-column layout detected', fix: 'Convert to single-column format for ATS compatibility' });
                if (hasHeaders) issues.push({ type: 'headers_detected', severity: 'medium', message: 'Text detected in header area', fix: 'Move contact information to the body of your resume' });
                if (isResumeBuilder) issues.push({ type: 'resume_builder', severity: 'medium', message: `Generated by ${creator || producer || "unknown resume builder"}`, fix: 'Export as plain text or use Microsoft Word for ATS-friendly PDFs' });
                if (numPages > 2) issues.push({ type: 'page_count', severity: 'low', message: `${numPages} pages detected`, fix: 'Consider condensing to 2 pages' });
                
                const structureMetadata = {
                    pageCount: numPages,
                    hasMultiColumn: isMultiColumn,
                    hasHeaders: hasHeaders
                };
                
                return { issues, structureMetadata };
            };

            // Resume upload handler
            const handleResumeFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setResumeFileName(file.name);
                setResumeParseError(null);
                setLoading(true);
                setAnalysisStage('Processing PDF...');

                try {
                    let extractedText = '';
                    let pdfHealth = null;
                    let extractionMethod = '';
                    let extractionConfidence = 0;
                    
                    if (file.type === 'text/plain') {
                        const reader = new FileReader();
                        extractedText = await new Promise((resolve, reject) => {
                            reader.onload = (event) => resolve(event.target.result);
                            reader.onerror = () => reject(new Error('Failed to read text file'));
                            reader.readAsText(file);
                        });
                        extractionMethod = 'plain-text';
                        extractionConfidence = 100;
                    } else if (file.type === 'application/pdf') {
                        try {
                            setAnalysisStage('Extracting with Azure Document Intelligence...');
                            const result = await extractWithAzure(file);
                            extractedText = result.text;
                            extractionMethod = result.method;
                            extractionConfidence = result.confidence;
                            console.log(`✅ Azure extraction successful (${extractedText.length} chars)`);
                        } catch (azureError) {
                            console.warn('Azure failed, falling back to pdf.js layout:', azureError);
                            setAnalysisStage('Azure failed, using pdf.js layout...');
                            const fallbackResult = await extractWithPDFjsLayout(file);
                            extractedText = fallbackResult.text;
                            extractionMethod = fallbackResult.method;
                            extractionConfidence = fallbackResult.confidence;
                            console.log(`✅ pdf.js layout successful (${extractedText.length} chars)`);
                        }
                        
                        setAnalysisStage('Analyzing PDF health...');
                        const { pdf } = await parsePDFsimple(file);
                        const healthData = await analyzePdfHealth(pdf, file.size);
                        pdfHealth = {
                            pageCount: healthData.structureMetadata?.pageCount || 1,
                            issues: healthData.issues || [],
                            structure: healthData.structureMetadata,
                            textLength: extractedText.length,
                            fileSize: file.size,
                            extractionMethod: extractionMethod,
                            extractionConfidence: extractionConfidence
                        };
                        
                    } else {
                        setResumeParseError('Unsupported file type. Please upload .txt or .pdf');
                        setLoading(false);
                        return;
                    }
                    
                    if (!extractedText || extractedText.trim().length < 50) {
                        setResumeParseError('Could not extract enough text from the file. Try pasting as text.');
                        setLoading(false);
                        return;
                    }
                    
                    setResumeText(extractedText);
                    setResumePdfHealth(pdfHealth);
                    setAnalysisStage('');
                    setLoading(false);
                    
                } catch (error) {
                    console.error('Upload error:', error);
                    setResumeParseError(error.message);
                    setLoading(false);
                    setAnalysisStage('');
                }
            };

            // JD upload handler
            const handleJobDescriptionFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setJobDescriptionFileName(file.name);
                setJobDescriptionParseError(null);
                setLoading(true);
                setAnalysisStage('Loading job description...');

                try {
                    let extractedText = '';
                    if (file.type === 'text/plain') {
                        const reader = new FileReader();
                        extractedText = await new Promise((resolve, reject) => {
                            reader.onload = (event) => resolve(event.target.result);
                            reader.onerror = () => reject(new Error('Failed to read text file'));
                            reader.readAsText(file);
                        });
                    } else if (file.type === 'application/pdf') {
                        const { fullText } = await parsePDFsimple(file);
                        extractedText = fullText;
                    } else {
                        setJobDescriptionParseError('Unsupported file type. Please upload .txt or .pdf');
                        setLoading(false);
                        setAnalysisStage('');
                        return;
                    }
                    
                    if (!extractedText || extractedText.trim().length < 50) {
                        setJobDescriptionParseError('Could not extract enough text from the file.');
                        setLoading(false);
                        setAnalysisStage('');
                        return;
                    }
                    
                    setJobDescriptionText(extractedText);
                    setAnalysisStage('');
                    setLoading(false);
                    
                } catch (error) {
                    setJobDescriptionParseError(error.message);
                    setLoading(false);
                    setAnalysisStage('');
                }
            };

            // Analyze resume
            const analyzeResume = async () => {
                if (!resumeText.trim()) {
                    alert('Please provide resume text or upload a file.');
                    return;
                }

                if (isComparisonMode && !jobDescriptionText.trim()) {
                    alert('Please provide a job description or switch to Standard Mode.');
                    return;
                }

                const now = Date.now();
                if (now - lastAnalysisTime < 5000 && lastAnalysisTime !== 0) {
                    alert('Please wait 5 seconds between analyses.');
                    return;
                }
                setLastAnalysisTime(now);
                
                setLoading(true);
                setResult(null);
                setAnalysisStage('Analyzing with AI...');

                try {
                    const workerUrl = isComparisonMode ? COMPARE_WORKER_URL : STANDARD_WORKER_URL;

                    const payload = isComparisonMode 
                        ? { resumeText: resumeText, resumePdfHealth: resumePdfHealth, jobDescriptionText: jobDescriptionText }
                        : { resumeText: resumeText, resumePdfHealth: resumePdfHealth };

                    const response = await fetch(workerUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    setAnalysisStage('Generating results...');

                    const data = await response.json();
                    
                    if (data.error) {
                        throw new Error(data.error || 'Analysis failed');
                    }

                    if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                        let jsonText = data.candidates[0].content.parts[0].text.trim();
                        jsonText = (jsonText || '').replace(/```json\n?/g, '').replace(/```\n?/g, '');
                        const parsedResult = JSON.parse(jsonText);
                        parsedResult.pdf_health = resumePdfHealth;
                        setResult(parsedResult);
                    } else {
                        throw new Error('Invalid response format');
                    }
                } catch (error) {
                    console.error('Analysis error:', error);
                    alert('Error analyzing resume. Please try again.');
                } finally {
                    setLoading(false);
                    setAnalysisStage('');
                }
            };

            const handleEmailSubmit = async () => {
                if (!email || !email.includes('@')) {
                    alert('Please enter a valid email address');
                    return;
                }
                setEmailSent(true);
                alert('Full report will be sent to: ' + email);
            };

            const getScoreGrade = (score) => {
                if (score >= 90) return 'Excellent';
                if (score >= 80) return 'Good';
                if (score >= 70) return 'Moderate';
                return 'Needs Work';
            };

            const getCredibilityLabel = (score) => {
                if (score >= 90) return { label: 'Highly Credible', color: 'high' };
                if (score >= 80) return { label: 'Credible', color: 'high' };
                if (score >= 70) return { label: 'Moderately Credible', color: 'moderate' };
                if (score >= 60) return { label: 'Questionable Credibility', color: 'moderate' };
                return { label: 'Low Credibility', color: 'low' };
            };

            const getRiskBadgeClass = (riskLevel) => {
                if (!riskLevel) return 'risk-medium';
                const level = riskLevel.toLowerCase();
                if (level === 'low') return 'risk-low';
                if (level === 'high') return 'risk-high';
                return 'risk-medium';
            };

            const getPdfHealthScore = () => {
                if (!resumePdfHealth?.issues) return null;
                const issues = resumePdfHealth.issues;
                let score = 100;
                for (const issue of issues) {
                    if (issue.severity === 'high') score -= 15;
                    else if (issue.severity === 'medium') score -= 8;
                    else if (issue.severity === 'low') score -= 3;
                }
                return Math.max(0, Math.min(100, score));
            };

            const getPdfHealthColor = () => {
                const score = getPdfHealthScore();
                if (score === null) return '#6b7280';
                if (score >= 80) return '#10b981';
                if (score >= 70) return '#f59e0b';
                return '#ef4444';
            };

            const getPdfHealthLabel = () => {
                const score = getPdfHealthScore();
                if (score === null) return null;
                if (score >= 90) return 'Excellent';
                if (score >= 80) return 'Good';
                if (score >= 70) return 'Moderate';
                if (score >= 60) return 'Poor';
                return 'Critical';
            };

            const isPdfHealthCritical = () => {
                const score = getPdfHealthScore();
                return score !== null && score < 40;
            };

            const renderPdfHealthSection = (isCritical) => {
                if (!resumePdfHealth?.issues || resumePdfHealth.issues.length === 0) return null;
                
                const score = getPdfHealthScore();
                const label = getPdfHealthLabel();
                const structure = resumePdfHealth.structure;
                const containerClass = isCritical ? 'pdf-health-critical' : 'pdf-health-good';
                const extractionNote = resumePdfHealth.extractionMethod === 'azure' 
                    ? '✅ Text extracted via Azure Document Intelligence (high accuracy)'
                    : resumePdfHealth.extractionMethod === 'pdfjs-layout'
                    ? '⚠️ Text extracted via pdf.js layout (fallback mode)'
                    : null;
                
                return (
                    <div className={containerClass}>
                        <h3>{isCritical ? '⚠️ CRITICAL PDF HEALTH ISSUES' : '📄 PDF Health Report'}</h3>
                        <p style={{ marginBottom: '15px' }}>
                            <strong>Score: {score}/100 ({label})</strong>
                            {isCritical && ' — Fix these issues before submitting your resume.'}
                        </p>
                        {extractionNote && <div className="info-box" style={{ marginBottom: '15px', fontSize: '13px', padding: '8px 12px' }}>{extractionNote}</div>}
                        <div className="info-box" style={{ marginBottom: '15px', fontSize: '13px' }}>
                            <strong>ℹ️ About PDF Health Score</strong><br/>
                            The PDF Health Score is independent of your ATS Score. Most modern ATS systems can handle common PDF formatting.
                        </div>
                        {structure && (
                            <div className="structure-summary">
                                <div className="structure-card"><div>📄</div><div><strong>{structure.pageCount}</strong></div><div style={{ fontSize: '12px' }}>Pages</div></div>
                                <div className="structure-card"><div>{structure.hasMultiColumn ? '📰' : '✅'}</div><div><strong>{structure.hasMultiColumn ? 'Multi-Column' : 'Single Column'}</strong></div><div style={{ fontSize: '12px' }}>Layout</div></div>
                            </div>
                        )}
                        {resumePdfHealth.issues.map((issue, idx) => (
                            <div key={idx} className={`pdf-issue ${issue.severity}`}>
                                <div className="pdf-issue-header">{issue.severity === 'high' ? '🔴' : issue.severity === 'low' ? '🟢' : '🟡'} {issue.message}</div>
                                <div className="pdf-issue-fix">{issue.fix}</div>
                            </div>
                        ))}
                    </div>
                );
            };

            const renderJDComparisonWarnings = () => {
                if (!isComparisonMode || !result) return null;
                return (
                    <div>
                        {result.dealbreaker_note && (
                            <div className="dealbreaker-box">
                                <h4>🔴 DEALBREAKER DETECTED</h4>
                                <p>{result.dealbreaker_note}</p>
                                <p style={{ marginTop: '10px', fontSize: '13px', fontWeight: 'bold' }}>Your Fit Score has been capped at 40.</p>
                            </div>
                        )}
                        {result.level_gap_penalty_applied && result.level_gap_note && (
                            <div className="warning-box">
                                <strong>⚠️ LEVEL GAP PENALTY APPLIED</strong>
                                <p style={{ marginTop: '8px' }}>{result.level_gap_note}</p>
                            </div>
                        )}
                        {result.years_requirement_penalty_applied && result.years_requirement_note && (
                            <div className="warning-box">
                                <strong>📅 YEARS REQUIREMENT PENALTY</strong>
                                <p style={{ marginTop: '8px' }}>{result.years_requirement_note}</p>
                            </div>
                        )}
                        {result.overqualification_note && (
                            <div className="info-box">
                                <strong>🎯 OVERQUALIFICATION DETECTED</strong>
                                <p style={{ marginTop: '8px' }}>{result.overqualification_note}</p>
                            </div>
                        )}
                        {result.role_weighted_note && (
                            <div className="info-box">
                                <strong>📊 ROLE-WEIGHTED EXPECTATIONS</strong>
                                <p style={{ marginTop: '8px' }}>{result.role_weighted_note}</p>
                            </div>
                        )}
                    </div>
                );
            };

            const renderDispositionRecommendation = () => {
                if (!result || result.interview_likelihood_score === undefined) return null;
                const rec = getDispositionRecommendation(result.interview_likelihood_score);
                return (
                    <div className={`recommendation-box ${rec.class}`} style={{ margin: '20px 0' }}>
                        <strong>{rec.icon} {rec.text}</strong>
                        <p style={{ margin: '8px 0 0 0', fontSize: '14px' }}>
                            {rec.text === "Apply Immediately" && "Your profile is highly competitive. Apply immediately."}
                            {rec.text === "Strong Yes" && "You have a solid chance. This role is worth applying to."}
                            {rec.text === "Yes" && "Your profile is decent. Apply if interested."}
                            {rec.text === "50/50" && "This role is a long shot. Apply if you have time."}
                            {rec.text === "Probably Not" && "This role is a long shot based on your current profile."}
                            {rec.text === "Consider Other Roles" && "Consider targeting roles at a different level."}
                        </p>
                    </div>
                );
            };

            const renderInterviewExplanation = () => {
                if (!result || result.interview_likelihood_score === undefined) return null;
                return (
                    <div className="explainer" onClick={() => setShowInterviewExplanation(!showInterviewExplanation)}>
                        📊 How is Interview Likelihood calculated? (Click here)
                        <div className={`explainer-content ${showInterviewExplanation ? 'show' : ''}`}>
                            <p>Formula: 25% × e^(-3 × (1 - Quality_Score))</p>
                            <p>Based on published hiring data: LinkedIn Economic Graph (15%), HBR (10-20%), CareerBuilder (10-15%), NBER (12-18%)</p>
                            <p>A 15% score means apply to 7 similar roles → expect 1 interview.</p>
                        </div>
                    </div>
                );
            };

            const renderRemoteReadiness = () => {
                if (!isComparisonMode || !resumeText) return null;
                const remoteScore = getRemoteReadiness(resumeText, jobDescriptionText);
                if (remoteScore < 30) return null;
                return (
                    <div className="info-box" style={{ margin: '20px 0' }}>
                        <strong>🏠 Remote Work Readiness (Informational Only)</strong>
                        <p>Readiness Score: {remoteScore}/100</p>
                        <p style={{ fontSize: '11px', marginTop: '8px' }}>This score does not affect your interview likelihood.</p>
                    </div>
                );
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>🎯 ATS Resume Scanner V8.3</h1>
                        <p>AI-powered analysis of formatting, keywords, and recruiter psychology</p>
                    </div>

                    <div className="card">
                        <div className="mode-switch-container">
                            <div className="mode-switch">
                                <button className={`mode-option ${!isComparisonMode ? 'active' : ''}`} onClick={() => setIsComparisonMode(false)}>📄 Standard Mode</button>
                                <button className={`mode-option ${isComparisonMode ? 'active' : ''}`} onClick={() => setIsComparisonMode(true)}>🎯 Compare with Job Description</button>
                            </div>
                        </div>

                        {!loading && !result && (
                            <div>
                                {!isComparisonMode ? (
                                    <div>
                                        <div className="input-panel">
                                            <h3>📋 Resume</h3>
                                            <textarea placeholder="Paste your resume text here..." value={resumeText} onChange={(e) => setResumeText(e.target.value)} rows={12} />
                                            <div className="file-upload-area">
                                                <input type="file" accept=".txt,.pdf" onChange={handleResumeFileUpload} id="resume-file-upload" />
                                                <label htmlFor="resume-file-upload" style={{ cursor: 'pointer' }}>
                                                    <div className="file-upload-icon">📁</div>
                                                    <div>Click to upload resume (.txt, .pdf)</div>
                                                </label>
                                                {resumeFileName && <div className="file-name">📄 {resumeFileName}</div>}
                                            </div>
                                            {resumeParseError && <div className="parse-error">⚠️ {resumeParseError}</div>}
                                            {resumeText && !resumeParseError && <div className="success-message">✅ Resume loaded. {resumeText.length} characters.</div>}
                                        </div>
                                        <button className="analyze-btn" onClick={analyzeResume}>Analyze My Resume</button>
                                    </div>
                                ) : (
                                    <div className="dual-input-grid">
                                        <div className="input-panel">
                                            <h3>📋 Resume</h3>
                                            <textarea placeholder="Paste your resume text here..." value={resumeText} onChange={(e) => setResumeText(e.target.value)} rows={10} />
                                            <div className="file-upload-area">
                                                <input type="file" accept=".txt,.pdf" onChange={handleResumeFileUpload} id="resume-file-upload-compare" />
                                                <label htmlFor="resume-file-upload-compare" style={{ cursor: 'pointer' }}>
                                                    <div className="file-upload-icon">📁</div>
                                                    <div>Upload Resume (.txt, .pdf)</div>
                                                </label>
                                                {resumeFileName && <div className="file-name">📄 {resumeFileName}</div>}
                                            </div>
                                            {resumeParseError && <div className="parse-error">⚠️ {resumeParseError}</div>}
                                            {resumeText && !resumeParseError && <div className="success-message">✅ {resumeText.length} characters</div>}
                                        </div>
                                        <div className="input-panel">
                                            <h3>🎯 Job Description</h3>
                                            <textarea placeholder="Paste the job description here..." value={jobDescriptionText} onChange={(e) => setJobDescriptionText(e.target.value)} rows={10} />
                                            <div className="file-upload-area">
                                                <input type="file" accept=".txt,.pdf" onChange={handleJobDescriptionFileUpload} id="jd-file-upload" />
                                                <label htmlFor="jd-file-upload" style={{ cursor: 'pointer' }}>
                                                    <div className="file-upload-icon">📁</div>
                                                    <div>Upload Job Description (.txt, .pdf)</div>
                                                </label>
                                                {jobDescriptionFileName && <div className="file-name">📄 {jobDescriptionFileName}</div>}
                                            </div>
                                            {jobDescriptionParseError && <div className="parse-error">⚠️ {jobDescriptionParseError}</div>}
                                            {jobDescriptionText && !jobDescriptionParseError && <div className="success-message">✅ {jobDescriptionText.length} characters</div>}
                                        </div>
                                    </div>
                                )}
                                {isComparisonMode && <button className="analyze-btn" onClick={analyzeResume} style={{ marginTop: '30px' }}>Analyze Resume Against Job Description</button>}
                            </div>
                        )}

                        {loading && (
                            <div className="loading">
                                <div className="spinner"></div>
                                <p>Analyzing your resume...</p>
                                {analysisStage && <div className="loading-stage">{analysisStage}</div>}
                            </div>
                        )}

                        {result && (
                            <div className="results-container">
                                {result.fallback_used && <div className="fallback-note">ℹ️ {result.fallback_note || `Analysis completed using ${result.model_used || result.provider_used}`}</div>}
                                {result.provider_used && !result.fallback_used && <div className="info-box" style={{ marginBottom: '20px', padding: '8px 16px', textAlign: 'center' }}>🔍 Analyzed by: {result.provider_used} {result.model_used ? `(${result.model_used})` : ''}</div>}
                                {renderJDComparisonWarnings()}
                                {renderDispositionRecommendation()}

                                <div className="score-grid">
                                    <div className="score-card"><h4>ATS Score</h4><div className="score-value">{result.total_ats_score}</div><div className="score-label">/100 ({getScoreGrade(result.total_ats_score)})</div></div>
                                    {resumePdfHealth && resumePdfHealth.issues && <div className="score-card"><h4>📄 PDF Health Score</h4><div className="score-value" style={{ color: getPdfHealthColor() }}>{getPdfHealthScore()}</div><div className="score-label">/100 ({getPdfHealthLabel()})</div></div>}
                                    {result.fit_score !== null && <div className="score-card"><h4>🎯 Fit Score</h4><div className="score-value">{result.fit_score}</div><div className="score-label">/100 (Role Match)</div></div>}
                                    {result.interview_likelihood_score !== null && <div className="score-card"><h4>📞 Interview Likelihood</h4><div className="score-value">{result.interview_likelihood_score}</div><div className="score-label">/100</div></div>}
                                    <div className="score-card"><h4>⚠️ Risk Level</h4><div className={`risk-badge ${getRiskBadgeClass(result.risk_level)}`}>{result.risk_level || 'Medium'}</div></div>
                                </div>

                                {renderInterviewExplanation()}
                                {isPdfHealthCritical() && renderPdfHealthSection(true)}

                                {result.credibility_score !== undefined && (
                                    <div className="credibility-container">
                                        <div className="credibility-header"><span className="credibility-title">🔒 Credibility Score</span><span className={`credibility-badge ${getCredibilityLabel(result.credibility_score).color}`}>{getCredibilityLabel(result.credibility_score).label}</span></div>
                                        <div><div className="credibility-bar"><div className="credibility-fill" style={{ width: `${result.credibility_score}%` }}></div></div></div>
                                        <div className="explainer" onClick={() => setShowCredibilityShortExplainer(!showCredibilityShortExplainer)}>Credibility Score Explained (Click here)<div className={`explainer-content ${showCredibilityShortExplainer ? 'show' : ''}`}>Measures how believable your resume is based on career trajectory, education-title fit, metric plausibility, and cognitive complexity.</div></div>
                                        {result.credibility_analysis?.recency_note && <div style={{ marginTop: '15px', fontSize: '13px', color: '#6b7280', fontStyle: 'italic' }}>📅 {result.credibility_analysis.recency_note}</div>}
                                    </div>
                                )}

                                {result.semantic_analysis && (
                                    <div className="semantic-container">
                                        <div className="semantic-header"><span className="semantic-title">🎭 Semantic Positioning</span><span className="industry-badge">Industry: {result.role_type_detected || 'Unknown'}</span></div>
                                        <div className="semantic-stats">
                                            <div className="semantic-stat"><div className="semantic-stat-label">Position Score</div><div className="semantic-stat-value">{result.semantic_analysis.position_score !== undefined ? (result.semantic_analysis.position_score > 0 ? '+' : '') + result.semantic_analysis.position_score : 'N/A'}</div></div>
                                            <div className="semantic-stat"><div className="semantic-stat-label">Detected Level</div><div className="semantic-stat-value">{result.semantic_analysis.detected_level || 'N/A'}</div></div>
                                        </div>
                                        <div className="explainer" onClick={() => setShowPositionExplainer(!showPositionExplainer)}>ℹ️ How to read this score (Click here)<div className={`explainer-content ${showPositionExplainer ? 'show' : ''}`}>Position Score (-5 to +5): -1.5 to +1.5 = Perfectly aligned. Beyond = misalignment.</div></div>
                                    </div>
                                )}

                                {result.bloom_analysis && (
                                    <div className="v8-section"><div className="results-section">
                                        <h3>🌿 Bloom's Taxonomy Analysis</h3>
                                        <div className="bloom-stats">
                                            <div className="bloom-stat"><div className="bloom-stat-label">Avg Bloom Level</div><div className="bloom-stat-value">{result.bloom_analysis.average_bloom_level}</div></div>
                                            <div className="bloom-stat"><div className="bloom-stat-label">Expected Level</div><div className="bloom-stat-value">{result.bloom_analysis.expected_bloom_level}</div></div>
                                            <div className="bloom-stat"><div className="bloom-stat-label">Gap</div><div className="bloom-stat-value">{result.bloom_analysis.bloom_gap}</div></div>
                                        </div>
                                    </div></div>
                                )}

                                {result.grammar_issues && result.grammar_issues.length > 0 && (
                                    <div className="v8-section"><div className="results-section">
                                        <h3>📝 Grammar & Spelling Issues</h3>
                                        {result.grammar_issues.map((issue, idx) => (
                                            <div key={idx} className="grammar-item">
                                                <div className="original">"{issue.original_text}"</div>
                                                <div style={{ fontSize: '12px' }}>❌ {issue.issue}</div>
                                                <div className="suggestion">✅ {issue.suggestion}</div>
                                            </div>
                                        ))}
                                    </div></div>
                                )}

                                {result.missing_tools && result.missing_tools.length > 0 && (
                                    <div className="v8-section"><div className="results-section">
                                        <h3>🔧 Missing Tools Detected</h3>
                                        {result.missing_tools.map((tool, idx) => (
                                            <div key={idx} className="missing-tool-item"><strong>{tool.tool_name}</strong> ({tool.category})<div className="flag-suggestion">💡 {tool.suggestion}</div></div>
                                        ))}
                                    </div></div>
                                )}

                                <div className="results-grid">
                                    <div className="results-section">
                                        <h3>✅ What's Working Well</h3>
                                        {result.strengths?.length > 0 ? (<ul className="strengths-list">{result.strengths.map((s, i) => (<li key={i}>{s}</li>))}</ul>) : (<p>No strengths identified</p>)}
                                        {result.missing_keywords?.length > 0 && (<><h3 style={{ marginTop: '20px' }}>🔍 Missing Keywords</h3><ul className="missing-keywords-list">{result.missing_keywords.map((k, i) => (<li key={i}>{k}</li>))}</ul></>)}
                                    </div>
                                    <div className="results-section">
                                        <h3>🎯 Role Match Scores</h3>
                                        {result.role_match?.length > 0 ? (
                                            result.role_match.map((role, idx) => (
                                                <div key={idx} className="role-match-item"><span>{role.role}</span><span className={role.match_percentage >= 80 ? "match-strong" : "match-percentage"}>{role.match_percentage}%</span></div>
                                            ))
                                        ) : (<p>No role matches identified</p>)}
                                        {result.immediate_fixes?.length > 0 && (<><h3 style={{ marginTop: '20px' }}>🔧 Immediate Fixes</h3><ul>{result.immediate_fixes.map((fix, idx) => (<li key={idx} style={{ marginBottom: '10px' }}>{fix}</li>))}</ul></>)}
                                    </div>
                                </div>

                                {result.all_issues && result.all_issues.length > 0 && (() => {
                                    const counts = getActionItemCounts(result.all_issues);
                                    const totalTime = estimateFixTime(result.all_issues);
                                    return (
                                        <div className="results-section" style={{ marginTop: '20px' }}>
                                            <h3>📋 Priority Breakdown & Estimated Time</h3>
                                            <div style={{ display: 'flex', gap: '20px', flexWrap: 'wrap', marginBottom: '15px' }}>
                                                {counts.critical > 0 && <span><span className="priority-badge priority-critical">Critical</span> {counts.critical} issues</span>}
                                                {counts.important > 0 && <span><span className="priority-badge priority-important">Important</span> {counts.important} issues</span>}
                                                {counts.nice > 0 && <span><span className="priority-badge priority-nice">Nice-to-have</span> {counts.nice} issues</span>}
                                            </div>
                                            {totalTime > 0 && <div className="info-box"><strong>⏱️ Estimated time to address critical + important issues:</strong> {totalTime} minutes</div>}
                                            <table className="issues-table"><thead><tr><th>Priority</th><th>Issue</th><th>Location</th><th>How to Fix</th></tr></thead><tbody>
                                                {result.all_issues.map((issue, idx) => (
                                                    <tr key={idx}><td className={`priority-${(issue.priority || 'medium').toLowerCase()}`}>{issue.priority || 'Medium'}</td><td><strong>{issue.issue}</strong></td><td><small>{issue.location || 'General'}</small></td><td>{issue.fix || issue.suggestion || 'Review and improve'}</td></tr>
                                                ))}
                                            </tbody></table>
                                        </div>
                                    );
                                })()}

                                {result.metric_quality_breakdown && (
                                    <div className="results-section" style={{ marginTop: '20px' }}>
                                        <h3>📊 Metric Quality Breakdown</h3>
                                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '15px', textAlign: 'center' }}>
                                            <div><div style={{ fontSize: '24px', fontWeight: 'bold', color: '#ef4444' }}>{result.metric_quality_breakdown.weak_count || 0}</div><div>Weak Metrics</div></div>
                                            <div><div style={{ fontSize: '24px', fontWeight: 'bold', color: '#f59e0b' }}>{result.metric_quality_breakdown.good_count || 0}</div><div>Good Metrics</div></div>
                                            <div><div style={{ fontSize: '24px', fontWeight: 'bold', color: '#10b981' }}>{result.metric_quality_breakdown.strong_count || 0}</div><div>Strong Metrics</div></div>
                                        </div>
                                        <div style={{ textAlign: 'center', marginTop: '15px' }}>Overall Quality Score: {result.metric_quality_breakdown.overall_score}/100</div>
                                    </div>
                                )}

                                {!isPdfHealthCritical() && renderPdfHealthSection(false)}
                                {renderRemoteReadiness()}

                                {result.breakdown && (
                                    <div className="results-section" style={{ marginTop: '20px' }}>
                                        <h3>📊 Score Breakdown</h3>
                                        <table className="issues-table"><thead><tr><th>Category</th><th>Score</th><th>Max</th></tr></thead><tbody>
                                            <tr><td>Header & Contact</td><td>{result.breakdown.header_contact || 0}</td><td>10</td></tr>
                                            <tr><td>Keyword Density</td><td>{result.breakdown.keyword_density || 0}</td><td>20</td></tr>
                                            <tr><td>Quantified Results</td><td>{result.breakdown.quantified_results || 0}</td><td>20</td></tr>
                                            <tr><td>Action Verbs</td><td>{result.breakdown.action_verbs || 0}</td><td>15</td></tr>
                                            <tr><td>Formatting & Structure</td><td>{result.breakdown.formatting_structure || 0}</td><td>10</td></tr>
                                            <tr><td>Skills Section</td><td>{result.breakdown.skills_section || 0}</td><td>10</td></tr>
                                            <tr><td>Length & Brevity</td><td>{result.breakdown.length_brevity || 0}</td><td>5</td></tr>
                                            <tr><td>Publications & Projects</td><td>{result.breakdown.publications_projects || 0}</td><td>5</td></tr>
                                        </tbody></table>
                                    </div>
                                )}

                                <div className="email-capture">
                                    <h3>📧 Get Your Full Report</h3>
                                    <p>Enter your email to receive a detailed PDF with all findings.</p>
                                    {!emailSent ? (
                                        <div className="email-input">
                                            <input type="email" placeholder="your.email@example.com" value={email} onChange={(e) => setEmail(e.target.value)} />
                                            <button onClick={handleEmailSubmit}>Send Full Report</button>
                                        </div>
                                    ) : (<p style={{ color: '#10b981' }}>✅ Full report will be sent to {email}</p>)}
                                </div>

                                <button onClick={() => { setResult(null); setResumeText(''); setResumeFileName(''); setResumeParseError(null); setResumePdfHealth(null); setJobDescriptionText(''); setJobDescriptionFileName(''); setJobDescriptionParseError(null); setEmail(''); setEmailSent(false); setShowInterviewExplanation(false); setAnalysisStage(''); }} style={{ marginTop: '30px', background: '#6b7280', width: '100%', padding: '16px', borderRadius: '8px', border: 'none', color: 'white', fontWeight: '600', cursor: 'pointer' }}>Scan Another Resume</button>
                            </div>
                        )}
                    </div>

                    <div className="back-link"><a href="https://jkh-consulting.keron62.workers.dev/index.html">← Back to JKH Consulting</a></div>
                    <div className="privacy-note">🔒 Your resume is sent to a secure proxy for analysis. No data is stored permanently.</div>
                </div>
            );
        }

        ReactDOM.render(<ATSScanner />, document.getElementById('root'));
    </script>
</body>
</html>
