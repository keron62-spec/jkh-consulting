<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Resume Scanner | JKH Consulting</title>
    <meta name="description" content="Get your resume scored by an AI-powered ATS scanner. Instant feedback on formatting, keywords, and what recruiters actually see.">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-L3589N2B7D"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-L3589N2B7D');
    </script>

    <!-- Amplitude SDK -->
    <script src="https://cdn.amplitude.com/script/61a7757800aeb4ea0e6f5471d9af5704.js"></script>
    <script>
        window.amplitude.init('61a7757800aeb4ea0e6f5471d9af5704', {
            fetchRemoteConfig: true,
            autocapture: {
                pageViews: true,
                sessions: true,
                elementInteractions: true
            }
        });
    </script>

    <!-- Contentsquare (Hotjar) Tracking -->
    <script src="https://t.contentsquare.net/uxa/5f94e8837c5a5.js"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e5e7eb;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #6b7280;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            min-height: 300px;
            padding: 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 20px;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .file-upload {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 60px 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f9fafb;
        }

        .file-upload:hover {
            background: #f3f4f6;
            border-color: #764ba2;
        }

        .file-upload input {
            display: none;
        }

        .file-upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .score-display {
            text-align: center;
            padding: 40px;
        }

        .score-circle {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            position: relative;
        }

        .score-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
        }

        .score-label {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .score-excellent { color: #10b981; }
        .score-good { color: #3b82f6; }
        .score-moderate { color: #f59e0b; }
        .score-poor { color: #ef4444; }

        .semantic-container {
            background: #f8fafc;
            border-radius: 16px;
            padding: 24px;
            margin: 30px 0;
            border: 1px solid #e2e8f0;
        }

        .semantic-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .semantic-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a365d;
        }

        .semantic-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .semantic-badge.green { background: #d1fae5; color: #065f46; }
        .semantic-badge.orange { background: #fed7aa; color: #9b2c1d; }
        .semantic-badge.red { background: #fee2e2; color: #991b1b; }

        .position-scale {
            margin: 20px 0;
            position: relative;
            padding: 20px 0;
        }

        .scale-line {
            height: 8px;
            background: linear-gradient(90deg, #ef4444 0%, #f59e0b 25%, #10b981 50%, #f59e0b 75%, #ef4444 100%);
            border-radius: 4px;
            position: relative;
            margin: 20px 0;
        }

        .scale-marker {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #1a365d;
            border: 3px solid white;
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .scale-marker:hover {
            transform: translate(-50%, -50%) scale(1.2);
        }

        .scale-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 12px;
            color: #6b7280;
        }

        .alignment-bar {
            background: #e5e7eb;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
            margin: 15px 0;
        }

        .alignment-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .semantic-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
            padding: 15px;
            background: white;
            border-radius: 12px;
        }

        .semantic-stat {
            text-align: center;
        }

        .semantic-stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 5px;
        }

        .semantic-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #1a365d;
        }

        .explainer {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0 0;
            font-size: 14px;
            color: #475569;
            line-height: 1.5;
            cursor: pointer;
        }

        .explainer:hover {
            background: #e2e8f0;
        }

        .explainer-content {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #cbd5e1;
            font-size: 13px;
            display: none;
        }

        .explainer-content.show {
            display: block;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
            text-align: left;
        }

        .results-section {
            background: #f9fafb;
            border-radius: 12px;
            padding: 20px;
        }

        .results-section h3 {
            color: #1a365d;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        .disclaimer-box {
            background: #fffbeb;
            border-left: 4px solid #f59e0b;
            padding: 16px;
            margin-top: 16px;
            border-radius: 8px;
            font-size: 14px;
        }

        .disclaimer-box.critical {
            background: #fef2f2;
            border-left-color: #ef4444;
        }

        .disclaimer-box.warning {
            background: #fffbeb;
            border-left-color: #f59e0b;
        }

        .disclaimer-box.suggestion {
            background: #eff6ff;
            border-left-color: #3b82f6;
        }

        .issues-table {
            width: 100%;
            border-collapse: collapse;
        }

        .issues-table th,
        .issues-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: top;
        }

        .issues-table th {
            background: #f9fafb;
            font-weight: 600;
            color: #374151;
        }

        .priority-high { 
            color: #ef4444; 
            font-weight: 600;
        }

        .priority-medium { 
            color: #f59e0b; 
        }

        .priority-low { 
            color: #6b7280; 
        }

        .strengths-list, .missing-keywords-list {
            list-style: none;
            padding: 0;
        }

        .strengths-list li, .missing-keywords-list li {
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .strengths-list li:before {
            content: "✅ ";
            color: #10b981;
        }

        .missing-keywords-list li:before {
            content: "🔍 ";
            color: #f59e0b;
        }

        .flag-item {
            background: #fef2f2;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #ef4444;
        }

        .flag-suggestion {
            margin-top: 8px;
            font-size: 13px;
            color: #6b7280;
        }

        .role-match-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
        }

        .match-percentage {
            font-weight: bold;
            color: #667eea;
        }

        .match-strong {
            color: #10b981;
            font-weight: bold;
        }

        .email-capture {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 30px;
            border-radius: 12px;
            margin-top: 30px;
            text-align: center;
        }

        .email-input {
            display: flex;
            gap: 10px;
            max-width: 500px;
            margin: 20px auto 0;
        }

        .email-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
        }

        .email-input button {
            width: auto;
            padding: 12px 30px;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .privacy-note {
            font-size: 12px;
            color: #6b7280;
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
            .email-input {
                flex-direction: column;
            }
            .email-input button {
                width: 100%;
            }
            .semantic-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Cloudflare Worker Proxy Endpoint
        const WORKER_URL = "https://ats-proxy.keron62.workers.dev";

        function ATSScanner() {
            const [activeTab, setActiveTab] = useState('paste');
            const [resumeText, setResumeText] = useState('');
            const [fileName, setFileName] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [email, setEmail] = useState('');
            const [emailSent, setEmailSent] = useState(false);
            const [showExplainer, setShowExplainer] = useState(false);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setFileName(file.name);
                const reader = new FileReader();
                
                reader.onload = (event) => {
                    setResumeText(event.target.result);
                };
                
                reader.readAsText(file);
            };

            const analyzeResume = async () => {
                if (!resumeText.trim()) {
                    alert('Please paste your resume text or upload a file first.');
                    return;
                }

                setLoading(true);
                setResult(null);

                if (window.amplitude) {
                    amplitude.track('Resume Analysis Started', {
                        source: activeTab,
                        timestamp: new Date().toISOString()
                    });
                }

                try {
                    const response = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ resumeText: resumeText })
                    });

                    const data = await response.json();
                    
                    if (data.error) {
                        console.error('Worker Error:', data.error);
                        throw new Error(data.error || 'Analysis failed');
                    }

                    if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                        let jsonText = data.candidates[0].content.parts[0].text.trim();
                        jsonText = jsonText.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                        const parsedResult = JSON.parse(jsonText);
                        setResult(parsedResult);
                        
                        if (window.amplitude) {
                            amplitude.track('Resume Analysis Completed', {
                                total_score: parsedResult.total_ats_score,
                                semantic_score: parsedResult.semantic_analysis?.position_score,
                                label: parsedResult.ats_label
                            });
                        }
                    } else {
                        throw new Error('Invalid response format from worker');
                    }
                } catch (error) {
                    console.error('Analysis error:', error);
                    alert('Error analyzing resume. Please try again.');
                    
                    if (window.amplitude) {
                        amplitude.track('Resume Analysis Error', {
                            error: error.message
                        });
                    }
                } finally {
                    setLoading(false);
                }
            };

            const handleEmailSubmit = async () => {
                if (!email || !email.includes('@')) {
                    alert('Please enter a valid email address');
                    return;
                }

                if (window.amplitude) {
                    amplitude.track('Email Captured', {
                        email_domain: email.split('@')[1],
                        score: result?.total_ats_score
                    });
                }

                if (typeof gtag !== 'undefined') {
                    gtag('event', 'generate_lead', {
                        'event_category': 'ATS_Scanner',
                        'event_label': email
                    });
                }

                setEmailSent(true);
                alert('Full report will be sent to: ' + email + '\n\n(Email integration coming soon - your data has been captured)');
            };

            const getScoreColor = (score) => {
                if (score >= 90) return 'score-excellent';
                if (score >= 80) return 'score-good';
                if (score >= 70) return 'score-moderate';
                return 'score-poor';
            };

            const getScoreGrade = (score) => {
                if (score >= 90) return 'Excellent';
                if (score >= 80) return 'Good';
                if (score >= 70) return 'Moderate';
                return 'Needs Work';
            };

            const getSemanticColor = (positionScore) => {
                if (positionScore >= -1.5 && positionScore <= 1.5) return 'green';
                if (Math.abs(positionScore) <= 3.5) return 'orange';
                return 'red';
            };

            const getPositionLabel = (positionScore) => {
                if (positionScore < -3.5) return 'Severely Under-positioned';
                if (positionScore < -1.5) return 'Moderately Under-positioned';
                if (positionScore < 0) return 'Slightly Under-positioned';
                if (positionScore === 0) return 'Perfectly Positioned';
                if (positionScore <= 1.5) return 'Slightly Over-positioned';
                if (positionScore <= 3.5) return 'Moderately Over-positioned';
                return 'Severely Over-positioned';
            };

            const getScalePosition = (positionScore) => {
                return ((positionScore + 5) / 10) * 100;
            };

            const getAlignmentScoreColor = (score) => {
                if (score >= 8) return 'green';
                if (score >= 5) return 'orange';
                return 'red';
            };

            const getRoleMatchDisclaimer = (roleMatches, atsScore, positionScore) => {
                if (!roleMatches || roleMatches.length === 0) return null;
                
                const strongMatches = roleMatches.filter(m => m.match_percentage >= 80);
                const strongMatchCount = strongMatches.length;
                const isPositionedOutsideRange = Math.abs(positionScore) > 1.5;
                const isLowAts = atsScore < 70;
                
                if (strongMatchCount === 0) {
                    return {
                        type: 'critical',
                        title: 'CRITICAL: No strong role matches detected',
                        message: `Your ATS score (${atsScore}) and positioning score (${positionScore > 0 ? '+' : ''}${positionScore}) are directly limiting your role matches.`,
                        actions: [
                            'Replace weak verbs ("assisted" → "managed" where accurate)',
                            'Add quantified results to bullets without metrics',
                            'Review the "Missing Keywords" section below'
                        ],
                        callToAction: 'Start with "Immediate Fixes" at the bottom of this report'
                    };
                }
                
                if (strongMatchCount === 1) {
                    if (isLowAts || isPositionedOutsideRange) {
                        const isOverPositioned = positionScore > 1.5;
                        const positionAdvice = isOverPositioned 
                            ? 'Your over-positioning score suggests your language may be inflated for your level.'
                            : positionScore < -1.5 
                                ? 'Your under-positioning score suggests your language sounds junior for your level.'
                                : 'Your ATS score indicates missing keywords and weak quantification.';
                        
                        return {
                            type: 'warning',
                            title: '⚠️ You have 1 strong role match. Aim for 2-3.',
                            message: `${positionAdvice} This is limiting you to only 1 strong match.`,
                            actions: [
                                isOverPositioned ? 'Review the "potential_inflation" flags in your analysis' : 'Replace weak verbs with stronger alternatives where accurate',
                                isOverPositioned ? 'Dial back ownership claims where accuracy allows' : 'Add quantified results to bullets without metrics',
                                'Add keywords from adjacent roles to broaden your appeal'
                            ],
                            callToAction: 'Aim for 2-3 roles above 80% for better job search breadth'
                        };
                    } else {
                        return {
                            type: 'suggestion',
                            title: '📌 You have 1 strong role match. Aim for 2-3.',
                            message: 'Your resume is well-positioned, but you are currently only competitive for 1 role.',
                            actions: [
                                'Add keywords from adjacent roles (see "Missing Keywords")',
                                'Tailor your resume to a second target role',
                                'Strengthen the 2nd and 3rd bullet in each role section'
                            ],
                            callToAction: 'Aim for 2-3 roles above 80% to keep your options open'
                        };
                    }
                }
                
                return null;
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>🎯 ATS Resume Scanner</h1>
                        <p>AI-powered analysis of formatting, keywords, and recruiter psychology</p>
                    </div>

                    <div className="card">
                        {!loading && !result && (
                            <>
                                <div className="tabs">
                                    <button 
                                        className={`tab ${activeTab === 'paste' ? 'active' : ''}`}
                                        onClick={() => setActiveTab('paste')}
                                    >
                                        📋 Paste Text
                                    </button>
                                    <button 
                                        className={`tab ${activeTab === 'upload' ? 'active' : ''}`}
                                        onClick={() => setActiveTab('upload')}
                                    >
                                        📄 Upload File
                                    </button>
                                </div>

                                {activeTab === 'paste' && (
                                    <div>
                                        <textarea
                                            placeholder="Paste your resume text here..."
                                            value={resumeText}
                                            onChange={(e) => setResumeText(e.target.value)}
                                        />
                                        <button onClick={analyzeResume}>
                                            Analyze My Resume
                                        </button>
                                    </div>
                                )}

                                {activeTab === 'upload' && (
                                    <div>
                                        <label className="file-upload">
                                            <input 
                                                type="file" 
                                                accept=".txt"
                                                onChange={handleFileUpload}
                                            />
                                            <div className="file-upload-icon">📁</div>
                                            <div>
                                                {fileName ? (
                                                    <strong>{fileName}</strong>
                                                ) : (
                                                    <>
                                                        <strong>Click to upload</strong> or drag and drop<br/>
                                                        <small>Supports .txt files</small>
                                                    </>
                                                )}
                                            </div>
                                        </label>
                                        <button 
                                            onClick={analyzeResume}
                                            disabled={!resumeText}
                                            style={{marginTop: '20px'}}
                                        >
                                            Analyze My Resume
                                        </button>
                                    </div>
                                )}
                            </>
                        )}

                        {loading && (
                            <div className="loading">
                                <div className="spinner"></div>
                                <p>Analyzing your resume...</p>
                            </div>
                        )}

                        {result && (
                            <div className="score-display">
                                {/* ATS Score Section */}
                                <div className="score-circle">
                                    <svg width="200" height="200">
                                        <circle
                                            cx="100"
                                            cy="100"
                                            r="90"
                                            fill="none"
                                            stroke="#e5e7eb"
                                            strokeWidth="12"
                                        />
                                        <circle
                                            cx="100"
                                            cy="100"
                                            r="90"
                                            fill="none"
                                            stroke={result.total_ats_score >= 90 ? '#10b981' : 
                                                   result.total_ats_score >= 80 ? '#3b82f6' :
                                                   result.total_ats_score >= 70 ? '#f59e0b' : '#ef4444'}
                                            strokeWidth="12"
                                            strokeDasharray={`${(result.total_ats_score / 100) * 565} 565`}
                                            strokeLinecap="round"
                                            transform="rotate(-90 100 100)"
                                        />
                                    </svg>
                                    <div className={`score-number ${getScoreColor(result.total_ats_score)}`}>
                                        {result.total_ats_score}
                                    </div>
                                </div>

                                <div className={`score-label ${getScoreColor(result.total_ats_score)}`}>
                                    {getScoreGrade(result.total_ats_score)}
                                </div>

                                {/* Semantic Analysis Section */}
                                {result.semantic_analysis && (
                                    <div className="semantic-container">
                                        <div className="semantic-header">
                                            <span className="semantic-title">🎭 Semantic Positioning</span>
                                            <span className={`semantic-badge ${getSemanticColor(result.semantic_analysis.position_score)}`}>
                                                {getPositionLabel(result.semantic_analysis.position_score)}
                                            </span>
                                        </div>

                                        <div className="position-scale">
                                            <div className="scale-line">
                                                <div 
                                                    className="scale-marker"
                                                    style={{ left: `${getScalePosition(result.semantic_analysis.position_score)}%` }}
                                                    title={`Position: ${result.semantic_analysis.position_score}`}
                                                ></div>
                                            </div>
                                            <div className="scale-labels">
                                                <span>Under-positioned (-5)</span>
                                                <span>Aligned (0)</span>
                                                <span>Over-positioned (+5)</span>
                                            </div>
                                        </div>

                                        <div>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '5px' }}>
                                                <span style={{ fontSize: '14px', color: '#6b7280' }}>Alignment Score</span>
                                                <span style={{ fontSize: '14px', fontWeight: 'bold', color: '#1a365d' }}>
                                                    {result.semantic_analysis.alignment_score}/10
                                                </span>
                                            </div>
                                            <div className="alignment-bar">
                                                <div 
                                                    className="alignment-fill" 
                                                    style={{ width: `${(result.semantic_analysis.alignment_score / 10) * 100}%` }}
                                                ></div>
                                            </div>
                                        </div>

                                        <div className="semantic-stats">
                                            <div className="semantic-stat">
                                                <div className="semantic-stat-label">Position Score</div>
                                                <div className="semantic-stat-value" style={{ 
                                                    color: Math.abs(result.semantic_analysis.position_score) <= 1.5 ? '#10b981' :
                                                           Math.abs(result.semantic_analysis.position_score) <= 3.5 ? '#f59e0b' : '#ef4444'
                                                }}>
                                                    {result.semantic_analysis.position_score > 0 ? '+' : ''}{result.semantic_analysis.position_score}
                                                </div>
                                            </div>
                                            <div className="semantic-stat">
                                                <div className="semantic-stat-label">Detected Level</div>
                                                <div className="semantic-stat-value">{result.semantic_analysis.detected_level}</div>
                                            </div>
                                            <div className="semantic-stat">
                                                <div className="semantic-stat-label">Confidence</div>
                                                <div className="semantic-stat-value">{result.semantic_analysis.confidence}%</div>
                                            </div>
                                        </div>

                                        <div className="explainer" onClick={() => setShowExplainer(!showExplainer)}>
                                            ℹ️ How to read this score
                                            <div className={`explainer-content ${showExplainer ? 'show' : ''}`}>
                                                <strong>POSITION SCORE (-5 to +5):</strong><br/>
                                                Scores range from <strong>-5.0 (under-positioned)</strong> to <strong>+5.0 (over-positioned)</strong>.
                                                <strong>0 is perfectly aligned</strong> — your verbs match your experience level.<br/><br/>
                                                🟢 <strong>-1.5 to +1.5:</strong> Acceptable range. Minor improvements can reach perfect alignment.<br/>
                                                🟠 <strong>-3.5 to -1.5 or +1.5 to +3.5:</strong> Moderate adjustments needed. Recruiters may notice positioning issues.<br/>
                                                🔴 <strong>Beyond ±3.5:</strong> Critical repositioning needed. High risk of being perceived as over or under-qualified.<br/><br/>
                                                <strong>ALIGNMENT SCORE (1-10):</strong><br/>
                                                Measures how close your resume is to perfectly positioned.<br/><br/>
                                                <strong>10:</strong> Perfect alignment — no changes needed<br/>
                                                <strong>8-9:</strong> Excellent — minor tweaks only<br/>
                                                <strong>6-7:</strong> Good — moderate adjustments recommended<br/>
                                                <strong>4-5:</strong> Fair — significant improvements needed<br/>
                                                <strong>1-3:</strong> Poor — major repositioning required<br/><br/>
                                                The alignment score complements the position score. A position score of +2.5 (moderately over-positioned) with an alignment score of 6 means you have moderate work to do. The same position score with an alignment score of 3 means urgent changes are needed.
                                            </div>
                                        </div>

                                        {result.semantic_analysis.flags && result.semantic_analysis.flags.length > 0 && (
                                            <div style={{ marginTop: '20px' }}>
                                                <h4 style={{ marginBottom: '10px', color: '#1a365d' }}>Semantic Flags</h4>
                                                {result.semantic_analysis.flags.map((flag, idx) => (
                                                    <div key={idx} className="flag-item">
                                                        <strong>⚠️ {flag.type.replace('_', ' ').toUpperCase()}</strong>
                                                        <div style={{ marginTop: '5px' }}>"{flag.original_text}"</div>
                                                        <div style={{ marginTop: '5px', fontSize: '13px', color: '#ef4444' }}>{flag.issue}</div>
                                                        <div className="flag-suggestion">
                                                            💡 {flag.suggestion}
                                                            {flag.example && <div style={{ marginTop: '5px', color: '#667eea' }}>{flag.example}</div>}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {result.semantic_analysis.recommendations && result.semantic_analysis.recommendations.length > 0 && (
                                            <div style={{ marginTop: '20px' }}>
                                                <h4 style={{ marginBottom: '10px', color: '#1a365d' }}>Semantic Recommendations</h4>
                                                <ul style={{ paddingLeft: '20px' }}>
                                                    {result.semantic_analysis.recommendations.map((rec, idx) => (
                                                        <li key={idx} style={{ marginBottom: '8px' }}>{rec}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}
                                    </div>
                                )}

                                <div className="results-grid">
                                    <div className="results-section">
                                        <h3>✅ What's Working Well</h3>
                                        {result.strengths && result.strengths.length > 0 ? (
                                            <ul className="strengths-list">
                                                {result.strengths.map((strength, idx) => (
                                                    <li key={idx}>{strength}</li>
                                                ))}
                                            </ul>
                                        ) : (
                                            <p>No strengths identified</p>
                                        )}

                                        {result.market_positioning && (
                                            <>
                                                <h3 style={{marginTop: '20px'}}>📊 Market Positioning</h3>
                                                <p><strong>Level:</strong> {result.market_positioning.level}</p>
                                                <p><strong>Assessment:</strong> {result.market_positioning.assessment}</p>
                                            </>
                                        )}

                                        {result.missing_keywords && result.missing_keywords.length > 0 && (
                                            <>
                                                <h3 style={{marginTop: '20px'}}>🔍 Missing Keywords</h3>
                                                <ul className="missing-keywords-list">
                                                    {result.missing_keywords.map((keyword, idx) => (
                                                        <li key={idx}>{keyword}</li>
                                                    ))}
                                                </ul>
                                            </>
                                        )}
                                    </div>

                                    <div className="results-section">
                                        <h3>🎯 Role Match Scores</h3>
                                        {result.role_match && result.role_match.length > 0 ? (
                                            <>
                                                {result.role_match.map((role, idx) => (
                                                    <div key={idx} className="role-match-item">
                                                        <span>{role.role}</span>
                                                        <span className={role.match_percentage >= 80 ? "match-strong" : "match-percentage"}>
                                                            {role.match_percentage}%
                                                        </span>
                                                    </div>
                                                ))}
                                                
                                                {(() => {
                                                    const disclaimer = getRoleMatchDisclaimer(
                                                        result.role_match, 
                                                        result.total_ats_score, 
                                                        result.semantic_analysis?.position_score || 0
                                                    );
                                                    if (disclaimer) {
                                                        return (
                                                            <div className={`disclaimer-box ${disclaimer.type}`}>
                                                                <strong>{disclaimer.title}</strong><br/><br/>
                                                                <p>{disclaimer.message}</p>
                                                                <ul style={{ marginTop: '10px', marginLeft: '20px' }}>
                                                                    {disclaimer.actions.map((action, i) => (
                                                                        <li key={i}>{action}</li>
                                                                    ))}
                                                                </ul>
                                                                <p style={{ marginTop: '10px', fontWeight: 'bold' }}>→ {disclaimer.callToAction}</p>
                                                            </div>
                                                        );
                                                    }
                                                    return null;
                                                })()}
                                            </>
                                        ) : (
                                            <p>No role matches identified</p>
                                        )}

                                        {result.immediate_fixes && result.immediate_fixes.length > 0 && (
                                            <>
                                                <h3 style={{marginTop: '20px'}}>🔧 Immediate Fixes</h3>
                                                <ul>
                                                    {result.immediate_fixes.map((fix, idx) => (
                                                        <li key={idx} style={{marginBottom: '10px'}}>{fix}</li>
                                                    ))}
                                                </ul>
                                            </>
                                        )}
                                    </div>
                                </div>

                                {result.all_issues && result.all_issues.length > 0 && (
                                    <div className="results-section" style={{marginTop: '20px'}}>
                                        <h3>📋 All Identified Issues ({result.all_issues.length})</h3>
                                        <table className="issues-table">
                                            <thead>
                                                <tr>
                                                    <th>Priority</th>
                                                    <th>Issue</th>
                                                    <th>Location</th>
                                                    <th>How to Fix</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {result.all_issues.map((issue, idx) => (
                                                    <tr key={idx}>
                                                        <td className={`priority-${issue.priority ? issue.priority.toLowerCase() : 'medium'}`}>
                                                            {issue.priority || 'Medium'}
                                                        </td>
                                                        <td><strong>{issue.issue}</strong></td>
                                                        <td><small style={{color: '#6b7280'}}>{issue.location || 'General'}</small></td>
                                                        <td>{issue.fix || issue.suggestion || 'Review and improve'}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {result.breakdown && (
                                    <div className="results-section" style={{marginTop: '20px'}}>
                                        <h3>📊 Score Breakdown</h3>
                                        <table className="issues-table">
                                            <thead>
                                                <tr>
                                                    <th>Category</th>
                                                    <th>Score</th>
                                                    <th>Max</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr><td>Header & Contact</td><td>{result.breakdown.header_contact || 0}</td><td>10</td></tr>
                                                <tr><td>Keyword Density</td><td>{result.breakdown.keyword_density || 0}</td><td>20</td></tr>
                                                <tr><td>Quantified Results</td><td>{result.breakdown.quantified_results || 0}</td><td>20</td></tr>
                                                <tr><td>Action Verbs</td><td>{result.breakdown.action_verbs || 0}</td><td>15</td></tr>
                                                <tr><td>Formatting & Structure</td><td>{result.breakdown.formatting_structure || 0}</td><td>10</td></tr>
                                                <tr><td>Skills Section</td><td>{result.breakdown.skills_section || 0}</td><td>10</td></tr>
                                                <tr><td>Length & Brevity</td><td>{result.breakdown.length_brevity || 0}</td><td>5</td></tr>
                                                <tr><td>Publications & Projects</td><td>{result.breakdown.publications_projects || 0}</td><td>5</td></tr>
                                                {result.breakdown.recruiter_scan_penalty !== undefined && (
                                                    <tr><td>Recruiter Scan Penalty</td><td>{result.breakdown.recruiter_scan_penalty}</td><td>0</td></tr>
                                                )}
                                                {result.breakdown.buzzword_repetition_penalty !== undefined && (
                                                    <tr><td>Buzzword/Repetition Penalty</td><td>{result.breakdown.buzzword_repetition_penalty}</td><td>0</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                <div className="email-capture">
                                    <h3>📧 Get Your Full Report</h3>
                                    <p>Enter your email to receive a detailed PDF with all findings, personalized recommendations, and a complete action plan.</p>
                                    {!emailSent ? (
                                        <div className="email-input">
                                            <input
                                                type="email"
                                                placeholder="your.email@example.com"
                                                value={email}
                                                onChange={(e) => setEmail(e.target.value)}
                                            />
                                            <button onClick={handleEmailSubmit}>
                                                Send Full Report
                                            </button>
                                        </div>
                                    ) : (
                                        <p style={{color: '#10b981', fontWeight: 'bold', marginTop: '20px'}}>
                                            ✅ Full report will be sent to {email}
                                        </p>
                                    )}
                                </div>

                                <button 
                                    onClick={() => {
                                        setResult(null);
                                        setResumeText('');
                                        setFileName('');
                                        setEmail('');
                                        setEmailSent(false);
                                        setShowExplainer(false);
                                        
                                        if (window.amplitude) {
                                            amplitude.track('New Scan Started', {});
                                        }
                                    }}
                                    style={{marginTop: '30px', background: '#6b7280'}}
                                >
                                    Scan Another Resume
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="back-link">
                        <a href="https://jkh-consulting.keron62.workers.dev/index.html">← Back to JKH Consulting</a>
                    </div>
                    
                    <div className="privacy-note">
                        🔒 Your resume is sent to a secure proxy for analysis. No data is stored permanently. Analytics help us improve the tool.
                    </div>
                </div>
            );
        }

        ReactDOM.render(<ATSScanner />, document.getElementById('root'));
    </script>
</body>
</html>
