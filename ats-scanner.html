            border: none;

            font-size: 14px;
            color: #6b7280;
        }

        .results-container {
            margin-top: 30px;
        }

            gap: 20px;
            margin-bottom: 20px;

            visibility: hidden;
            width: 280px;
            background-color: #1f2937;
            color: white;
            text-align: center;
            border-radius: 8px;
            padding: 10px;
            position: absolute;
            z-index: 1000;

            left: 50%;

            font-weight: normal;
            line-height: 1.4;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Worker URLs
        const STANDARD_WORKER_URL = "https://ats-resume-only.keron62.workers.dev";
        const COMPARE_WORKER_URL = "https://ats-proxy.keron62.workers.dev";
        const AGGREGATOR_URL = "https://ats-aggregator.keron62.workers.dev";
        
        // Extraction Pipeline URLs
        const PDFJS_EXTRACT_URL = "https://ats-pdfjs-extract.keron62.workers.dev";
        const UNSTRUCTURED_URL = "https://unstructured-parser.keron62.workers.dev";
        const AZURE_URL = "https://ats-parser.keron62.workers.dev/azure";
        
        // Stage 2 Parser
        const STAGE_2_PARSER_URL = "https://ats-stage-2-parser.keron62.workers.dev";

        // ============================================================
        // RESUME BUILDER DATABASE
        // ============================================================
        
        const RESUME_BUILDERS = {
            'createfreecv': { name: 'CreateFreeCV.com', rating: 5, label: 'Excellent', class: 'rating-excellent', recommendation: 'Highly recommended - produces clean ATS-friendly PDFs' },
            'microsoft_word': { name: 'Microsoft Word', rating: 5, label: 'Excellent', class: 'rating-excellent', recommendation: 'Gold standard - use "Save as PDF"' },
            'google_docs': { name: 'Google Docs', rating: 4, label: 'Good', class: 'rating-good', recommendation: 'Good - use "Download as PDF"' },
            'adobe_indesign': { name: 'Adobe InDesign', rating: 4, label: 'Good', class: 'rating-good', recommendation: 'Good if exported correctly' },
            'latex': { name: 'LaTeX', rating: 5, label: 'Excellent', class: 'rating-excellent', recommendation: 'Excellent for technical resumes' },
            'canva': { name: 'Canva', rating: 2, label: 'Poor', class: 'rating-poor', recommendation: 'Avoid for ATS - injects obfuscated code' },
            'novoresume': { name: 'Novoresume', rating: 1, label: 'Avoid', class: 'rating-avoid', recommendation: 'Not recommended - known to break ATS systems' },
            'zety': { name: 'Zety', rating: 1, label: 'Avoid', class: 'rating-avoid', recommendation: 'Avoid - produces corrupted PDFs' },
            'resume_io': { name: 'Resume.io', rating: 1, label: 'Avoid', class: 'rating-avoid', recommendation: 'Not recommended - poor ATS compatibility' },
            'enhancv': { name: 'EnhanCV', rating: 2, label: 'Poor', class: 'rating-poor', recommendation: 'Poor ATS compatibility' },
            'wix': { name: 'Wix', rating: 1, label: 'Avoid', class: 'rating-avoid', recommendation: 'Avoid for resumes' },
            'unknown': { name: 'Unknown Builder', rating: 3, label: 'Unknown', class: 'rating-poor', recommendation: 'Test your PDF before applying' }
        };

        function detectResumeBuilder(junkPatterns, text, metadata) {
            // Canva detection
            if ((text.includes('xmp:') && text.includes('rdf:')) || junkPatterns.includes('stream_operators')) {
                return RESUME_BUILDERS['canva'];
            }
            // Microsoft Word detection (good)
            if (text.includes('/Creator( Microsoft Word)') || text.includes('Microsoft Word')) {
                return RESUME_BUILDERS['microsoft_word'];
            }
            // Google Docs detection
            if (text.includes('Google Docs') || text.includes('/Producer( Google Docs)')) {
                return RESUME_BUILDERS['google_docs'];
            }
            // CreateFreeCV detection (excellent)
            if (text.toLowerCase().includes('createfreecv')) {
                return RESUME_BUILDERS['createfreecv'];
            }
            // Novoresume detection
            if (junkPatterns.includes('random_strings') && junkPatterns.includes('metadata')) {
                return RESUME_BUILDERS['novoresume'];
            }
            return RESUME_BUILDERS['unknown'];
        }

        // ============================================================
        // PDF QUALITY ANALYSIS FUNCTION
        // ============================================================
        
        function analyzePDFQuality(text, metadata = {}) {
            const issues = [];
            let score = 100;
            let junkPatterns = [];
            
            // Pattern 1: PDF stream operators
            const streamPattern = /\b\d+\s+\d+\s+\d+\s+\d+\s+\d+\s+\d+\s+d1\b/g;
            const streamMatches = text.match(streamPattern) || [];
            if (streamMatches.length > 0) {
                issues.push({
                    type: 'PDF Stream Obfuscation',
                    severity: 'high',
                    message: `Detected ${streamMatches.length} PDF stream operators - common in "Print to PDF" output`,
                    fix: 'Use "Save as PDF" instead of "Print to PDF"'
                });
                score -= Math.min(30, streamMatches.length * 5);
                junkPatterns.push('stream_operators');
            }
            
            // Pattern 2: XMP/RDF metadata injection
            if (text.includes('xmp:') || text.includes('rdf:') || text.includes('?xpacket')) {
                issues.push({
                    type: 'Metadata Injection',
                    severity: 'medium',
                    message: 'Embedded XMP/RDF metadata detected - adds noise to ATS parsing',
                    fix: 'Export from Microsoft Word directly, not from browser'
                });
                score -= 15;
                junkPatterns.push('metadata');
            }
            
            // Pattern 3: Random short alphanumeric strings
            const randomStringPattern = /\b[A-Z0-9]{4,6}\b/g;
            const randomMatches = text.match(randomStringPattern) || [];
            const suspiciousRandom = randomMatches.filter(s => !isRealWord(s));
            if (suspiciousRandom.length > 10) {
                issues.push({
                    type: 'Obfuscated Content',
                    severity: 'medium',
                    message: `${suspiciousRandom.length} suspicious short strings detected - PDF may be corrupted`,
                    fix: 'Re-save PDF from original document using "Save As" not "Print"'
                });
                score -= 20;
                junkPatterns.push('random_strings');
            }
            
            // Pattern 4: High ratio of numbers to letters
            const numbers = (text.match(/\d/g) || []).length;
            const letters = (text.match(/[A-Za-z]/g) || []).length;
            const ratio = letters / (numbers + 1);
            if (ratio < 0.5 && numbers > 200) {
                issues.push({
                    type: 'High Noise Ratio',
                    severity: 'high',
                    message: `High number-to-text ratio (${numbers} numbers vs ${letters} letters) - PDF likely generated incorrectly`,
                    fix: 'Use Microsoft Word → Save as PDF (not Print to PDF)'
                });
                score -= 25;
                junkPatterns.push('high_noise');
            }
            
            // Pattern 5: Duplicated words
            const duplicatePattern = /\b(\w+)\s+\1\s+\1\b/g;
            const duplicates = text.match(duplicatePattern) || [];
            if (duplicates.length > 0) {
                issues.push({
                    type: 'Word Duplication',
                    severity: 'low',
                    message: `${duplicates.length} instances of word duplication detected`,
                    fix: 'PDF conversion corrupted the text flow'
                });
                score -= 5 * Math.min(10, duplicates.length);
                junkPatterns.push('duplication');
            }
            
            // Pattern 6: Missing line breaks
            const lines = text.split('\n');
            const longLines = lines.filter(l => l.length > 200 && !l.includes('•'));
            if (longLines.length > 3) {
                issues.push({
                    type: 'Missing Line Breaks',
                    severity: 'medium',
                    message: `${longLines.length} lines exceed 200 characters without breaks - achievements may be concatenated`,
                    fix: 'Ensure PDF preserves line breaks by using proper PDF export'
                });
                score -= 10;
                junkPatterns.push('no_breaks');
            }
            
            // Pattern 7: Corrupted special characters
            const corruptedEntities = (text.match(/&amp;|&#39;|&quot;|&lt;|&gt;/g) || []).length;
            if (corruptedEntities > 5) {
                issues.push({
                    type: 'Corrupted Entities',
                    severity: 'low',
                    message: `${corruptedEntities} corrupted HTML entities detected (e.g., &amp; instead of &)`,
                    fix: 'Use a different PDF export method'
                });
                score -= 5;
                junkPatterns.push('entities');
            }
            
            score = Math.max(0, Math.min(100, Math.round(score)));
            
            const detectedBuilder = detectResumeBuilder(junkPatterns, text, metadata);
            
            return {
                score: score,
                is_clean: score >= 70,
                needs_fallback: score < 70,
                issues: issues,
                junk_patterns: junkPatterns,
                detected_builder: detectedBuilder,
                stats: {
                    total_chars: text.length,
                    numbers_count: numbers,
                    letters_count: letters,
                    junk_estimate_percent: Math.round((1 - (letters / (text.length || 1))) * 100),
                    junk_chars: text.length - letters,
                    clean_chars: letters
                },
                recommendation: getRecommendation(score, junkPatterns, detectedBuilder)
            };
        }
        
        function isRealWord(word) {
            const commonWords = ['the', 'and', 'for', 'are', 'was', 'were', 'this', 'that', 'have', 'from', 'with', 'your', 'will', 'can', 'not', 'you', 'amp', '39', 'quot'];
            return commonWords.includes(word.toLowerCase()) || word.length > 6;
        }
        
        function getRecommendation(score, patterns, builder) {
            if (score >= 90) return { action: 'none', message: 'PDF quality is excellent. No action needed.' };
            if (score >= 70) return { action: 'review', message: 'PDF has minor issues. Consider re-saving for best results.' };
            
            if (builder.rating <= 2) {
                return {
                    action: 'critical',
                    message: `Your PDF was created with ${builder.name}, which is known to produce ATS-unfriendly PDFs.`,
                    urgency: 'high',
                    alternative: 'CreateFreeCV.com or Microsoft Word'
                };
            }
            
            if (patterns.includes('stream_operators') || patterns.includes('high_noise')) {
                return {
                    action: 'critical',
                    message: 'PDF contains significant formatting corruption. Re-save using: Microsoft Word → File → Save As → PDF',
                    urgency: 'high',
                    alternative: 'Microsoft Word'
                };
            }
            
            return {
                action: 'recommended',
                message: 'PDF has formatting issues that may affect ATS parsing. For best results, export from Microsoft Word directly.',
                urgency: 'medium',
                alternative: 'Microsoft Word or CreateFreeCV.com'
            };
        }

        function highlightJunk(text, junkPatterns) {
            let highlighted = text;
            
            if (junkPatterns.includes('stream_operators')) {
                highlighted = highlighted.replace(/\b\d+\s+\d+\s+\d+\s+\d+\s+\d+\s+\d+\s+d1\b/g,
                    match => `<span class="junk-stream">${match}</span>`);
            }
            
            if (junkPatterns.includes('random_strings')) {
                highlighted = highlighted.replace(/\b[A-Z0-9]{4,8}\b/g,
                    match => `<span class="junk-random">${match}</span>`);
            }
            
            if (junkPatterns.includes('metadata')) {
                highlighted = highlighted.replace(/xmp:|rdf:|rdf:Description|\?xpacket/g,
                    match => `<span class="junk-metadata">${match}</span>`);
            }
            
            if (junkPatterns.includes('duplication')) {
                highlighted = highlighted.replace(/\b(\w+)\s+\1\s+\1\b/g,
                    match => `<span class="junk-duplicate">${match}</span>`);
            }
            
            return highlighted;
        }

        function ATSScanner() {
            const [isComparisonMode, setIsComparisonMode] = useState(false);
            
            // Resume state
            const [resumeText, setResumeText] = useState('');
            const [resumeFileName, setResumeFileName] = useState('');
            const [resumeParseError, setResumeParseError] = useState(null);
            const [resumePdfHealth, setResumePdfHealth] = useState(null);
            const [extractionMethod, setExtractionMethod] = useState(null);
            const [pdfQuality, setPdfQuality] = useState(null);
            const [showComparison, setShowComparison] = useState(false);
            const [structuredResume, setStructuredResume] = useState(null);
            
            // Job Description state
            const [jobDescriptionText, setJobDescriptionText] = useState('');
            const [jobDescriptionFileName, setJobDescriptionFileName] = useState('');
            const [jobDescriptionParseError, setJobDescriptionParseError] = useState(null);
            
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [email, setEmail] = useState('');
            const [emailSent, setEmailSent] = useState(false);
            const [showCredibilityShortExplainer, setShowCredibilityShortExplainer] = useState(false);
            const [showPositionExplainer, setShowPositionExplainer] = useState(false);
            const [analysisStage, setAnalysisStage] = useState('');

            // ============================================================
            // INTERVIEW LIKELIHOOD CALCULATION
            // ============================================================
            
            function calculateInterviewLikelihood(result) {
                const ats = (result.total_ats_score || 65) / 100;
                const fit = (result.fit_score || 60) / 100;
                const credibility = (result.credibility_score || 65) / 100;
                const alignment = (result.semantic_analysis?.alignment_score || 5) / 10;
                
                let bloomMultiplier = result.bloom_analysis?.bloom_multiplier || 1.0;
                bloomMultiplier = Math.min(1.25, Math.max(0.75, bloomMultiplier));
                
                const positionScore = Math.abs(result.semantic_analysis?.position_score || 0);
                const semanticMultiplier = Math.max(0.5, (100 - (positionScore * 10)) / 100);
                
                const qualityScore = ats * fit * credibility * alignment * bloomMultiplier * semanticMultiplier;
                const interviewLikelihood = 25 * Math.exp(-3 * (1 - qualityScore));
                
                return Math.min(25, Math.max(0, Math.round(interviewLikelihood)));
            }
            
            function getInterviewFlag(score) {
                if (score >= 20) return { text: "🚀 Apply Immediately", class: "flag-deep-green" };
                if (score >= 13) return { text: "✅ Strong Yes", class: "flag-strong-green" };
                if (score >= 8) return { text: "👍 Yes", class: "flag-green" };
                if (score >= 3) return { text: "⚠️ 50/50", class: "flag-orange" };
                return { text: "🔴 Consider Other Roles", class: "flag-red" };
            }
            
            function getApplyRecommendation(score) {
                if (score >= 20) return { text: "🚀 APPLY IMMEDIATELY", context: "Your profile is highly competitive. Top 1% of candidates." };
                if (score >= 13) return { text: "✅ STRONG YES", context: "You have a solid chance. Top 10% of candidates." };
                if (score >= 8) return { text: "👍 YES", context: "Your profile is decent. Apply if interested." };
                if (score >= 3) return { text: "⚠️ 50/50", context: "This role is a long shot. Apply only if you have time." };
                return { text: "🔴 CONSIDER OTHER ROLES", context: "Target roles at a different level or strengthen your resume first." };
            }

            // ============================================================
            // PDF EXTRACTION FUNCTIONS
            // ============================================================
            
            async function extractWithPDFjsExtract(file) {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(PDFJS_EXTRACT_URL, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success && data.text && data.text.length > 100) {
                    return { 
                        text: data.text, 
                        method: 'pdfjs-extract', 
                        confidence: data.confidence || 85,
                        pages: data.pages || 1,
                        quality: data.quality || null
                    };
                }
                throw new Error(data.error || 'pdf.js-extract extraction failed');
            }
            
            async function extractWithAzure(file) {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(AZURE_URL, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success && data.text && data.text.length > 100) {
                    return { 
                        text: data.text, 
                        method: 'azure', 
                        confidence: data.confidence || 95,
                        pages: data.pages || 1,
                        quality: data.quality || null
                    };
                }
                throw new Error(data.error || 'Azure extraction failed');
            }
            
            async function extractWithDocx(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = async function(e) {
                        try {
                            const arrayBuffer = e.target.result;
                            const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                            if (result.value && result.value.length > 50) {
                                resolve({ 
                                    text: result.value, 
                                    method: 'docx', 
                                    confidence: 98,
                                    pages: 1
                                });
                            } else {
                                reject(new Error('Could not extract text from DOCX'));
                            }
                        } catch (error) {
                            reject(new Error('Failed to parse DOCX: ' + error.message));
                        }
                    };
                    reader.onerror = () => reject(new Error('Failed to read file'));
                    reader.readAsArrayBuffer(file);
                });
            }
            
            async function extractWithQualityCheck(file) {
                let pdfjsResult = null;
                let quality = null;
                let rawText = null;
                
                // Handle DOCX files directly (no quality check needed)
                if (file.name.endsWith('.docx') || file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
                    const result = await extractWithDocx(file);
                    return result;
                }
                
                // Handle TXT files directly
                if (file.type === 'text/plain') {
                    const reader = new FileReader();
                    const text = await new Promise((resolve, reject) => {
                        reader.onload = (event) => resolve(event.target.result);
                        reader.onerror = () => reject(new Error('Failed to read text file'));
                        reader.readAsText(file);
                    });
                    return { text: text, method: 'plain-text', confidence: 100, pages: 1 };
                }
                
                // Step 1: Try pdf.js-extract (fast detection)
                try {
                    pdfjsResult = await extractWithPDFjsExtract(file);
                    rawText = pdfjsResult.text;
                    quality = analyzePDFQuality(rawText);
                    
                    pdfjsResult.quality_analysis = quality;
                    pdfjsResult.is_clean = quality.is_clean;
                    
                } catch (error) {
                    console.warn('pdf.js-extract failed:', error);
                    quality = { is_clean: false, needs_fallback: true, score: 0, issues: [], stats: { junk_chars: 0, clean_chars: 0 } };
                }
                
                // Step 2: If quality is poor, fall back to Azure
                if (quality.needs_fallback) {
                    console.log('⚠️ Poor PDF quality detected, falling back to Azure...');
                    
                    try {
                        const azureResult = await extractWithAzure(file);
                        azureResult.quality_analysis = quality;
                        azureResult.was_fallback = true;
                        azureResult.raw_text = rawText;
                        azureResult.fallback_reason = 'PDF quality issues detected';
                        return azureResult;
                    } catch (azureError) {
                        console.warn('Azure fallback failed:', azureError);
                        if (pdfjsResult) return pdfjsResult;
                        throw azureError;
                    }
                }
                
                // Step 3: Quality is good, return pdf.js result
                return pdfjsResult;
            }

            // ============================================================
            // STAGE 2 PARSER (Raw Text → Structured JSON)
            // ============================================================
            
            async function callStage2Parser(rawText) {
                const response = await fetch(STAGE_2_PARSER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resumeText: rawText })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    console.warn('Stage 2 parser error:', data.error);
                    return null;
                }
                
                return data;
            }

            // ============================================================
            // RESUME UPLOAD HANDLER
            // ============================================================
            
            const handleResumeFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setResumeFileName(file.name);
                setResumeParseError(null);
                setExtractionMethod(null);
                setPdfQuality(null);
                setStructuredResume(null);
                setShowComparison(false);
                setLoading(true);
                setAnalysisStage('Processing file...');

                try {
                    let extractedText = '';
                    let extractionInfo = null;
                    let qualityAnalysis = null;
                    
                    // Use quality-checked extraction
                    const result = await extractWithQualityCheck(file);
                    extractedText = result.text;
                    extractionInfo = { 
                        method: result.method, 
                        confidence: result.confidence, 
                        pages: result.pages || 1
                    };
                    
                    // Store quality analysis if available
                    if (result.quality_analysis) {
                        qualityAnalysis = result.quality_analysis;
                        setPdfQuality(qualityAnalysis);
                    }
                    
                    // Set extraction method display
                    if (result.method === 'pdfjs-extract') {
                        if (qualityAnalysis && !qualityAnalysis.is_clean) {
                            setExtractionMethod('📄 pdf.js-extract (Junk detected - using Azure)');
                        } else {
                            setExtractionMethod('📄 pdf.js-extract (Clean)');
                        }
                    } else if (result.method === 'azure') {
                        setExtractionMethod('✅ Azure Document Intelligence (Cleaned)');
                    } else if (result.method === 'docx') {
                        setExtractionMethod('📄 Microsoft Word');
                    } else if (result.method === 'plain-text') {
                        setExtractionMethod('📄 Plain Text');
                    }
                    
                    console.log(`✅ Extraction successful via ${result.method}: ${extractedText.length} chars`);
                    
                    if (!extractedText || extractedText.trim().length < 50) {
                        setResumeParseError('Could not extract enough text from the file. Try pasting as text.');
                        setLoading(false);
                        setAnalysisStage('');
                        return;
                    }
                    
                    // Call Stage 2 Parser
                    setAnalysisStage('Parsing resume structure...');
                    const structured = await callStage2Parser(extractedText);
                    if (structured && !structured.error) {
                        setStructuredResume(structured);
                        console.log('✅ Stage 2 parser successful');
                    }
                    
                    setResumeText(extractedText);
                    
                    if (window.amplitude) {
                        amplitude.track('File Uploaded', {
                            file_type: file.type || file.name.split('.').pop(),
                            file_size: file.size,
                            text_length: extractedText.length,
                            extraction_method: result.method,
                            pdf_quality_score: qualityAnalysis?.score || 100,
                            stage2_success: !!structured
                        });
                    }
                    
                    setAnalysisStage('');
                    setLoading(false);
                    
                } catch (error) {
                    console.error('Upload error:', error);
                    setResumeParseError(error.message);
                    setLoading(false);
                    setAnalysisStage('');
                }
            };

            // ============================================================
            // JD UPLOAD HANDLER (Simple pdf.js for JDs)
            // ============================================================
            
            const handleJobDescriptionFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setJobDescriptionFileName(file.name);
                setJobDescriptionParseError(null);
                setLoading(true);
                setAnalysisStage('Loading job description...');

                try {
                    let extractedText = '';
                    
                    if (file.type === 'text/plain') {
                        const reader = new FileReader();
                        extractedText = await new Promise((resolve, reject) => {
                            reader.onload = (event) => resolve(event.target.result);
                            reader.onerror = () => reject(new Error('Failed to read text file'));
                            reader.readAsText(file);
                        });
                    } else if (file.type === 'application/pdf') {
                        // Use simple pdf.js for JD (clean extraction expected)
                        const arrayBuffer = await file.arrayBuffer();
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        let fullText = '';
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const textContent = await page.getTextContent();
                            const pageText = textContent.items.map(item => item.str).join(' ');
                            fullText += pageText + '\n';
                        }
                        extractedText = fullText;
                    } else if (file.name.endsWith('.docx') || file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
                        const arrayBuffer = await file.arrayBuffer();
                        const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                        extractedText = result.value;
                    } else {
                        setJobDescriptionParseError('Unsupported file type. Please upload .txt, .pdf, or .docx');
                        setLoading(false);
                        setAnalysisStage('');
                        return;
                    }
                    
                    if (!extractedText || extractedText.trim().length < 50) {
                        setJobDescriptionParseError('Could not extract enough text from the file.');
                        setLoading(false);
                        setAnalysisStage('');
                        return;
                    }
                    
                    setJobDescriptionText(extractedText);
                    setAnalysisStage('');
                    setLoading(false);
                    
                } catch (error) {
                    setJobDescriptionParseError(error.message);
                    setLoading(false);
                    setAnalysisStage('');
                }
            };

            // ============================================================
            // ANALYZE RESUME
            // ============================================================
            
            const analyzeResume = async () => {
                if (!resumeText.trim()) {
                    alert('Please provide resume text or upload a file.');
                    return;
                }

                if (isComparisonMode && !jobDescriptionText.trim()) {
                    alert('Please provide a job description or switch to Standard Mode.');
                    return;
                }

                setLoading(true);
                setResult(null);
                setAnalysisStage('Analyzing with AI...');

                try {
                    if (!isComparisonMode) {
                        setAnalysisStage('Processing with aggregator...');
                        
                        const llmAnalysis = {
                            header_issues: [],
                            missing_keywords: [],
                            bullets_analysis: [],
                            formatting_issues: [],
                            skills_issues: [],
                            buzzwords_found: [],
                            publications_present: false,
                            projects_present: false,
                            career_trajectory_flags: [],
                            career_gaps: [],
                            education_title_flags: [],
                            weak_metrics: [],
                            bloom_analysis: {
                                average_bloom: 3.5,
                                expected_bloom: 3.5,
                                gap: 0,
                                assessment: "Unknown"
                            }
                        };
                        
                        const aggregatorResponse = await fetch(AGGREGATOR_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                llm_analysis: llmAnalysis,
                                structured_resume: structuredResume || {
                                    parsed: true,
                                    detected_level: "Mid/Associate",
                                    total_years_experience: 3,
                                    summary: "",
                                    skills: [],
                                    header: { name: "", email: "", phone: "" },
                                    experience: []
                                },
                                job_description: null
                            })
                        });
                        
                        const aggregatorData = await aggregatorResponse.json();
                        
                        if (aggregatorData.error) {
                            throw new Error(aggregatorData.error);
                        }
                        
                        const interviewScore = calculateInterviewLikelihood(aggregatorData);
                        aggregatorData.interview_likelihood_score = interviewScore;
                        aggregatorData.pdf_quality = pdfQuality;
                        aggregatorData.extraction_method = extractionMethod;
                        aggregatorData.structured_used = !!structuredResume;
                        aggregatorData.provider_used = "Aggregator (Deterministic)";
                        
                        setResult(aggregatorData);
                        
                    } else {
                        const workerUrl = COMPARE_WORKER_URL;
                        
                        const payload = {
                            resume: structuredResume,
                            resumeText: resumeText,
                            jobDescriptionText: jobDescriptionText
                        };
                        
                        const response = await fetch(workerUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        const data = await response.json();
                        
                        if (data.error) {
                            throw new Error(data.error || 'Analysis failed');
                        }

                        if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                            let jsonText = data.candidates[0].content.parts[0].text.trim();
                            jsonText = jsonText.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                            const parsedResult = JSON.parse(jsonText);
                            
                            const interviewScore = calculateInterviewLikelihood(parsedResult);
                            parsedResult.interview_likelihood_score = interviewScore;
                            parsedResult.pdf_quality = pdfQuality;
                            parsedResult.extraction_method = extractionMethod;
                            parsedResult.structured_used = !!structuredResume;
                            
                            setResult(parsedResult);
                        } else {
                            throw new Error('Invalid response format');
                        }
                    }
                    
                } catch (error) {
                    console.error('Analysis error:', error);
                    alert('Error analyzing resume. Please try again.');
                } finally {
                    setLoading(false);
                    setAnalysisStage('');
                }
            };

            const handleEmailSubmit = async () => {
                if (!email || !email.includes('@')) {
                    alert('Please enter a valid email address');
                    return;
                }

                if (window.amplitude) {
                    amplitude.track('Email Captured', {
                        email_domain: email.split('@')[1],
                        score: result?.total_ats_score
                    });
                }

                if (typeof gtag !== 'undefined') {
                    gtag('event', 'generate_lead', {
                        'event_category': 'ATS_Scanner',
                        'event_label': email
                    });
                }

                setEmailSent(true);
                alert('Full report will be sent to: ' + email);
            };

            const getScoreGrade = (score) => {
                if (score >= 90) return 'Excellent';
                if (score >= 80) return 'Good';
                if (score >= 70) return 'Moderate';
                return 'Needs Work';
            };

            const getCredibilityLabel = (score) => {
                if (score >= 90) return { label: 'Highly Credible', color: 'high' };
                if (score >= 80) return { label: 'Credible', color: 'high' };
                if (score >= 70) return { label: 'Moderately Credible', color: 'moderate' };
                if (score >= 60) return { label: 'Questionable Credibility', color: 'moderate' };
                return { label: 'Low Credibility', color: 'low' };
            };

            const getSemanticColor = (positionScore) => {
                if (positionScore >= -1.5 && positionScore <= 1.5) return 'green';
                if (Math.abs(positionScore) <= 3.5) return 'orange';
                return 'red';
            };

            const getPositionLabel = (positionScore) => {
                if (positionScore < -3.5) return 'Severely Under-positioned';
                if (positionScore < -1.5) return 'Moderately Under-positioned';
                if (positionScore < 0) return 'Slightly Under-positioned';
                if (positionScore === 0) return 'Perfectly Positioned';
                if (positionScore <= 1.5) return 'Slightly Over-positioned';
                if (positionScore <= 3.5) return 'Moderately Over-positioned';
                return 'Severely Over-positioned';
            };

            const getScalePosition = (positionScore) => ((positionScore + 5) / 10) * 100;

            const getRiskBadgeClass = (riskLevel) => {
                if (!riskLevel) return 'risk-medium';
                const level = riskLevel.toLowerCase();
                if (level === 'low') return 'risk-low';
                if (level === 'high') return 'risk-high';
                return 'risk-medium';
            };

            const getRoleMatchDisclaimer = (roleMatches, atsScore, positionScore) => {
                if (!roleMatches || roleMatches.length === 0) return null;
                
                const strongMatches = roleMatches.filter(m => m.match_percentage >= 80);
                const strongMatchCount = strongMatches.length;
                const isPositionedOutsideRange = Math.abs(positionScore) > 1.5;
                const isLowAts = atsScore < 70;
                
                if (strongMatchCount === 0) {
                    return {
                        type: 'critical',
                        title: 'CRITICAL: No strong role matches detected',
                        message: `Your ATS score (${atsScore}) and positioning score (${positionScore > 0 ? '+' : ''}${positionScore}) are directly limiting your role matches.`,
                        actions: [
                            'Replace weak verbs ("assisted" → "managed" where accurate)',
                            'Add quantified results to bullets without metrics',
                            'Review the "Missing Keywords" section below'
                        ],
                        callToAction: 'Start with "Immediate Fixes" at the bottom of this report'
                    };
                }
                
                if (strongMatchCount === 1) {
                    if (isLowAts || isPositionedOutsideRange) {
                        const isOverPositioned = positionScore > 1.5;
                        const positionAdvice = isOverPositioned 
                            ? 'Your over-positioning score suggests your language may be inflated for your level.'
                            : positionScore < -1.5 
                                ? 'Your under-positioning score suggests your language sounds junior for your level.'
                                : 'Your ATS score indicates missing keywords and weak quantification.';
                        
                        return {
                            type: 'warning',
                            title: '⚠️ You have 1 strong role match. Aim for 2-3.',
                            message: `${positionAdvice} This is limiting you to only 1 strong match.`,
                            actions: [
                                isOverPositioned ? 'Review the "potential_inflation" flags' : 'Replace weak verbs with stronger alternatives',
                                isOverPositioned ? 'Dial back ownership claims where accuracy allows' : 'Add quantified results to bullets',
                                'Add keywords from adjacent roles to broaden your appeal'
                            ],
                            callToAction: 'Aim for 2-3 roles above 80% for better job search breadth'
                        };
                    } else {
                        return {
                            type: 'suggestion',
                            title: '📌 You have 1 strong role match. Aim for 2-3.',
                            message: 'Your resume is well-positioned, but you are currently only competitive for 1 role.',
                            actions: [
                                'Add keywords from adjacent roles',
                                'Tailor your resume to a second target role',
                                'Strengthen the 2nd and 3rd bullet in each role section'
                            ],
                            callToAction: 'Aim for 2-3 roles above 80% to keep your options open'
                        };
                    }
                }
                return null;
            };

            // PDF Quality Warning Component
            const renderPDFQualityWarning = () => {
                if (!pdfQuality || pdfQuality.is_clean) return null;
                
                const isCritical = pdfQuality.score < 50;
                const builder = pdfQuality.detected_builder;
                
                return (
                    <div className={`pdf-quality-warning ${isCritical ? 'critical' : 'warning'}`}>
                        <div className="warning-header">
                            <span className="warning-icon">⚠️</span>
                            <h3>PDF Quality Issues Detected</h3>
                            {builder && builder.rating <= 2 && (
                                <span className={`builder-rating ${builder.class}`}>{builder.label}</span>
                            )}
                        </div>
                        
                        <p>
                            <strong>Your PDF Quality Score: {pdfQuality.score}/100</strong>
                            {pdfQuality.score < 50 ? ' (Critical - Will affect ATS parsing)' : ' (Warning - May affect ATS parsing)'}
                        </p>
                        
                        {builder && builder.rating <= 2 && (
                            <div className="issues-list">
                                <h4>📋 Resume Builder Detected:</h4>
                                <p><strong>{builder.name}</strong> - {builder.recommendation}</p>
                                <p style={{ marginTop: '8px' }}>
                                    <strong>✅ Recommended alternative:</strong> {builder.rating <= 2 ? 'CreateFreeCV.com or Microsoft Word' : 'Continue using this builder'}
                                </p>
                            </div>
                        )}
                        
                        <div className="issues-list">
                            <h4>⚠️ Specific Issues Found:</h4>
                            <ul>
                                {pdfQuality.issues.slice(0, 4).map((issue, i) => (
                                    <li key={i}>
                                        <strong>{issue.type}:</strong> {issue.message}
                                        <br />
                                        <span className="fix-suggestion">→ {issue.fix}</span>
                                    </li>
                                ))}
                            </ul>
                            {pdfQuality.issues.length > 4 && (
                                <p><small>+ {pdfQuality.issues.length - 4} more issues</small></p>
                            )}
                        </div>
                        
                        <div className="quality-score">
                            <div className="score-bar">
                                <div className="score-fill" style={{ width: `${pdfQuality.score}%` }}></div>
                            </div>
                            <span>PDF Quality Score: {pdfQuality.score}/100</span>
                        </div>
                        
                        <div className="action-buttons">
                            <button 
                                className="btn-primary"
                                onClick={() => setShowComparison(!showComparison)}
                            >
                                {showComparison ? 'Hide' : 'Show'} ATS Eye View
                            </button>
                        </div>
                        
                        {showComparison && (
                            <div className="comparison-grid">
                                <div className="before">
                                    <strong>🔴 What ATS Actually Sees (Raw):</strong>
                                    <div className="junk-highlight" 
                                         dangerouslySetInnerHTML={{ 
                                             __html: highlightJunk(resumeText.substring(0, 1500), pdfQuality.junk_patterns) 
                                         }} />
                                    <div className="stats" style={{ marginTop: '8px' }}>
                                        <span className="bad">🗑️ Junk: {pdfQuality.stats.junk_chars} chars</span>
                                        <span className="good" style={{ marginLeft: '8px' }}>📝 Content: {pdfQuality.stats.clean_chars} chars</span>
                                    </div>
                                </div>
                                <div className="after">
                                    <strong>✅ What It Should Look Like (Cleaned):</strong>
                                    <div style={{ whiteSpace: 'pre-wrap', fontFamily: 'monospace', fontSize: '12px' }}>
                                        {resumeText.replace(/[^\x20-\x7E\x0A\x0D]/g, '').substring(0, 1500)}...
                                    </div>
                                    <div className="stats" style={{ marginTop: '8px' }}>
                                        <span className="good">✅ Clean text ready for ATS</span>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <div className="disclaimer-box" style={{ marginTop: '16px' }}>
                            <strong>📝 Why this matters:</strong> Recruiters spend 6-10 seconds scanning resumes.
                            If your PDF is garbled, they'll move on regardless of your qualifications.
                            We've automatically cleaned your resume for this analysis, but you should fix the original PDF.
                        </div>
                    </div>
                );
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>🎯 ATS Resume Scanner V8.4</h1>
                        <p>AI-powered analysis of formatting, keywords, and recruiter psychology</p>
                    </div>

                    <div className="card">
                        <div className="mode-switch-container">
                            <div className="mode-switch">
                                <button 
                                    className={`mode-option ${!isComparisonMode ? 'active' : ''}`}
                                    onClick={() => setIsComparisonMode(false)}
                                >
                                    📄 Standard Mode
                                </button>
                                <button 
                                    className={`mode-option ${isComparisonMode ? 'active' : ''}`}
                                    onClick={() => setIsComparisonMode(true)}
                                >
                                    🎯 Compare with Job Description
                                </button>
                            </div>
                        </div>

                        {!loading && !result && (
                            <div>
                                {!isComparisonMode ? (
                                    <div>
                                        <div className="input-panel">
                                            <h3>📋 Resume</h3>
                                            <textarea
                                                placeholder="Paste your resume text here..."
                                                value={resumeText}
                                                onChange={(e) => setResumeText(e.target.value)}
                                                rows={12}
                                            />
                                            <div className="file-upload-area">
                                                <input 
                                                    type="file" 
                                                    accept=".txt,.pdf,.docx"
                                                    onChange={handleResumeFileUpload}
                                                    id="resume-file-upload"
                                                />
                                                <label htmlFor="resume-file-upload" style={{ cursor: 'pointer' }}>
                                                    <div className="file-upload-icon">📁</div>
                                                    <div>Upload Resume (.txt, .pdf, .docx)</div>
                                                </label>
                                                {resumeFileName && <div className="file-name">📄 {resumeFileName}</div>}
                                                {extractionMethod && <div className="file-name" style={{ color: '#10b981' }}>{extractionMethod}</div>}
                                                {structuredResume && <div className="file-name" style={{ color: '#3b82f6' }}>✓ Structured parsing active</div>}
                                            </div>
                                            {resumeParseError && <div className="parse-error">⚠️ {resumeParseError}</div>}
                                            {resumeText && !resumeParseError && (
                                                <div className="success-message">✅ Resume loaded. {resumeText.length} characters.</div>
                                            )}
                                        </div>
                                        <button className="analyze-btn" onClick={analyzeResume}>
                                            Analyze My Resume
                                        </button>
                                    </div>
                                ) : (
                                    <div className="dual-input-grid">
                                        <div className="input-panel">
                                            <h3>📋 Resume</h3>
                                            <textarea
                                                placeholder="Paste your resume text here..."
                                                value={resumeText}
                                                onChange={(e) => setResumeText(e.target.value)}
                                                rows={10}
                                            />
                                            <div className="file-upload-area">
                                                <input 
                                                    type="file" 
                                                    accept=".txt,.pdf,.docx"
                                                    onChange={handleResumeFileUpload}
                                                    id="resume-file-upload-compare"
                                                />
                                                <label htmlFor="resume-file-upload-compare" style={{ cursor: 'pointer' }}>
                                                    <div className="file-upload-icon">📁</div>
                                                    <div>Upload Resume (.txt, .pdf, .docx)</div>
                                                </label>
                                                {resumeFileName && <div className="file-name">📄 {resumeFileName}</div>}
                                                {extractionMethod && <div className="file-name" style={{ color: '#10b981' }}>{extractionMethod}</div>}
                                                {structuredResume && <div className="file-name" style={{ color: '#3b82f6' }}>✓ Structured parsing active</div>}
                                            </div>
                                            {resumeParseError && <div className="parse-error">⚠️ {resumeParseError}</div>}
                                            {resumeText && !resumeParseError && (
                                                <div className="success-message">✅ {resumeText.length} characters</div>
                                            )}
                                        </div>

                                        <div className="input-panel">
                                            <h3>🎯 Job Description</h3>
                                            <textarea
                                                placeholder="Paste the job description here..."
                                                value={jobDescriptionText}
                                                onChange={(e) => setJobDescriptionText(e.target.value)}
                                                rows={10}
                                            />
                                            <div className="file-upload-area">
                                                <input 
                                                    type="file" 
                                                    accept=".txt,.pdf,.docx"
                                                    onChange={handleJobDescriptionFileUpload}
                                                    id="jd-file-upload"
                                                />
                                                <label htmlFor="jd-file-upload" style={{ cursor: 'pointer' }}>
                                                    <div className="file-upload-icon">📁</div>
                                                    <div>Upload Job Description (.txt, .pdf, .docx)</div>
                                                </label>
                                                {jobDescriptionFileName && <div className="file-name">📄 {jobDescriptionFileName}</div>}
                                            </div>
                                            {jobDescriptionParseError && <div className="parse-error">⚠️ {jobDescriptionParseError}</div>}
                                            {jobDescriptionText && !jobDescriptionParseError && (
                                                <div className="success-message">✅ {jobDescriptionText.length} characters</div>
                                            )}
                                        </div>
                                    </div>
                                )}
                                
                                {isComparisonMode && (
                                    <button className="analyze-btn" onClick={analyzeResume} style={{ marginTop: '30px' }}>
                                        Analyze Resume Against Job Description
                                    </button>
                                )}
                            </div>
                        )}

                        {loading && (
                            <div className="loading">
                                <div className="spinner"></div>
                                <p>Analyzing your resume...</p>
                                {analysisStage && <div className="loading-stage">{analysisStage}</div>}
                                <small>This may take 15-30 seconds</small>
                            </div>
                        )}

                        {result && (
                            <div className="results-container">
                                {result.fallback_used && (
                                    <div className="fallback-note">
                                        ℹ️ {result.fallback_note || `Analysis completed using ${result.model_used} due to high demand. Quality unchanged.`}
                                    </div>
                                )}

                                {/* PDF Quality Warning - New V8.4 Feature */}
                                {renderPDFQualityWarning()}

                                <div className="score-grid">
                                    <div className="score-card">
                                        <h4>ATS Score</h4>
                                        <div className="score-value" style={{ color: result.total_ats_score >= 90 ? '#10b981' : result.total_ats_score >= 80 ? '#3b82f6' : result.total_ats_score >= 70 ? '#f59e0b' : '#ef4444' }}>
                                            {result.total_ats_score}
                                        </div>
                                        <div className="score-label">/100 ({getScoreGrade(result.total_ats_score)})</div>
                                    </div>

                                    {result.fit_score !== null && (
                                        <div className="score-card">
                                            <h4>🎯 Fit Score</h4>
                                            <div className="score-value">{result.fit_score}</div>
                                            <div className="score-label">/100 (Role Match)</div>
                                        </div>
                                    )}

                                    {(() => {
                                        const interviewScore = result.interview_likelihood_score || calculateInterviewLikelihood(result);
                                        const flag = getInterviewFlag(interviewScore);
                                        return (
                                            <div className="score-card">
                                                <h4>📞 Interview Likelihood</h4>
                                                <div className="score-value">{interviewScore}</div>
                                                <div className="score-label">/100</div>
                                                <div className={`interview-flag ${flag.class}`}>{flag.text}</div>
                                            </div>
                                        );
                                    })()}

                                    <div className="score-card">
                                        <h4>⚠️ Risk Level</h4>
                                        <div className={`risk-badge ${getRiskBadgeClass(result.risk_level)}`}>
                                            {result.risk_level || 'Medium'}
                                        </div>
                                    </div>
                                </div>

                                {(() => {
                                    const interviewScore = result.interview_likelihood_score || calculateInterviewLikelihood(result);
                                    const recommendation = getApplyRecommendation(interviewScore);
                                    return (
                                        <div className="apply-box">
                                            <h3>🎯 SHOULD YOU APPLY?</h3>
                                            <div className="apply-recommendation">{recommendation.text}</div>
                                            <div className="apply-context">{recommendation.context}</div>
                                            <div className="apply-context" style={{ marginTop: '8px', fontSize: '12px' }}>
                                                Based on ATS {result.total_ats_score} | Fit {result.fit_score || 'N/A'} | Credibility {result.credibility_score}
                                            </div>
                                        </div>
                                    );
                                })()}

                                <div className="tooltip" style={{ textAlign: 'center', marginBottom: '15px', fontSize: '12px', color: '#6b7280' }}>
                                    📊 How is Interview Likelihood calculated?
                                    <span className="tooltip-text">
                                        Formula: 25% × e^(-3 × (1 - Quality_Score))<br/>
                                        Quality_Score combines ATS, Fit, Credibility, Alignment, Bloom, and Semantic scores.<br/>
                                        The 25% maximum reflects real-world hiring data.<br/>
                                        A 15% score means: apply to 7 similar roles → expect 1 interview.
                                    </span>
                                </div>

                                {result.credibility_score !== undefined && (
                                    <div className="credibility-container">
                                        <div className="credibility-header">
                                            <span className="credibility-title">🔒 Credibility Score</span>
                                            <span className={`credibility-badge ${getCredibilityLabel(result.credibility_score).color}`}>
                                                {getCredibilityLabel(result.credibility_score).label}
                                            </span>
                                        </div>
                                        
                                        <div>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '5px' }}>
                                                <span style={{ fontSize: '14px', color: '#6b7280' }}>Credibility Score</span>
                                                <span style={{ fontSize: '14px', fontWeight: 'bold', color: '#1a365d' }}>{result.credibility_score}/100</span>
                                            </div>
                                            <div className="credibility-bar">
                                                <div className="credibility-fill" style={{ width: `${result.credibility_score}%` }}></div>
                                            </div>
                                        </div>

                                        <div className="explainer" onClick={() => setShowCredibilityShortExplainer(!showCredibilityShortExplainer)}>
                                            Credibility Score Explained (Click here)
                                            <div className={`explainer-content ${showCredibilityShortExplainer ? 'show' : ''}`}>
                                                <strong>What is the Credibility Score?</strong><br/>
                                                The credibility score (0-100) measures how believable your resume is, separate from your ATS score.<br/><br/>
                                                <strong>How it's calculated:</strong><br/>
                                                • Career trajectory (do your promotions make sense?)<br/>
                                                • Education vs. title (is a "Director" degree-appropriate?)<br/>
                                                • Metric plausibility (are your numbers realistic?)<br/>
                                                • Cognitive complexity (Bloom) — is your language appropriate for your level?<br/><br/>
                                                <strong>What the score means:</strong><br/>
                                                • 90-100: Highly credible — no red flags<br/>
                                                • 80-89: Credible — minor concerns<br/>
                                                • 70-79: Moderately credible — some flags<br/>
                                                • 60-69: Questionable — multiple flags<br/>
                                                • Below 60: Low credibility — significant concerns<br/><br/>
                                                A high ATS score with low credibility means your resume is well-formatted but may be inflated.
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {result.semantic_analysis && (
                                    <div className="semantic-container">
                                        <div className="semantic-header">
                                            <span className="semantic-title">🎭 Semantic Positioning</span>
                                            <span className={`semantic-badge ${getSemanticColor(result.semantic_analysis.position_score)}`}>
                                                {getPositionLabel(result.semantic_analysis.position_score)}
                                            </span>
                                            {result.role_type_detected && (
                                                <span className="industry-badge">Industry: {result.role_type_detected}</span>
                                            )}
                                        </div>

                                        <div className="semantic-stats">
                                            <div className="semantic-stat">
                                                <div className="semantic-stat-label">Position Score</div>
                                                <div className="semantic-stat-value" style={{ 
                                                    color: Math.abs(result.semantic_analysis.position_score) <= 1.5 ? '#10b981' :
                                                           Math.abs(result.semantic_analysis.position_score) <= 3.5 ? '#f59e0b' : '#ef4444'
                                                }}>
                                                    {result.semantic_analysis.position_score !== undefined && result.semantic_analysis.position_score !== null ? (
                                                        <span>
                                                            {result.semantic_analysis.position_score > 0 ? '+' : ''}
                                                            {result.semantic_analysis.position_score}
                                                        </span>
                                                    ) : 'N/A'}
                                                </div>
                                            </div>
                                            <div className="semantic-stat">
                                                <div className="semantic-stat-label">Detected Level</div>
                                                <div className="semantic-stat-value">
                                                    {result.semantic_analysis.detected_level || 'N/A'}
                                                </div>
                                            </div>
                                            <div className="semantic-stat">
                                                <div className="semantic-stat-label">Confidence</div>
                                                <div className="semantic-stat-value">{result.semantic_analysis.confidence || 0}%</div>
                                            </div>
                                        </div>

                                        <div className="position-scale">
                                            <div className="scale-line">
                                                <div className="scale-marker" style={{ left: `${getScalePosition(result.semantic_analysis.position_score)}%` }}></div>
                                            </div>
                                            <div className="scale-labels">
                                                <span>Under-positioned (-5)</span>
                                                <span>Aligned (0)</span>
                                                <span>Over-positioned (+5)</span>
                                            </div>
                                        </div>

                                        <div>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '5px' }}>
                                                <span style={{ fontSize: '14px', color: '#6b7280' }}>Alignment Score</span>
                                                <span style={{ fontSize: '14px', fontWeight: 'bold', color: '#1a365d' }}>{result.semantic_analysis.alignment_score}/10</span>
                                            </div>
                                            <div className="alignment-bar">
                                                <div className="alignment-fill" style={{ width: `${(result.semantic_analysis.alignment_score / 10) * 100}%` }}></div>
                                            </div>
                                        </div>

                                        <div className="explainer" onClick={() => setShowPositionExplainer(!showPositionExplainer)}>
                                            ℹ️ How to read this score (Click here)
                                            <div className={`explainer-content ${showPositionExplainer ? 'show' : ''}`}>
                                                <strong>POSITION SCORE (-5 to +5)</strong><br/>
                                                Measures whether your resume language matches your experience level.<br/><br/>
                                                <strong>How it's calculated:</strong><br/>
                                                • Verb strength ("Led" vs "Assisted")<br/>
                                                • Cognitive complexity (Bloom's Taxonomy: Remember → Create)<br/>
                                                • Your job title vs. years of experience<br/>
                                                • Industry expectations<br/><br/>
                                                <strong>What the score means:</strong><br/>
                                                • -1.5 to +1.5 → ✅ Perfectly aligned<br/>
                                                • -3.5 to -1.5 → ⚠️ You sound junior (under-positioned)<br/>
                                                • +1.5 to +3.5 → ⚠️ You sound senior (over-positioned)<br/>
                                                • Beyond ±3.5 → 🔴 Critical mismatch<br/><br/>
                                                0 is the goal — perfectly positioned for your level.<br/><br/>
                                                <strong>ALIGNMENT SCORE (1-10)</strong><br/>
                                                Measures how well your resume language matches your experience level.<br/><br/>
                                                • 9-10: Excellent — perfectly aligned<br/>
                                                • 7-8: Good — minor adjustments may help<br/>
                                                • 5-6: Fair — moderate adjustments recommended<br/>
                                                • 3-4: Poor — significant changes needed<br/>
                                                • 1-2: Critical — major repositioning required<br/><br/>
                                                Think of this as a confidence score for your positioning.
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {result.bloom_analysis && (
                                    <div className="v8-section">
                                        <div className="results-section">
                                            <h3>🌿 Bloom's Taxonomy Analysis</h3>
                                            <div className="bloom-stats">
                                                <div className="bloom-stat">
                                                    <div className="bloom-stat-label">Avg Bloom Level</div>
                                                    <div className="bloom-stat-value">{result.bloom_analysis.average_bloom_level}</div>
                                                </div>
                                                <div className="bloom-stat">
                                                    <div className="bloom-stat-label">Expected Level</div>
                                                    <div className="bloom-stat-value">{result.bloom_analysis.expected_bloom_level}</div>
                                                </div>
                                                <div className="bloom-stat">
                                                    <div className="bloom-stat-label">Gap</div>
                                                    <div className="bloom-stat-value" style={{ color: result.bloom_analysis.bloom_gap > 0 ? '#ef4444' : result.bloom_analysis.bloom_gap < 0 ? '#f59e0b' : '#10b981' }}>
                                                        {result.bloom_analysis.bloom_gap > 0 ? '+' : ''}{result.bloom_analysis.bloom_gap}
                                                    </div>
                                                </div>
                                                <div className="bloom-stat">
                                                    <div className="bloom-stat-label">Assessment</div>
                                                    <div className="bloom-stat-value" style={{ fontSize: '14px' }}>{result.bloom_analysis.bloom_assessment}</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="results-grid">
                                    <div className="results-section">
                                        <h3>✅ What's Working Well</h3>
                                        {result.strengths?.length > 0 ? (
                                            <ul className="strengths-list">
                                                {result.strengths.map((strength, idx) => (<li key={idx}>{strength}</li>))}
                                            </ul>
                                        ) : (<p>No strengths identified</p>)}

                                        {result.missing_keywords?.length > 0 && (
                                            <>
                                                <h3 style={{ marginTop: '20px' }}>🔍 Missing Keywords</h3>
                                                <ul className="missing-keywords-list">
                                                    {result.missing_keywords.map((keyword, idx) => (<li key={idx}>{keyword}</li>))}
                                                </ul>
                                            </>
                                        )}
                                    </div>

                                    <div className="results-section">
                                        <h3>🎯 Role Match Scores</h3>
                                        {result.role_match?.length > 0 ? (
