                }

                setIsAnalyzing(true);
                setLoading(true);
                setResult(null);
                setAnalysisStage('Connecting to AI...');

                abortController = new AbortController();
                const timeoutId = setTimeout(() => abortController.abort(), 35000);

                try {
                    const workerUrl = isComparisonMode ? COMPARE_WORKER_URL : STANDARD_WORKER_URL;
                    
                    const payload = {
                        resumeText: resumeText,
                        ...(resumePdfHealth && { resumePdfHealth: resumePdfHealth }),
                        ...(isComparisonMode && { jobDescriptionText: jobDescriptionText })
                    };
                    
                    setAnalysisStage('Analyzing with Gemini...');
                    
                    const response = await fetch(workerUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                        signal: abortController.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    const data = await response.json();
                    
                    if (data.error) {
                        throw new Error(data.error || 'Analysis failed');
                    }
                    
                    setAnalysisStage('Processing results...');
                    
                    let parsedResult = null;
                    
                    if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                        let jsonText = data.candidates[0].content.parts[0].text.trim();
                        jsonText = jsonText.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                        
                        try {
                            parsedResult = JSON.parse(jsonText);
                        } catch (parseError) {
                            console.warn('JSON parse failed, attempting recovery');
                            const jsonMatch = jsonText.match(/\{[\s\S]*\}/);
                            if (jsonMatch) {
                                parsedResult = JSON.parse(jsonMatch[0]);
                            } else {
                                throw new Error('Could not parse JSON response');
                            }
                        }
                    } else if (data.result) {
                        parsedResult = data.result;
                    } else {
                        parsedResult = data;
                    }
                    
                    let safeResult = createSafeResult(parsedResult);
                    safeResult.pdf_health = resumePdfHealth;
                    
                    if (isComparisonMode) {
                        const alignmentScore = safeResult.semantic_analysis?.alignment_score ?? 5;
                        const positionScore = safeResult.semantic_analysis?.position_score ?? 0;
                        
                        const calculatedFitScore = calculateFitScore(alignmentScore * 10, positionScore);
                        if (calculatedFitScore !== null) {
                            safeResult.fit_score = calculatedFitScore;
                        }
                        
                        const candidateBloom = safeResult.bloom_analysis?.average_bloom_level ?? 3;
                        const jdDetectedLevel = safeResult.semantic_analysis?.detected_level ?? 'Mid/Associate';
                        const expectedBloom = getExpectedBloomFromLevel(jdDetectedLevel);
                        const bloomMultiplier = calculateBloomMultiplier(candidateBloom, expectedBloom);
                        const semanticMultiplier = calculateSemanticMultiplier(positionScore);
                        
                        const calculatedInterviewLikelihood = calculateInterviewLikelihood(
                            safeResult.total_ats_score,
                            safeResult.fit_score,
                            safeResult.credibility_score,
                            alignmentScore,
                            bloomMultiplier,
                            semanticMultiplier
                        );
                        if (calculatedInterviewLikelihood !== null) {
                            safeResult.interview_likelihood_score = calculatedInterviewLikelihood;
                        }
                    } else {
                        if (safeResult.semantic_analysis) {
                            safeResult.semantic_analysis.alignment_score = null;
                        }
                        // V8.2: Resume-Only Interview Likelihood formula
                        const alignmentScore = safeResult.semantic_analysis?.alignment_score ?? 5;
                        const bloomGap = safeResult.bloom_analysis?.bloom_gap ?? 0;
                        const calculatedInterviewLikelihood = calculateResumeOnlyLikelihood(
                            safeResult.total_ats_score,
                            safeResult.credibility_score,
                            alignmentScore,
                            bloomGap
                        );
                        safeResult.interview_likelihood_score = calculatedInterviewLikelihood;
                    }
                    
                    setResult(safeResult);
                    
                    if (window.amplitude) {
                        amplitude.track('Resume Analysis Completed', {
                            total_score: safeResult.total_ats_score,
                            credibility_score: safeResult.credibility_score,
                            fit_score: safeResult.fit_score,
                            mode: isComparisonMode ? 'comparison' : 'standard'
                        });
                    }
                    
                } catch (error) {
                    clearTimeout(timeoutId);
                    console.error('Analysis error:', error);
                    
                    if (error.name === 'AbortError') {
                        alert('Analysis timed out after 35 seconds. Please try again.');
                    } else if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                        alert('Network error. Please check your connection and try again.');
                    } else {
                        alert('Error analyzing resume: ' + error.message);
                    }
                    
                    if (window.amplitude) {
                        amplitude.track('Resume Analysis Error', { error: error.message });
                    }
                } finally {
                    setLoading(false);
                    setIsAnalyzing(false);
                    setAnalysisStage('');
                    if (abortController) abortController = null;
                }
            };

            const handleEmailSubmit = async () => {
                if (!email || !email.includes('@')) {
                    alert('Please enter a valid email address');
                    return;
                }
                setEmailSent(true);
                if (window.amplitude) {
                    amplitude.track('Email Captured', { email_domain: email.split('@')[1] });
                }
                alert('Full report will be sent to: ' + email);
            };

            // ============================================================
            // HELPER FUNCTIONS
            // ============================================================
            
            const getScoreGrade = (score) => {
                if (score >= 90) return 'Excellent';
                if (score >= 80) return 'Good';
                if (score >= 70) return 'Moderate';
                return 'Needs Work';
            };
            
            const getCredibilityLabel = (score) => {
                if (score >= 90) return { label: 'Highly Credible', color: 'high' };
                if (score >= 80) return { label: 'Credible', color: 'high' };
                if (score >= 70) return { label: 'Moderately Credible', color: 'moderate' };
                if (score >= 60) return { label: 'Questionable Credibility', color: 'moderate' };
                return { label: 'Low Credibility', color: 'low' };
            };
            
            const getSemanticColor = (positionScore) => {
                if (positionScore >= -1.5 && positionScore <= 1.5) return 'green';
                if (Math.abs(positionScore) <= 3.5) return 'orange';
                return 'red';
            };
            
            const getPositionLabel = (positionScore) => {
                if (positionScore < -3.5) return 'Severely Under-positioned';
                if (positionScore < -1.5) return 'Moderately Under-positioned';
                if (positionScore < 0) return 'Slightly Under-positioned';
                if (positionScore === 0) return 'Perfectly Positioned';
                if (positionScore <= 1.5) return 'Slightly Over-positioned';
                if (positionScore <= 3.5) return 'Moderately Over-positioned';
                return 'Severely Over-positioned';
            };
            
            const getScalePosition = (positionScore) => ((positionScore + 5) / 10) * 100;
            
            const getRiskBadgeClass = (riskLevel) => {
                if (!riskLevel) return 'risk-medium';
                const level = riskLevel.toLowerCase();
                if (level === 'low') return 'risk-low';
                if (level === 'high') return 'risk-high';
                return 'risk-medium';
            };
            
            const getRoleMatchDisclaimer = (roleMatches, atsScore, positionScore) => {
                if (!roleMatches || roleMatches.length === 0) return null;
                
                const strongMatches = roleMatches.filter(m => (m.match_percentage ?? 0) >= 80);
                const strongMatchCount = strongMatches.length;
                const isPositionedOutsideRange = Math.abs(positionScore) > 1.5;
                const isLowAts = atsScore < 70;
                
                if (strongMatchCount === 0) {
                    return {
                        type: 'critical',
                        title: 'CRITICAL: No strong role matches detected',
                        message: `Your ATS score (${atsScore}) and positioning score (${positionScore > 0 ? '+' : ''}${positionScore}) are directly limiting your role matches.`,
                        actions: [
                            'Replace weak verbs ("assisted" → "managed" where accurate)',
                            'Add quantified results to bullets without metrics',
                            'Review the "Missing Keywords" section below'
                        ],
                        callToAction: 'Start with "Immediate Fixes" at the bottom of this report'
                    };
                }
                
                if (strongMatchCount === 1) {
                    if (isLowAts || isPositionedOutsideRange) {
                        const isOverPositioned = positionScore > 1.5;
                        const positionAdvice = isOverPositioned 
                            ? 'Your over-positioning score suggests your language may be inflated for your level.'
                            : positionScore < -1.5 
                                ? 'Your under-positioning score suggests your language sounds junior for your level.'
                                : 'Your ATS score indicates missing keywords and weak quantification.';
                        
                        return {
                            type: 'warning',
                            title: '⚠️ You have 1 strong role match. Aim for 2-3.',
                            message: `${positionAdvice} This is limiting you to only 1 strong match.`,
                            actions: [
                                isOverPositioned ? 'Review the "potential_inflation" flags' : 'Replace weak verbs with stronger alternatives',
                                isOverPositioned ? 'Dial back ownership claims where accuracy allows' : 'Add quantified results to bullets',
                                'Add keywords from adjacent roles to broaden your appeal'
                            ],
                            callToAction: 'Aim for 2-3 roles above 80% for better job search breadth'
                        };
                    } else {
                        return {
                            type: 'suggestion',
                            title: '📌 You have 1 strong role match. Aim for 2-3.',
                            message: 'Your resume is well-positioned, but you are currently only competitive for 1 role.',
                            actions: [
                                'Add keywords from adjacent roles',
                                'Tailor your resume to a second target role',
                                'Strengthen the 2nd and 3rd bullet in each role section'
                            ],
                            callToAction: 'Aim for 2-3 roles above 80% to keep your options open'
                        };
                    }
                }
                return null;
            };
            
            const getPdfHealthScore = () => {
                if (!result?.pdf_health?.issues) return null;
                const issues = result.pdf_health.issues;
                let score = 100;
                for (const issue of issues) {
                    if (issue.severity === 'high') score -= 15;
                    else if (issue.severity === 'medium') score -= 8;
                    else if (issue.severity === 'low') score -= 3;
                    else if (issue.severity === 'good') score += 5;
                }
                return Math.max(0, Math.min(100, score));
            };
            
            const isPdfHealthCritical = () => {
                const score = getPdfHealthScore();
                return score !== null && score < 70;
            };
            
            const getPdfHealthLabel = () => {
                const score = getPdfHealthScore();
                if (score === null) return null;
                if (score >= 90) return 'Excellent';
                if (score >= 80) return 'Good';
                if (score >= 70) return 'Moderate';
                if (score >= 60) return 'Poor';
                return 'Critical';
            };
            
            const getPdfHealthColor = () => {
                const score = getPdfHealthScore();
                if (score === null) return '#6b7280';
                if (score >= 80) return '#10b981';
                if (score >= 70) return '#f59e0b';
                return '#ef4444';
            };
            
            const renderPdfHealthSection = (isCritical) => {
                if (!result?.pdf_health?.issues || result.pdf_health.issues.length === 0) return null;
                
                const score = getPdfHealthScore();
                const label = getPdfHealthLabel();
                const containerClass = isCritical ? 'pdf-health-critical' : 'pdf-health-good';
                
                return (
                    <div className={containerClass}>
                        <h3>{isCritical ? '⚠️ CRITICAL PDF HEALTH ISSUES' : '📄 PDF Health Report'}</h3>
                        <p style={{ marginBottom: '15px' }}>
                            <strong>Score: {score}/100 ({label})</strong>
                            {isCritical && ' — Fix these issues before submitting your resume.'}
                        </p>
                        {result.pdf_health.issues.map((issue, idx) => {
                            let icon = '🟡';
                            if (issue.severity === 'high') icon = '🔴';
                            else if (issue.severity === 'low') icon = '🟢';
                            else if (issue.severity === 'good') icon = '✅';
                            
                            return (
                                <div key={idx} className="pdf-issue">
                                    <div className="pdf-issue-header">{icon} {issue.message}</div>
                                    <div className="pdf-issue-message">{issue.fix}</div>
                                </div>
                            );
                        })}
                    </div>
                );
            };
            
            const renderJDKeywordsSection = () => {
                if (!isComparisonMode) return null;
                
                const safeSkills = Array.isArray(jdSkills) ? jdSkills : [];
                const safeRoles = Array.isArray(jdRoles) ? jdRoles : [];
                
                if (safeSkills.length === 0 && safeRoles.length === 0) return null;
                
                return (
                    <div className="jd-keywords-section">
                        <div className="jd-keywords-title">
                            📋 JD Keywords Extracted
                            {tokenSavings > 0 && <span className="token-savings-badge">💾 Saved ~{tokenSavings} tokens</span>}
                        </div>
                        {safeSkills.length > 0 && (
                            <div>
                                <span style={{ fontSize: '12px', color: '#6b7280' }}>Skills:</span>
                                {safeSkills.slice(0, 15).map((skill, i) => (
                                    <span key={i} className="jd-keyword-badge">{String(skill || '')}</span>
                                ))}
                                {safeSkills.length > 15 && <span style={{ fontSize: '11px', color: '#6b7280' }}> +{safeSkills.length - 15} more</span>}
                            </div>
                        )}
                        {safeRoles.length > 0 && (
                            <div style={{ marginTop: '8px' }}>
                                <span style={{ fontSize: '12px', color: '#6b7280' }}>Roles:</span>
                                {safeRoles.slice(0, 8).map((role, i) => (
                                    <span key={i} className="jd-keyword-badge">{String(role || '')}</span>
                                ))}
                                {safeRoles.length > 8 && <span style={{ fontSize: '11px', color: '#6b7280' }}> +{safeRoles.length - 8} more</span>}
                            </div>
                        )}
                    </div>
                );
            };

            // V8.2: Get Bloom level class for color coding
            const getBloomLevelClass = (level) => {
                if (level === 6) return 'bloom-level-6';
                if (level === 5) return 'bloom-level-5';
                if (level === 4) return 'bloom-level-4';
                if (level === 3) return 'bloom-level-3';
                if (level === 2) return 'bloom-level-2';
                return 'bloom-level-1';
            };

            // ============================================================
            // RENDER
            // ============================================================
            
            return (
                <div className="container">
                    <div className="header">
                        <h1>🎯 ATS Resume Scanner V8.2</h1>
                        <p>AI-powered analysis with DOCX support, JD keyword extraction, and recruiter-grade scoring</p>
                    </div>

                    <div className="card">
                        <div className="mode-switch-container">
                            <div className="mode-switch">
                                <button 
                                    className={`mode-option ${!isComparisonMode ? 'active' : ''}`}
                                    onClick={() => setIsComparisonMode(false)}
                                >
                                    📄 Standard Mode
                                </button>
                                <button 
                                    className={`mode-option ${isComparisonMode ? 'active' : ''}`}
                                    onClick={() => setIsComparisonMode(true)}
                                >
                                    🎯 Compare with Job Description
                                </button>
                            </div>
                        </div>

                        {!loading && !result && (
                            <div>
                                {!isComparisonMode ? (
                                    <div>
                                        <div className="input-panel">
                                            <h3>📋 Resume</h3>
                                            <textarea
                                                placeholder="Paste your resume text here..."
                                                value={resumeText}
                                                onChange={(e) => setResumeText(e.target.value)}
                                                rows={12}
                                            />
                                            <div className="file-upload-area">
                                                <input 
                                                    type="file" 
                                                    accept=".txt,.pdf,.docx"
                                                    onChange={handleResumeFileUpload}
                                                    id="resume-file-upload"
                                                />
                                                <label htmlFor="resume-file-upload" style={{ cursor: 'pointer' }}>
                                                    <div className="file-upload-icon">📁</div>
                                                    <div>Upload Resume (.txt, .pdf, .docx)</div>
                                                </label>
                                                {resumeFileName && <div className="file-name">📄 {resumeFileName}</div>}
                                            </div>
                                            {resumeParseError && <div className="parse-error">⚠️ {resumeParseError}</div>}
                                            {resumeText && !resumeParseError && (
                                                <div className="success-message">✅ Resume loaded. {resumeText.length} characters.</div>
                                            )}
                                        </div>
                                        <button 
                                            className="analyze-btn" 
                                            onClick={analyzeResume} 
                                            disabled={!resumeText || isAnalyzing}
                                        >
                                            {isAnalyzing ? 'Analyzing...' : 'Analyze My Resume'}
                                        </button>
                                    </div>
                                ) : (
                                    <div>
                                        <div className="dual-input-grid">
                                            <div className="input-panel">
                                                <h3>📋 Resume</h3>
                                                <textarea
                                                    placeholder="Paste your resume text here..."
                                                    value={resumeText}
                                                    onChange={(e) => setResumeText(e.target.value)}
                                                    rows={10}
                                                />
                                                <div className="file-upload-area">
                                                    <input 
                                                        type="file" 
                                                        accept=".txt,.pdf,.docx"
                                                        onChange={handleResumeFileUpload}
                                                        id="resume-file-upload-compare"
                                                    />
                                                    <label htmlFor="resume-file-upload-compare" style={{ cursor: 'pointer' }}>
                                                        <div className="file-upload-icon">📁</div>
                                                        <div>Upload Resume (.txt, .pdf, .docx)</div>
                                                    </label>
                                                    {resumeFileName && <div className="file-name">📄 {resumeFileName}</div>}
                                                </div>
                                                {resumeParseError && <div className="parse-error">⚠️ {resumeParseError}</div>}
                                                {resumeText && !resumeParseError && (
                                                    <div className="success-message">✅ {resumeText.length} characters</div>
                                                )}
                                            </div>

                                            <div className="input-panel">
                                                <h3>🎯 Job Description</h3>
                                                <textarea
                                                    placeholder="Paste the job description here..."
                                                    value={jobDescriptionText}
                                                    onChange={(e) => setJobDescriptionText(e.target.value)}
                                                    rows={10}
                                                />
                                                <div className="file-upload-area">
                                                    <input 
                                                        type="file" 
                                                        accept=".txt,.pdf,.docx"
                                                        onChange={handleJobDescriptionFileUpload}
                                                        id="jd-file-upload"
                                                    />
                                                    <label htmlFor="jd-file-upload" style={{ cursor: 'pointer' }}>
                                                        <div className="file-upload-icon">📁</div>
                                                        <div>Upload Job Description (.txt, .pdf, .docx)</div>
                                                    </label>
                                                    {jobDescriptionFileName && <div className="file-name">📄 {jobDescriptionFileName}</div>}
                                                    {isExtractingKeywords && <div className="file-name" style={{ color: '#f59e0b' }}>🔍 Extracting keywords...</div>}
                                                    {!isExtractingKeywords && jdSkills.length > 0 && (
                                                        <div className="file-name" style={{ color: '#10b981' }}>✅ {jdSkills.length} skills extracted</div>
                                                    )}
                                                </div>
                                                {jobDescriptionParseError && <div className="parse-error">⚠️ {jobDescriptionParseError}</div>}
                                                {jobDescriptionText && !jobDescriptionParseError && (
                                                    <div className="success-message">✅ {jobDescriptionText.length} characters</div>
                                                )}
                                            </div>
                                        </div>
                                        <button 
                                            className="analyze-btn" 
                                            onClick={analyzeResume} 
                                            disabled={!resumeText || !jobDescriptionText || isAnalyzing} 
                                            style={{ marginTop: '30px' }}
                                        >
                                            {isAnalyzing ? 'Analyzing...' : 'Analyze Resume Against Job Description'}
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {loading && (
                            <div className="loading">
                                <div className="spinner"></div>
                                <p>Analyzing your resume...</p>
                                {analysisStage && <div className="loading-stage">{analysisStage}</div>}
                                <small>This may take 15-30 seconds</small>
                            </div>
                        )}

                        {result && (
                            <div className="results-container">
                                {result.fallback_used && (
                                    <div className="fallback-note">
                                        ℹ️ {result.fallback_note || `Analysis completed using ${result.model_used}. Quality unchanged.`}
                                    </div>
                                )}

                                {renderJDKeywordsSection()}

                                <div className="score-grid">
                                    <div className="score-card">
                                        <h4>ATS Score</h4>
                                        <div className="score-value" style={{ color: getScoreColor(result.total_ats_score, 'ats') }}>
                                            {result.total_ats_score}
                                        </div>
                                        <div className="score-label">/100 ({getScoreGrade(result.total_ats_score)})</div>
                                    </div>

                                    {result.pdf_health && result.pdf_health.issues && (
                                        <div className="score-card">
                                            <h4>📄 PDF Health</h4>
                                            <div className="score-value" style={{ color: getScoreColor(getPdfHealthScore(), 'health') }}>{getPdfHealthScore()}</div>
                                            <div className="score-label">/100 ({getPdfHealthLabel()})</div>
                                        </div>
                                    )}

                                    {isComparisonMode && result.fit_score !== null && result.fit_score !== undefined && (
                                        <div className="score-card">
                                            <h4>🎯 Fit Score</h4>
                                            <div className="score-value" style={{ color: getScoreColor(result.fit_score, 'fit') }}>{result.fit_score}</div>
                                            <div className="score-label">/100 (Role Match)</div>
                                        </div>
                                    )}

                                    {result.interview_likelihood_score !== null && result.interview_likelihood_score !== undefined && (
                                        <div className="score-card">
                                            <h4>📞 Interview Likelihood</h4>
                                            <div className="score-value">{result.interview_likelihood_score}</div>
                                            <div className="score-label">/100</div>
                                            {(() => {
                                                const isPerfectScore = result.total_ats_score === 100 && result.fit_score === 100 && result.credibility_score === 100;
                                                const label = getInterviewLabel(result.interview_likelihood_score, isPerfectScore);
                                                return (
                                                    <div className="interview-label" style={{ backgroundColor: label.bgColor, color: label.color }}>
                                                        {label.emoji} {label.text}
                                                    </div>
                                                );
                                            })()}
                                        </div>
                                    )}

                                    <div className="score-card">
                                        <h4>⚠️ Risk Level</h4>
                                        <div className={`risk-badge ${getRiskBadgeClass(result.risk_level)}`}>
                                            {result.risk_level || 'Medium'}
                                        </div>
                                    </div>
                                </div>

                                {isPdfHealthCritical() && renderPdfHealthSection(true)}

                                {result.credibility_score !== undefined && (
                                    <div className="credibility-container">
                                        <div className="credibility-header">
                                            <span className="credibility-title">🔒 Credibility Score</span>
                                            <span className={`credibility-badge ${getCredibilityLabel(result.credibility_score).color}`}>
                                                {getCredibilityLabel(result.credibility_score).label}
                                            </span>
                                        </div>
                                        
                                        <div>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '5px' }}>
                                                <span style={{ fontSize: '14px', color: '#6b7280' }}>Credibility Score</span>
                                                <span style={{ fontSize: '14px', fontWeight: 'bold', color: '#1a365d' }}>{result.credibility_score}/100</span>
                                            </div>
                                            <div className="credibility-bar">
                                                <div className="credibility-fill" style={{ width: `${result.credibility_score}%` }}></div>
                                            </div>
                                        </div>

                                        <div className="explainer" onClick={() => setShowCredibilityShortExplainer(!showCredibilityShortExplainer)}>
                                            Credibility Score Explained (Click here)
                                            <div className={`explainer-content ${showCredibilityShortExplainer ? 'show' : ''}`}>
                                                <strong>What is the Credibility Score?</strong><br/>
                                                Measures how believable your resume is, separate from your ATS score.<br/><br/>
                                                <strong>How it's calculated:</strong><br/>
                                                • Career trajectory (do your promotions make sense?)<br/>
                                                • Education vs. title (is a "Director" degree-appropriate?)<br/>
                                                • Metric plausibility (are your numbers realistic?)<br/>
                                                • Cognitive complexity (Bloom) — is your language appropriate for your level?<br/><br/>
                                                <strong>What the score means:</strong><br/>
                                                • 90-100: Highly credible — no red flags<br/>
                                                • 80-89: Credible — minor concerns<br/>
                                                • 70-79: Moderately credible — some flags<br/>
                                                • 60-69: Questionable — multiple flags<br/>
                                                • Below 60: Low credibility — significant concerns
                                            </div>
                                        </div>

                                        {(result.credibility_analysis?.career_plausibility_flags?.length > 0) && (
                                            <div style={{ marginTop: '20px' }}>
                                                <h4 style={{ marginBottom: '10px', color: '#1a365d' }}>📈 Career Trajectory Flags</h4>
                                                {result.credibility_analysis.career_plausibility_flags.map((flag, idx) => (
                                                    <div key={idx} className="credibility-flag-item">
                                                        <strong>⚠️ {flag.type?.replace(/_/g, ' ').toUpperCase() || 'Flag'}</strong>
                                                        <div style={{ marginTop: '5px' }}>{flag.issue}</div>
                                                        <div className="flag-suggestion">💡 {flag.suggestion}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {(result.credibility_analysis?.education_title_flags?.length > 0) && (
                                            <div style={{ marginTop: '20px' }}>
                                                <h4 style={{ marginBottom: '10px', color: '#1a365d' }}>🎓 Education-Title Flags</h4>
                                                {result.credibility_analysis.education_title_flags.map((flag, idx) => (
                                                    <div key={idx} className="credibility-flag-item">
                                                        <strong>⚠️ {flag.type?.replace(/_/g, ' ').toUpperCase() || 'Flag'}</strong>
                                                        <div>{flag.issue}</div>
                                                        <div className="flag-suggestion">💡 {flag.suggestion}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {(result.credibility_analysis?.metric_plausibility_flags?.length > 0) && (
                                            <div style={{ marginTop: '20px' }}>
                                                <h4 style={{ marginBottom: '10px', color: '#1a365d' }}>📊 Metric Plausibility Flags</h4>
                                                {result.credibility_analysis.metric_plausibility_flags.map((flag, idx) => (
                                                    <div key={idx} className="credibility-flag-item">
                                                        <strong>⚠️ {flag.type?.replace(/_/g, ' ').toUpperCase() || 'Flag'}</strong>
                                                        <div>{flag.issue}</div>
                                                        <div className="flag-suggestion">💡 {flag.suggestion}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {(result.credibility_analysis?.promotion_signals?.length > 0) && (
                                            <div style={{ marginTop: '20px' }}>
                                                <h4 style={{ marginBottom: '10px', color: '#1a365d' }}>📈 Promotion Signals</h4>
                                                {result.credibility_analysis.promotion_signals.map((signal, idx) => (
                                                    <div key={idx} className="success-message" style={{ background: '#ecfdf5', borderLeft: '4px solid #10b981' }}>
                                                        ✅ {signal}
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {result.credibility_analysis?.recency_note && (
                                            <div style={{ marginTop: '15px', fontSize: '13px', color: '#6b7280', fontStyle: 'italic' }}>
                                                📅 {result.credibility_analysis.recency_note}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {result.semantic_analysis && (
                                    <div className="semantic-container">
                                        <div className="semantic-header">
                                            <span className="semantic-title">🎭 Semantic Positioning</span>
                                            <span className={`semantic-badge ${getSemanticColor(result.semantic_analysis.position_score)}`}>
                                                {getPositionLabel(result.semantic_analysis.position_score)}
                                            </span>
                                            {result.role_type_detected && (
                                                <span className="industry-badge">Industry: {result.role_type_detected}</span>
                                            )}
                                        </div>

                                        <div className="semantic-stats">
                                            <div className="semantic-stat">
                                                <div className="semantic-stat-label">Position Score</div>
                                                <div className="semantic-stat-value" style={{ 
                                                    color: Math.abs(result.semantic_analysis.position_score) <= 1.5 ? '#10b981' :
                                                           Math.abs(result.semantic_analysis.position_score) <= 3.5 ? '#f59e0b' : '#ef4444'
                                                }}>
                                                    {result.semantic_analysis.position_score > 0 ? '+' : ''}{result.semantic_analysis.position_score}
                                                </div>
                                            </div>
                                            <div className="semantic-stat">
                                                <div className="semantic-stat-label">Detected Level</div>
                                                <div className="semantic-stat-value">{result.semantic_analysis.detected_level || 'N/A'}</div>
                                            </div>
                                            <div className="semantic-stat">
                                                <div className="semantic-stat-label">Confidence</div>
                                                <div className="semantic-stat-value">{result.semantic_analysis.confidence || 0}%</div>
                                            </div>
                                        </div>

                                        <div className="position-scale">
                                            <div className="scale-line">
                                                <div className="scale-marker" style={{ left: `${getScalePosition(result.semantic_analysis.position_score)}%` }}></div>
                                            </div>
                                            <div className="scale-labels">
                                                <span>Under-positioned (-5)</span>
                                                <span>Aligned (0)</span>
                                                <span>Over-positioned (+5)</span>
                                            </div>
                                        </div>

                                        {isComparisonMode && (
                                            <div>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '5px' }}>
                                                    <span style={{ fontSize: '14px', color: '#6b7280' }}>Alignment Score</span>
                                                    <span style={{ fontSize: '14px', fontWeight: 'bold', color: '#1a365d' }}>{result.semantic_analysis.alignment_score}/10</span>
                                                </div>
                                                <div className="alignment-bar">
                                                    <div className="alignment-fill" style={{ width: `${(result.semantic_analysis.alignment_score / 10) * 100}%` }}></div>
                                                </div>
                                            </div>
                                        )}

                                        <div className="explainer" onClick={() => setShowPositionExplainer(!showPositionExplainer)}>
                                            ℹ️ How to read this score (Click here)
                                            <div className={`explainer-content ${showPositionExplainer ? 'show' : ''}`}>
                                                <strong>POSITION SCORE (-5 to +5)</strong><br/>
                                                Measures whether your resume language matches your experience level.<br/><br/>
                                                <strong>How it's calculated:</strong><br/>
                                                • Verb strength ("Led" vs "Assisted")<br/>
                                                • Cognitive complexity (Bloom's Taxonomy)<br/>
                                                • Your job title vs. years of experience<br/>
                                                • Industry expectations<br/><br/>
                                                <strong>What the score means:</strong><br/>
                                                • -1.5 to +1.5 → ✅ Perfectly aligned<br/>
                                                • -3.5 to -1.5 → ⚠️ You sound junior (under-positioned)<br/>
                                                • +1.5 to +3.5 → ⚠️ You sound senior (over-positioned)<br/>
                                                • Beyond ±3.5 → 🔴 Critical mismatch<br/><br/>
                                                <strong>ALIGNMENT SCORE (1-10)</strong><br/>
                                                Measures how well your qualifications match the job description.<br/>
                                                Only appears in Comparison Mode.
                                            </div>
                                        </div>

                                        {(result.semantic_analysis.flags?.length > 0) && (
                                            <div style={{ marginTop: '20px' }}>
                                                <h4 style={{ marginBottom: '10px', color: '#1a365d' }}>Semantic Flags</h4>
                                                {result.semantic_analysis.flags.map((flag, idx) => (
                                                    <div key={idx} className="flag-item">
                                                        <strong>⚠️ {flag.type?.replace('_', ' ').toUpperCase()}</strong>
                                                        <div style={{ marginTop: '5px' }}>"{flag.original_text}"</div>
                                                        <div style={{ marginTop: '5px', fontSize: '13px', color: '#ef4444' }}>{flag.issue}</div>
                                                        <div className="flag-suggestion">💡 {flag.suggestion}</div>
                                                        {flag.example && <div style={{ marginTop: '5px', color: '#667eea' }}>{flag.example}</div>}
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {(result.semantic_analysis.recommendations?.length > 0) && (
                                            <div style={{ marginTop: '20px' }}>
                                                <h4 style={{ marginBottom: '10px', color: '#1a365d' }}>Semantic Recommendations</h4>
                                                <ul style={{ paddingLeft: '20px' }}>
                                                    {result.semantic_analysis.recommendations.map((rec, idx) => (
                                                        <li key={idx} style={{ marginBottom: '8px' }}>{rec}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* V8.2: Updated Bloom Section - 3-Part Display with Color Coding */}
                                {result.bloom_analysis && (
                                    <div className="v8-section">
                                        <div className="results-section">
                                            <h3>🌿 Bloom's Taxonomy Analysis</h3>
                                            
                                            {/* Section 1: Your Cognitive Profile */}
                                            <div style={{ marginBottom: '20px', padding: '12px', background: '#f0fdf4', borderRadius: '8px' }}>
                                                <div style={{ fontWeight: 'bold', marginBottom: '8px' }}>📊 YOUR COGNITIVE PROFILE</div>
                                                <div>Your Resume Bloom Score: <strong>{result.bloom_analysis.average_bloom_level?.toFixed(1) || 'N/A'}</strong></div>
                                                <div style={{ fontSize: '12px', color: '#6b7280' }}>Based on verbs in your resume</div>
                                            </div>
                                            
                                            {/* Section 2: Role Requirements (Comparison Mode only) */}
                                            {isComparisonMode && (
                                                <div style={{ marginBottom: '20px', padding: '12px', background: '#eff6ff', borderRadius: '8px' }}>
                                                    <div style={{ fontWeight: 'bold', marginBottom: '8px' }}>🎯 WHAT THIS ROLE REQUIRES</div>
                                                    <div>JD Required Bloom Score: <strong>{result.bloom_analysis.jd_bloom_score?.toFixed(1) || 'N/A'}</strong></div>
                                                    <div style={{ fontSize: '12px', color: '#6b7280' }}>Based on verbs in the job description</div>
                                                </div>
                                            )}
                                            
                                            {/* Section 3: Expected Level (Standard Mode only) */}
                                            {!isComparisonMode && (
                                                <div style={{ marginBottom: '20px', padding: '12px', background: '#f3e8ff', borderRadius: '8px' }}>
                                                    <div style={{ fontWeight: 'bold', marginBottom: '8px' }}>🎯 EXPECTED FOR YOUR LEVEL</div>
                                                    <div>Expected Bloom Score: <strong>{result.bloom_analysis.expected_bloom_level?.toFixed(1) || 'N/A'}</strong></div>
                                                    <div style={{ fontSize: '12px', color: '#6b7280' }}>Based on your years of experience</div>
                                                </div>
                                            )}
                                            
                                            {/* Section 4: Alignment */}
                                            <div style={{ marginBottom: '16px', padding: '12px', background: '#fef3c7', borderRadius: '8px' }}>
                                                <div style={{ fontWeight: 'bold', marginBottom: '8px' }}>⚖️ YOUR ALIGNMENT</div>
                                                <div>Bloom Gap: <strong style={{ color: (result.bloom_analysis.bloom_gap ?? 0) >= 0 ? '#10b981' : '#ef4444' }}>
                                                    {(result.bloom_analysis.bloom_gap > 0 ? '+' : '')}{result.bloom_analysis.bloom_gap?.toFixed(1)}
                                                </strong></div>
                                                <div style={{ fontSize: '13px', marginTop: '8px' }}>{result.bloom_analysis.bloom_assessment}</div>
                                            </div>
                                            
                                            {/* Bullets by Level with Color Coding */}
                                            {(result.bloom_analysis.bullets_by_level?.length > 0) && (
                                                <details style={{ marginTop: '16px' }}>
                                                    <summary style={{ fontSize: '12px', cursor: 'pointer', color: '#6b7280' }}>View bullet distribution by cognitive level</summary>
                                                    <div style={{ marginTop: '12px' }}>
                                                        {result.bloom_analysis.bullets_by_level.map((item, idx) => (
                                                            <div key={idx} style={{ marginTop: '8px', fontSize: '13px' }}>
                                                                <span className={getBloomLevelClass(item.level)}>Level {item.level}</span>
                                                                <span style={{ marginLeft: '8px' }}>{item.count} bullet{item.count !== 1 ? 's' : ''}</span>
                                                                {item.example && <span style={{ color: '#6b7280', marginLeft: '10px' }}>— "{item.example.substring(0, 60)}..."</span>}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </details>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {/* Hide empty sections - V8.2 */}
                                {(result.grammar_issues?.length > 0) && (
                                    <div className="v8-section">
                                        <div className="results-section">
                                            <h3>📝 Grammar & Spelling Issues</h3>
                                            {result.grammar_issues.map((issue, idx) => (
                                                <div key={idx} className="grammar-item">
                                                    <div className="error-type" style={{ color: issue.error_type === 'spelling' ? '#ef4444' : issue.error_type === 'grammar' ? '#f59e0b' : '#3b82f6' }}>
                                                        {(issue.error_type || 'grammar').toUpperCase()}
                                                    </div>
                                                    <div className="original">"{issue.original_text}"</div>
                                                    <div style={{ fontSize: '12px', marginTop: '5px' }}>❌ {issue.issue}</div>
                                                    <div className="suggestion">✅ {issue.suggestion}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {(result.missing_tools?.length > 0) && (
                                    <div className="v8-section">
                                        <div className="results-section">
                                            <h3>🔧 Missing Tools Detected</h3>
                                            {result.missing_tools.map((tool, idx) => (
                                                <div key={idx} className="missing-tool-item">
                                                    <strong>{tool.tool_name}</strong> <span style={{ color: '#6b7280' }}>({tool.category})</span>
                                                    <div className="flag-suggestion">💡 {tool.suggestion}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {(result.weak_metrics_details?.length > 0) && (
                                    <div className="v8-section">
                                        <div className="results-section">
                                            <h3>📊 Weak Metrics - Need Improvement</h3>
                                            {result.weak_metrics_details.map((metric, idx) => (
                                                <div key={idx} className="weak-metric-item" style={{ borderLeftColor: '#ef4444' }}>
                                                    <div className="original">"{metric.bullet_text}"</div>
                                                    <div style={{ fontSize: '12px', marginTop: '5px' }}>❌ {metric.reason}</div>
                                                    <div className="suggestion">✅ {metric.fix}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {(result.suggested_rewrites?.length > 0) && (
                                    <div className="v8-section">
                                        <div className="results-section">
                                            <h3>✏️ Suggested Rewrites</h3>
                                            {result.suggested_rewrites.map((rewrite, idx) => (
                                                <div key={idx} className="rewrite-item">
                                                    <div><strong>Original:</strong> "{rewrite.original}"</div>
                                                    <div style={{ marginTop: '8px' }}>❌ {rewrite.issue}</div>
                                                    <div style={{ marginTop: '8px', color: '#10b981' }}><strong>Suggested:</strong> "{rewrite.suggested_rewrite}"</div>
                                                    <div style={{ marginTop: '5px', fontSize: '12px', color: '#6b7280' }}>💡 {rewrite.reason}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="results-grid">
                                    <div className="results-section">
                                        <h3>✅ What's Working Well</h3>
                                        {(result.strengths?.length > 0) ? (
                                            <ul className="strengths-list">
                                                {result.strengths.map((strength, idx) => (<li key={idx}>{strength}</li>))}
                                            </ul>
                                        ) : (<p>No strengths identified</p>)}

                                        {result.market_positioning && (
                                            <>
                                                <h3 style={{ marginTop: '20px' }}>📊 Market Positioning</h3>
                                                <p><strong>Level:</strong> {result.market_positioning.level}</p>
                                                <p><strong>Assessment:</strong> {result.market_positioning.assessment}</p>
                                            </>
                                        )}

                                        {(result.missing_keywords?.length > 0) && (
                                            <>
                                                <h3 style={{ marginTop: '20px' }}>🔍 Missing Keywords</h3>
                                                <ul className="missing-keywords-list">
                                                    {result.missing_keywords.map((keyword, idx) => (<li key={idx}>{keyword}</li>))}
                                                </ul>
                                            </>
                                        )}

                                        {result.role_adjustment_note && (
                                            <div style={{ marginTop: '15px', padding: '10px', background: '#e0f2fe', borderRadius: '8px', fontSize: '13px' }}>
                                                ℹ️ {result.role_adjustment_note}
                                            </div>
                                        )}
                                    </div>

                                    <div className="results-section">
                                        <h3>🎯 Role Match Scores</h3>
                                        {(result.role_match?.length > 0) ? (
                                            <>
                                                {result.role_match.map((role, idx) => (
                                                    <div key={idx} className="role-match-item">
                                                        <span>{role.role || 'Unknown Role'}</span>
                                                        <span className={(role.match_percentage ?? 0) >= 80 ? "match-strong" : "match-percentage"}>
                                                            {role.match_percentage || 0}%
                                                        </span>
                                                    </div>
                                                ))}
                                                
                                                {(() => {
                                                    const disclaimer = getRoleMatchDisclaimer(
                                                        result.role_match, 
                                                        result.total_ats_score, 
                                                        result.semantic_analysis?.position_score || 0
                                                    );
                                                    if (disclaimer) {
                                                        return (
                                                            <div key="disclaimer" className={`disclaimer-box ${disclaimer.type}`}>
                                                                <strong>{disclaimer.title}</strong><br/><br/>
                                                                <p>{disclaimer.message}</p>
                                                                <ul style={{ marginTop: '10px', marginLeft: '20px' }}>
                                                                    {disclaimer.actions.map((action, i) => (<li key={i}>{action}</li>))}
                                                                </ul>
                                                                <p style={{ marginTop: '10px', fontWeight: 'bold' }}>→ {disclaimer.callToAction}</p>
                                                            </div>
                                                        );
                                                    }
                                                    return null;
                                                })()}
                                            </>
                                        ) : (<p>No role matches identified</p>)}

                                        {(result.immediate_fixes?.length > 0) && (
                                            <>
                                                <h3 style={{ marginTop: '20px' }}>🔧 Immediate Fixes</h3>
                                                <ul>
                                                    {result.immediate_fixes.map((fix, idx) => (<li key={idx} style={{ marginBottom: '10px' }}>{fix}</li>))}
                                                </ul>
                                            </>
                                        )}
                                    </div>
                                </div>

                                {(result.all_issues?.length > 0) && (
                                    <div className="results-section" style={{ marginTop: '20px' }}>
                                        <h3>📋 All Identified Issues ({result.all_issues.length})</h3>
                                        <table className="issues-table">
                                            <thead>
                                                <tr><th>Priority</th><th>Issue</th><th>Location</th><th>How to Fix</th></tr>
                                            </thead>
                                            <tbody>
                                                {result.all_issues.slice(0, 15).map((issue, idx) => (
                                                    <tr key={idx}>
                                                        <td className={`priority-${(issue.priority || 'medium').toLowerCase()}`}>{issue.priority || 'Medium'}</td>
                                                        <td><strong>{issue.issue}</strong></td>
                                                        <td><small style={{ color: '#6b7280' }}>{issue.location || 'General'}</small></td>
                                                        <td>{issue.fix || issue.suggestion || 'Review and improve'}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                        {result.all_issues.length > 15 && (
                                            <p style={{ textAlign: 'center', marginTop: '10px', fontSize: '12px', color: '#6b7280' }}>
                                                +{result.all_issues.length - 15} more issues
                                            </p>
                                        )}
                                    </div>
                                )}

                                {result.metric_quality_breakdown && (
                                    <div className="results-section" style={{ marginTop: '20px' }}>
                                        <h3>📊 Metric Quality Breakdown</h3>
                                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '15px', textAlign: 'center' }}>
                                            <div>
                                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#ef4444' }}>{result.metric_quality_breakdown.weak_count || 0}</div>
                                                <div style={{ fontSize: '12px', color: '#6b7280' }}>Weak Metrics</div>
                                            </div>
                                            <div>
                                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#f59e0b' }}>{result.metric_quality_breakdown.good_count || 0}</div>
                                                <div style={{ fontSize: '12px', color: '#6b7280' }}>Good Metrics</div>
                                            </div>
                                            <div>
                                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#10b981' }}>{result.metric_quality_breakdown.strong_count || 0}</div>
                                                <div style={{ fontSize: '12px', color: '#6b7280' }}>Strong Metrics</div>
                                            </div>
                                        </div>
                                        <div style={{ marginTop: '15px', textAlign: 'center', fontSize: '13px', color: '#6b7280' }}>
                                            Overall Quality Score: {result.metric_quality_breakdown.overall_score}/100
                                        </div>
                                    </div>
                                )}

                                {!isPdfHealthCritical() && renderPdfHealthSection(false)}

                                {result.breakdown && (
                                    <div className="results-section" style={{ marginTop: '20px' }}>
                                        <h3>📊 Score Breakdown</h3>
                                        <table className="issues-table">
                                            <thead><tr><th>Category</th><th>Score</th><th>Max</th></tr></thead>
                                            <tbody>
                                                <tr><td>Header & Contact</td><td>{result.breakdown.header_contact || 0}</td><td>10</td> </tr>
                                                <tr><td>Keyword Density</td><td>{result.breakdown.keyword_density || 0}</td><td>20</td> </tr>
                                                <tr><td>Quantified Results</td><td>{result.breakdown.quantified_results || 0}</td><td>20</td> </tr>
                                                <tr><td>Action Verbs</td><td>{result.breakdown.action_verbs || 0}</td><td>15</td> </tr>
                                                <tr><td>Formatting & Structure</td><td>{result.breakdown.formatting_structure || 0}</td><td>10</td> </tr>
                                                <tr><td>Skills Section</td><td>{result.breakdown.skills_section || 0}</td><td>10</td> </tr>
                                                <tr><td>Length & Brevity</td><td>{result.breakdown.length_brevity || 0}</td><td>5</td> </tr>
                                                <tr><td>Publications & Projects</td><td>{result.breakdown.publications_projects || 0}</td><td>5</td> </tr>
                                                {result.breakdown.recruiter_scan_penalty !== undefined && (
                                                    <tr><td>Recruiter Scan Penalty</td><td>{result.breakdown.recruiter_scan_penalty}</td><td>0</td> </tr>
                                                )}
                                                {result.breakdown.buzzword_repetition_penalty !== undefined && (
                                                    <tr><td>Buzzword/Repetition Penalty</td><td>{result.breakdown.buzzword_repetition_penalty}</td><td>0</td> </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                <div className="email-capture">
                                    <h3>📧 Get Your Full Report</h3>
                                    <p>Enter your email to receive a detailed PDF with all findings, personalized recommendations, and a complete action plan.</p>
                                    {!emailSent ? (
                                        <div className="email-input">
                                            <input type="email" placeholder="your.email@example.com" value={email} onChange={(e) => setEmail(e.target.value)} />
                                            <button onClick={handleEmailSubmit}>Send Full Report</button>
                                        </div>
                                    ) : (<p style={{ color: '#10b981', fontWeight: 'bold' }}>✅ Full report will be sent to {email}</p>)}
                                </div>

                                <button 
                                    onClick={() => {
                                        setResult(null);
                                        setResumeText('');
                                        setResumeFileName('');
                                        setResumeParseError(null);
                                        setResumePdfHealth(null);
                                        setJobDescriptionText('');
                                        setJobDescriptionFileName('');
                                        setJobDescriptionParseError(null);
                                        setJdSkills([]);
                                        setJdRoles([]);
                                        setTokenSavings(0);
                                        setEmail('');
                                        setEmailSent(false);
                                        setShowCredibilityShortExplainer(false);
                                        setShowPositionExplainer(false);
                                    }}
                                    style={{ marginTop: '30px', background: '#6b7280', width: '100%', padding: '16px', borderRadius: '8px', border: 'none', color: 'white', fontWeight: '600', cursor: 'pointer' }}
                                >
                                    Scan Another Resume
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="back-link">
                        <a href="https://jkh-consulting.keron62.workers.dev/index.html">← Back to JKH Consulting</a>
                    </div>
                    
                    <div className="privacy-note">
                        🔒 Your resume is sent to a secure proxy for analysis. No data is stored permanently. Analytics help us improve the tool.
                    </div>
                </div>
            );
        };

        // ============================================================
        // REACT 18 MOUNT (V8.2 FIX)
        // ============================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <ATSScanner />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
