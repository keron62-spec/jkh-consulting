        .card {

        /* Mode Switch Styles */
        .mode-switch-container {

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ============================================================
        // ENVIRONMENT-SPECIFIC CONFIG (V8.1.1 NEW)
        // ============================================================
        const getWorkerUrls = () => {
            const isStaging = window.location.hostname.includes('staging') || 
                              window.location.hostname.includes('localhost') ||
                              window.location.hostname.includes('127.0.0.1');
            
            if (isStaging) {
                return {
                    standard: 'https://ats-resume-only-staging.keron62.workers.dev',
                    compare: 'https://ats-compare-proxy-staging.keron62.workers.dev'
                };
            }
            
            return {
                standard: 'https://ats-resume-only.keron62.workers.dev',
                compare: 'https://ats-compare-proxy.keron62.workers.dev'
            };
        };

        const WORKER_URLS = getWorkerUrls();
        const STANDARD_WORKER_URL = WORKER_URLS.standard;
        const COMPARE_WORKER_URL = WORKER_URLS.compare;

        function ATSScanner() {
            // Core state
            const [isComparisonMode, setIsComparisonMode] = useState(false);
            const [resumeText, setResumeText] = useState('');
            const [resumeFileName, setResumeFileName] = useState('');
            const [resumeParseError, setResumeParseError] = useState(null);
            const [resumePdfHealth, setResumePdfHealth] = useState(null);
            const [jobDescriptionText, setJobDescriptionText] = useState('');
            const [jobDescriptionFileName, setJobDescriptionFileName] = useState('');
            const [jobDescriptionParseError, setJobDescriptionParseError] = useState(null);
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [email, setEmail] = useState('');
            const [emailSent, setEmailSent] = useState(false);
            const [showCredibilityExplainer, setShowCredibilityExplainer] = useState(false);
            const [showSemanticExplainer, setShowSemanticExplainer] = useState(false);
            const [showPositionExplainer, setShowPositionExplainer] = useState(false);
            const [showCredibilityShortExplainer, setShowCredibilityShortExplainer] = useState(false);
            
            // V8.1.1 NEW STATE
            const [lastAnalysisTime, setLastAnalysisTime] = useState(0);
            const [analysisStage, setAnalysisStage] = useState('');
            const [scanCount, setScanCount] = useState(0);
            const [showUpgradePrompt, setShowUpgradePrompt] = useState(false);

            // Load scan count from localStorage on mount
            useEffect(() => {
                const savedCount = localStorage.getItem('veritas_scan_count');
                if (savedCount) {
                    setScanCount(parseInt(savedCount) || 0);
                }
            }, []);

            // ============================================================
            // PDF HEALTH ENHANCEMENT FUNCTIONS (V8.1.1 NEW)
            // ============================================================
            
            const detectResumeBuilder = (metadata) => {
                const creator = metadata?.info?.Creator || '';
                const producer = metadata?.info?.Producer || '';
                
                const builders = {
                    'Canva': 'Canva',
                    'Novoresume': 'Novoresume',
                    'Zety': 'Zety',
                    'Resume.io': 'Resume.io',
                    'EnhanCV': 'EnhanCV',
                    'CVMaker': 'CVMaker',
                    'Wix': 'Wix',
                    'Adobe Illustrator': 'Adobe Illustrator'
                };
                
                for (const [key, name] of Object.entries(builders)) {
                    if (creator.includes(key) || producer.includes(key)) {
                        return { detected: true, name: name, creator: creator };
                    }
                }
                
                return { detected: false, name: null, creator: creator };
            };

            const analyzePdfStructure = async (pdf) => {
                const issues = [];
                try {
                    const page = await pdf.getPage(1);
                    const textContent = await page.getTextContent();
                    const viewport = page.getViewport({ scale: 1 });
                    
                    // Detect multi-column
                    const xPositions = textContent.items.map(item => item.transform[4]);
                    const uniqueX = [...new Set(xPositions.map(x => Math.round(x)))];
                    const isMultiColumn = uniqueX.length > 3 && textContent.items.length > 20;
                    
                    if (isMultiColumn) {
                        issues.push({
                            type: 'multi_column',
                            severity: 'high',
                            message: 'Multi-column layout detected',
                            fix: 'Convert to single-column format for ATS compatibility'
                        });
                    }
                    
                    // Detect tables (grid pattern)
                    const yPositions = textContent.items.map(item => Math.round(item.transform[5]));
                    const yGroups = {};
                    yPositions.forEach(y => { yGroups[y] = (yGroups[y] || 0) + 1; });
                    const hasTables = Object.values(yGroups).some(count => count > 10);
                    
                    if (hasTables) {
                        issues.push({
                            type: 'tables',
                            severity: 'medium',
                            message: 'Table structure detected',
                            fix: 'Convert tables to bullet points or comma-separated lists'
                        });
                    }
                    
                    // Detect header text
                    const headerItems = textContent.items.filter(item => item.transform[5] < 100);
                    if (headerItems.length > 0) {
                        issues.push({
                            type: 'header_text',
                            severity: 'low',
                            message: 'Text detected in header area',
                            fix: 'Move contact information to the body of your resume'
                        });
                    }
                } catch (e) {
                    console.warn('Structure analysis failed:', e);
                }
                
                return issues;
            };

            const checkExtractionQuality = (extractedText, pageCount) => {
                const issues = [];
                
                if (extractedText.length < 500 && pageCount > 0) {
                    issues.push({
                        type: 'scanned_pdf',
                        severity: 'high',
                        message: 'Very little text extracted. This may be a scanned image PDF.',
                        fix: 'Use OCR or recreate as text PDF.'
                    });
                }
                
                const corruptionPatterns = [
                    { pattern: /Â|Ã|â|ä|å|æ|ç|è|é|ê|ë|ì|í|î|ï/g, message: 'Encoding corruption detected (special characters)' },
                    { pattern: /[A-Z]\.[a-z]+\.[A-Z]/, message: 'Spaces may be missing (periods instead of spaces)' }
                ];
                
                for (const { pattern, message } of corruptionPatterns) {
                    if (pattern.test(extractedText)) {
                        issues.push({
                            type: 'corruption',
                            severity: 'medium',
                            message: message,
                            fix: 'Extraction may have errors. Review extracted text.'
                        });
                    }
                }
                
                return issues;
            };

            const parsePDF = async (file, isJobDescription = false) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = async function(e) {
                        try {
                            const typedarray = new Uint8Array(e.target.result);
                            const pdf = await pdfjsLib.getDocument(typedarray).promise;
                            
                            // Extract text
                            let fullText = '';
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const textContent = await page.getTextContent();
                                const pageText = textContent.items.map(item => item.str).join(' ');
                                fullText += pageText + '\n';
                            }
                            
                            // Get metadata
                            const metadata = await pdf.getMetadata();
                            
                            // Analyze structure for resume PDFs (not JDs)
                            let structureIssues = [];
                            let builderInfo = null;
                            let qualityIssues = [];
                            
                            if (!isJobDescription) {
                                structureIssues = await analyzePdfStructure(pdf);
                                builderInfo = detectResumeBuilder(metadata);
                                qualityIssues = checkExtractionQuality(fullText, pdf.numPages);
                            }
                            
                            resolve({ 
                                pdf, 
                                fullText, 
                                metadata, 
                                structureIssues, 
                                builderInfo, 
                                qualityIssues,
                                pageCount: pdf.numPages 
                            });
                        } catch (error) {
                            reject(new Error('Failed to parse PDF: ' + error.message));
                        }
                    };
                    reader.onerror = () => reject(new Error('Failed to read file'));
                    reader.readAsArrayBuffer(file);
                });
            };

            const handleResumeFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setResumeFileName(file.name);
                setResumeParseError(null);
                setLoading(true);
                
                try {
                    let extractedText = '';
                    let pdfHealth = null;
                    
                    if (file.type === 'text/plain') {
                        const reader = new FileReader();
                        extractedText = await new Promise((resolve, reject) => {
                            reader.onload = (event) => resolve(event.target.result);
                            reader.onerror = () => reject(new Error('Failed to read text file'));
                            reader.readAsText(file);
                        });
                    } else if (file.type === 'application/pdf') {
                        const { fullText, metadata, structureIssues, builderInfo, qualityIssues, pageCount } = await parsePDF(file, false);
                        extractedText = fullText;
                        
                        // Build PDF health object
                        const issues = [...structureIssues, ...qualityIssues];
                        
                        pdfHealth = {
                            pageCount: pageCount,
                            creator: metadata?.info?.Creator || '',
                            producer: metadata?.info?.Producer || '',
                            issues: issues,
                            resumeBuilder: builderInfo,
                            textLength: extractedText.length,
                            fileSize: file.size
                        };
                    } else {
                        setResumeParseError('Unsupported file type. Please upload .txt or .pdf');
                        setLoading(false);
                        return;

                    if (!extractedText || extractedText.trim().length < 50) {

                        setLoading(false);
                        return;

                    setResumeText(extractedText);

                    if (window.amplitude) {

                        });

                } catch (error) {
                    setResumeParseError(error.message);

            const handleJobDescriptionFileUpload = async (e) => {

                // ============================================================
                // RATE LIMITING (V8.1.1 NEW)
                // ============================================================
                const now = Date.now();
                const timeSinceLastAnalysis = now - lastAnalysisTime;
                const cooldownSeconds = 5;
                const cooldownMs = cooldownSeconds * 1000;

                if (timeSinceLastAnalysis < cooldownMs && lastAnalysisTime !== 0) {
                    const remainingSeconds = Math.ceil((cooldownMs - timeSinceLastAnalysis) / 1000);
                    alert(`Please wait ${remainingSeconds} second${remainingSeconds !== 1 ? 's' : ''} between analyses.`);

                setLastAnalysisTime(now);
                setLoading(true);

                // PROGRESSIVE LOADING UI (V8.1.1 NEW)
                // ============================================================
                setAnalysisStage('Parsing resume structure...');

                if (window.amplitude) {
                    amplitude.track('Resume Analysis Started', {
                        mode: isComparisonMode ? 'comparison' : 'standard',

                        resume_length: resumeText.length

                }

                // ============================================================
                // CLIENT-SIDE CACHING (V8.1.1 NEW)
                // ============================================================
                const cacheKey = getCacheKey(resumeText);
                const cached = localStorage.getItem(cacheKey);
                if (cached && !isComparisonMode) {
                    try {
                        const { result: cachedResult, timestamp } = JSON.parse(cached);
                        if (Date.now() - timestamp < 3600000) { // 1 hour
                            setResult(cachedResult);
                            setLoading(false);
                            setAnalysisStage('');
                            if (window.amplitude) {
                                amplitude.track('Resume Analysis Cache Hit', {
                                    mode: isComparisonMode ? 'comparison' : 'standard'

                            return;
                        }
                    } catch (e) {
                        console.warn('Cache read failed:', e);
                    }
                }

                try {
                    const workerUrl = isComparisonMode ? COMPARE_WORKER_URL : STANDARD_WORKER_URL;
                    
                    setAnalysisStage('Analyzing ATS compatibility...');
                    
                    const payload = isComparisonMode

                    const response = await fetch(workerUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    setAnalysisStage('Generating recommendations...');

                    const data = await response.json();
                    
                    if (data.error) {
                        throw new Error(data.error || 'Analysis failed');
                    }

                    if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                        let jsonText = data.candidates[0].content.parts[0].text.trim();
                        jsonText = jsonText.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                        const parsedResult = JSON.parse(jsonText);

                        setResult(parsedResult);
                        
                        // ============================================================

                        if (!isComparisonMode) {
                            localStorage.setItem(cacheKey, JSON.stringify({
                                result: parsedResult,
                                timestamp: Date.now()
                            }));
                        }
                        
                        // ============================================================
                        // SCAN COUNT TRACKING FOR UPGRADE PROMPT (V8.1.1 NEW)

                        if (newCount >= 10 && !showUpgradePrompt) {

                        if (window.amplitude) {
                            amplitude.track('Resume Analysis Completed', {
                                total_score: parsedResult.total_ats_score,
                                credibility_score: parsedResult.credibility_score,
                                fit_score: parsedResult.fit_score,
                                semantic_score: parsedResult.semantic_analysis?.position_score,
                                mode: isComparisonMode ? 'comparison' : 'standard'
                            });
                        }
                    } else {
                        throw new Error('Invalid response format');
                    }
                } catch (error) {
                    console.error('Analysis error:', error);
                    
                    // ============================================================
                    // ERROR TELEMETRY (V8.1.1 NEW)
                    // ============================================================
                    if (window.amplitude) {
                        amplitude.track('Resume Analysis Error', {
                            error_message: error.message,
                            error_stack: error.stack,
                            resume_length: resumeText.length,
                            mode: isComparisonMode ? 'comparison' : 'standard',
                            browser: navigator.userAgent
                        });
                    }
                    
                    alert('Error analyzing resume. Please try again.');
                } finally {
                    setLoading(false);
                    setAnalysisStage('');
                }
            };

            const handleEmailSubmit = async () => {
                if (!email || !email.includes('@')) {
                    alert('Please enter a valid email address');
                    return;
                }

                if (window.amplitude) {
                    amplitude.track('Email Captured', {
                        email_domain: email.split('@')[1],
                        score: result?.total_ats_score
                    });
                }

                if (typeof gtag !== 'undefined') {
                    gtag('event', 'generate_lead', {
                        'event_category': 'ATS_Scanner',
                        'event_label': email
                    });
                }

                setEmailSent(true);
                alert('Full report will be sent to: ' + email);
            };

            const getScoreColor = (score) => {
                if (score >= 90) return 'score-excellent';
                if (score >= 80) return 'score-good';
                if (score >= 70) return 'score-moderate';
                return 'score-poor';
            };

            const getScoreGrade = (score) => {
                if (score >= 90) return 'Excellent';
                if (score >= 80) return 'Good';
                if (score >= 70) return 'Moderate';
                return 'Needs Work';
            };

            const getCredibilityLabel = (score) => {
                if (score >= 90) return { label: 'Highly Credible', color: 'high' };
                if (score >= 80) return { label: 'Credible', color: 'high' };
                if (score >= 70) return { label: 'Moderately Credible', color: 'moderate' };
                if (score >= 60) return { label: 'Questionable Credibility', color: 'moderate' };
                return { label: 'Low Credibility', color: 'low' };
            };

            const getSemanticColor = (positionScore) => {
                if (positionScore >= -1.5 && positionScore <= 1.5) return 'green';
                if (Math.abs(positionScore) <= 3.5) return 'orange';
                return 'red';
            };

            const getPositionLabel = (positionScore) => {
                if (positionScore < -3.5) return 'Severely Under-positioned';
                if (positionScore < -1.5) return 'Moderately Under-positioned';
                if (positionScore < 0) return 'Slightly Under-positioned';
                if (positionScore === 0) return 'Perfectly Positioned';
                if (positionScore <= 1.5) return 'Slightly Over-positioned';
                if (positionScore <= 3.5) return 'Moderately Over-positioned';
                return 'Severely Over-positioned';
            };

            const getScalePosition = (positionScore) => ((positionScore + 5) / 10) * 100;

            const getRiskBadgeClass = (riskLevel) => {
                if (!riskLevel) return 'risk-medium';
                const level = riskLevel.toLowerCase();
                if (level === 'low') return 'risk-low';
                if (level === 'high') return 'risk-high';
                return 'risk-medium';
            };

            const getPdfHealthScore = () => {
                if (!resumePdfHealth?.issues) return null;
                const issues = resumePdfHealth.issues;
                let score = 100;
                for (const issue of issues) {
                    if (issue.severity === 'high') score -= 15;
                    else if (issue.severity === 'medium') score -= 8;
                    else if (issue.severity === 'low') score -= 3;
                }
                return Math.max(0, Math.min(100, score));
            };

            const isPdfHealthCritical = () => {
                const score = getPdfHealthScore();
                return score !== null && score < 70;
            };

            const getPdfHealthLabel = () => {
                const score = getPdfHealthScore();
                if (score === null) return null;
                if (score >= 90) return 'Excellent';
                if (score >= 80) return 'Good';
                if (score >= 70) return 'Moderate';
                if (score >= 60) return 'Poor';
                return 'Critical';
            };

                const score = getPdfHealthScore();
                if (score === null) return '#6b7280';
                if (score >= 80) return '#10b981';
                if (score >= 70) return '#f59e0b';
                return '#ef4444';
            };

            const getRoleMatchDisclaimer = (roleMatches, atsScore, positionScore) => {
                if (!roleMatches || roleMatches.length === 0) return null;

                const strongMatchCount = strongMatches.length;
                const isPositionedOutsideRange = Math.abs(positionScore) > 1.5;
                const isLowAts = atsScore < 70;
                
                if (strongMatchCount === 0) {
                    return {

                        ],

                    };

                if (strongMatchCount === 1) {
                    if (isLowAts || isPositionedOutsideRange) {

                            : positionScore < -1.5 
                                ? 'Your under-positioning score suggests your language sounds junior for your level.'
                                : 'Your ATS score indicates missing keywords and weak quantification.';
                        
                        return {
                            type: 'warning',
                            title: '⚠️ You have 1 strong role match. Aim for 2-3.',
                            message: `${positionAdvice} This is limiting you to only 1 strong match.`,
                            actions: [
                                isOverPositioned ? 'Review the "potential_inflation" flags' : 'Replace weak verbs with stronger alternatives',

                            ],
                            callToAction: 'Aim for 2-3 roles above 80% for better job search breadth'
                        };
                    } else {

                            type: 'suggestion',
                            title: '📌 You have 1 strong role match. Aim for 2-3.',
                            message: 'Your resume is well-positioned, but you are currently only competitive for 1 role.',
                            actions: [
                                'Add keywords from adjacent roles',
                                'Tailor your resume to a second target role',
                                'Strengthen the 2nd and 3rd bullet in each role section'
                            ],
                            callToAction: 'Aim for 2-3 roles above 80% to keep your options open'
                        };
                    }
                }
                return null;
            };

            const renderPdfHealthSection = (isCritical) => {
                if (!resumePdfHealth?.issues || resumePdfHealth.issues.length === 0) return null;
                
                const score = getPdfHealthScore();
                const label = getPdfHealthLabel();

                                            <div className="file-upload-area">

                                            <div className="file-upload-area">

                                                <label htmlFor="resume-file-upload-compare" style={{ cursor: 'pointer' }}>

                                                {resumeFileName && <div className="file-name">📄 {resumeFileName}</div>}
                                            </div>
                                            {resumeParseError && <div className="parse-error">⚠️ {resumeParseError}</div>}
                                            {resumeText && !resumeParseError && (

                                                {result.all_issues.map((issue, idx) => (
                                                    <tr key={idx}>
                                                        <td className={`priority-${issue.priority?.toLowerCase() || 'medium'}`}>{issue.priority || 'Medium'}</td>
                                                        <td><strong>{issue.issue}</strong></td>
                                                        <td><small style={{ color: '#6b7280' }}>{issue.location || 'General'}</small></td>
                                                        <td>{issue.fix || issue.suggestion || 'Review and improve'}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {result.metric_quality_breakdown && (
                                    <div className="results-section" style={{ marginTop: '20px' }}>
                                        <h3>📊 Metric Quality Breakdown</h3>
                                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '15px', textAlign: 'center' }}>
                                            <div>
                                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#ef4444' }}>{result.metric_quality_breakdown.weak_count || 0}</div>
                                                <div style={{ fontSize: '12px', color: '#6b7280' }}>Weak Metrics</div>
                                            </div>
                                            <div>
                                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#f59e0b' }}>{result.metric_quality_breakdown.good_count || 0}</div>
                                                <div style={{ fontSize: '12px', color: '#6b7280' }}>Good Metrics</div>
                                            </div>
                                            <div>
                                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#10b981' }}>{result.metric_quality_breakdown.strong_count || 0}</div>
                                                <div style={{ fontSize: '12px', color: '#6b7280' }}>Strong Metrics</div>
                                            </div>
                                        </div>
                                        <div style={{ marginTop: '15px', textAlign: 'center', fontSize: '13px', color: '#6b7280' }}>
                                            Overall Quality Score: {result.metric_quality_breakdown.overall_score}/100
                                        </div>
                                    </div>
                                )}

                                {!isPdfHealthCritical() && renderPdfHealthSection(false)}

                                {result.breakdown && (
                                    <div className="results-section" style={{ marginTop: '20px' }}>
                                        <h3>📊 Score Breakdown</h3>
                                        <table className="issues-table">
                                            <thead><tr><th>Category</th><th>Score</th><th>Max</th></tr></thead>
                                            <tbody>
                                                <tr><td>Header & Contact</td><td>{result.breakdown.header_contact || 0}</td><td>10</td></tr>
                                                <tr><td>Keyword Density</td><td>{result.breakdown.keyword_density || 0}</td><td>20</td></tr>
                                                <tr><td>Quantified Results</td><td>{result.breakdown.quantified_results || 0}</td><td>20</td></tr>
                                                <tr><td>Action Verbs</td><td>{result.breakdown.action_verbs || 0}</td><td>15</td></tr>
                                                <tr><td>Formatting & Structure</td><td>{result.breakdown.formatting_structure || 0}</td><td>10</td></tr>
                                                <tr><td>Skills Section</td><td>{result.breakdown.skills_section || 0}</td><td>10</td></tr>
                                                <tr><td>Length & Brevity</td><td>{result.breakdown.length_brevity || 0}</td><td>5</td></tr>
                                                <tr><td>Publications & Projects</td><td>{result.breakdown.publications_projects || 0}</td><td>5</td></tr>
                                                {result.breakdown.recruiter_scan_penalty !== undefined && (<tr><td>Recruiter Scan Penalty</td><td>{result.breakdown.recruiter_scan_penalty}</td><td>0</td></tr>)}
                                                {result.breakdown.buzzword_repetition_penalty !== undefined && (<tr><td>Buzzword/Repetition Penalty</td><td>{result.breakdown.buzzword_repetition_penalty}</td><td>0</td></tr>)}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                <div className="email-capture">
                                    <h3>📧 Get Your Full Report</h3>
                                    <p>Enter your email to receive a detailed PDF with all findings, personalized recommendations, and a complete action plan.</p>
                                    {!emailSent ? (
                                        <div className="email-input">
                                            <input type="email" placeholder="your.email@example.com" value={email} onChange={(e) => setEmail(e.target.value)} />
                                            <button onClick={handleEmailSubmit}>Send Full Report</button>
                                        </div>
                                    ) : (<p style={{ color: '#10b981', fontWeight: 'bold' }}>✅ Full report will be sent to {email}</p>)}
                                </div>

                                {/* Upgrade Prompt (V8.1.1 NEW) */}
                                {showUpgradePrompt && (
                                    <div className="upgrade-prompt">
                                        <h3>🚀 Upgrade to ResumeRx</h3>
                                        <p>You've used 10 free scans. Get unlimited scans, PDF reports, and priority analysis.</p>
                                        <div className="upgrade-buttons">
                                            <button className="upgrade-btn-primary" onClick={() => window.location.href = '/pricing'}>
                                                Upgrade Now → $9.99/month
                                            </button>
                                            <button className="upgrade-btn-secondary" onClick={() => setShowUpgradePrompt(false)}>
                                                Remind me later
                                            </button>
                                        </div>
                                    </div>
                                )}

                                <button 
                                    onClick={() => {
                                        setResult(null);
                                        setResumeText('');
                                        setResumeFileName('');
                                        setResumeParseError(null);
                                        setResumePdfHealth(null);
                                        setJobDescriptionText('');
                                        setJobDescriptionFileName('');
                                        setJobDescriptionParseError(null);
                                        setEmail('');
                                        setEmailSent(false);
                                        setShowCredibilityExplainer(false);
                                        setShowSemanticExplainer(false);
                                        setShowPositionExplainer(false);
                                        setShowCredibilityShortExplainer(false);
                                        setShowUpgradePrompt(false);
                                        setAnalysisStage('');
                                    }}
                                    style={{ marginTop: '30px', background: '#6b7280', width: '100%', padding: '16px', borderRadius: '8px', border: 'none', color: 'white', fontWeight: '600', cursor: 'pointer' }}
                                >
                                    Scan Another Resume
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="back-link">
                        <a href="https://jkh-consulting.keron62.workers.dev/index.html">← Back to JKH Consulting</a>
                    </div>
                    
                    <div className="privacy-note">
                        🔒 Your resume is sent to a secure proxy for analysis. No data is stored permanently. Analytics help us improve the tool.
                    </div>
                </div>
            );
        }

        ReactDOM.render(<ATSScanner />, document.getElementById('root'));
    </script>
</body>
</html>
