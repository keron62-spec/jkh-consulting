    <script type="text/babel">
        const { useState } = React;

        // Worker URLs
        const STANDARD_WORKER_URL = "https://ats-resume-only.keron62.workers.dev";
        const COMPARE_WORKER_URL = "https://ats-proxy.keron62.workers.dev";
        const AGGREGATOR_URL = "https://ats-aggregator.keron62.workers.dev";
        const PARSER_WORKER_URL = "https://ats-parser.keron62.workers.dev";

        function ATSScanner() {
            const [isComparisonMode, setIsComparisonMode] = useState(false);
            
            // Resume state
            const [resumeText, setResumeText] = useState('');
            const [resumeFileName, setResumeFileName] = useState('');
            const [resumeParseError, setResumeParseError] = useState(null);
            const [resumePdfHealth, setResumePdfHealth] = useState(null);
            const [extractionMethod, setExtractionMethod] = useState(null);
            const [azureHealth, setAzureHealth] = useState(null);

            // Job Description state

            const [jobDescriptionParseError, setJobDescriptionParseError] = useState(null);

            const [email, setEmail] = useState('');
            const [emailSent, setEmailSent] = useState(false);
            const [showCredibilityExplainer, setShowCredibilityExplainer] = useState(false);
            const [showSemanticExplainer, setShowSemanticExplainer] = useState(false);
            const [showPositionExplainer, setShowPositionExplainer] = useState(false);
            const [showCredibilityShortExplainer, setShowCredibilityShortExplainer] = useState(false);
            const [analysisStage, setAnalysisStage] = useState('');

            // ============================================================
            // INTERVIEW LIKELIHOOD CALCULATION (Exponential Decay)
            // ============================================================
            
            function calculateInterviewLikelihood(result) {
                const ats = (result.total_ats_score || 65) / 100;
                const fit = (result.fit_score || 60) / 100;
                const credibility = (result.credibility_score || 65) / 100;
                const alignment = (result.semantic_analysis?.alignment_score || 5) / 10;
                
                let bloomMultiplier = result.bloom_analysis?.bloom_multiplier || 1.0;
                bloomMultiplier = Math.min(1.25, Math.max(0.75, bloomMultiplier));
                
                const positionScore = Math.abs(result.semantic_analysis?.position_score || 0);
                const semanticMultiplier = Math.max(0.5, (100 - (positionScore * 10)) / 100);
                
                const qualityScore = ats * fit * credibility * alignment * bloomMultiplier * semanticMultiplier;
                const interviewLikelihood = 25 * Math.exp(-3 * (1 - qualityScore));
                
                return Math.min(25, Math.max(0, Math.round(interviewLikelihood)));
            }
            
            function getInterviewFlag(score) {
                if (score >= 20) return { text: "🚀 Apply Immediately", class: "flag-deep-green" };
                if (score >= 13) return { text: "✅ Strong Yes", class: "flag-strong-green" };
                if (score >= 8) return { text: "👍 Yes", class: "flag-green" };
                if (score >= 3) return { text: "⚠️ 50/50", class: "flag-orange" };
                return { text: "🔴 Consider Other Roles", class: "flag-red" };
            }
            
            function getApplyRecommendation(score) {
                if (score >= 20) return { text: "🚀 APPLY IMMEDIATELY", context: "Your profile is highly competitive. Top 1% of candidates." };
                if (score >= 13) return { text: "✅ STRONG YES", context: "You have a solid chance. Top 10% of candidates." };
                if (score >= 8) return { text: "👍 YES", context: "Your profile is decent. Apply if interested." };
                if (score >= 3) return { text: "⚠️ 50/50", context: "This role is a long shot. Apply only if you have time." };
                return { text: "🔴 CONSIDER OTHER ROLES", context: "Target roles at a different level or strengthen your resume first." };
            }

            // ============================================================
            // UNPDF EXTRACTION (Modern PDF extraction - replaces pdf.js)
            // ============================================================
            
            async function extractWithUnpdf(file) {
                const { extractText } = await import('unpdf');
                const arrayBuffer = await file.arrayBuffer();
                const result = await extractText(arrayBuffer);
                return { 
                    text: result.text, 
                    method: 'unpdf', 
                    confidence: 85,
                    pageCount: result.pages?.length || 1
                };
            }

            // ============================================================
            // AZURE EXTRACTION (via Cloudflare Worker proxy)
            // ============================================================
            
            async function extractWithAzure(file) {
                const formData = new FormData();
                formData.append('file', file);
                
                const response = await fetch(`${PARSER_WORKER_URL}/extract`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success && data.text && data.text.length > 100) {
                    return { 
                        text: data.text, 
                        method: data.method || 'azure', 
                        confidence: data.confidence || 95,
                        pageCount: data.pages || 1,
                        quality: data.quality || null
                    };
                }
                throw new Error(data.error || 'Azure extraction failed');
            }

            // ============================================================
            // DOCX EXTRACTION (Microsoft Word support)
            // ============================================================
            
            async function extractWithDocx(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = async function(e) {
                        try {
                            const arrayBuffer = e.target.result;
                            const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                            if (result.value && result.value.length > 50) {
                                resolve({ 
                                    text: result.value, 
                                    method: 'docx', 
                                    confidence: 98,
                                    pageCount: 1
                                });
                            } else {
                                reject(new Error('Could not extract text from DOCX'));
                            }
                        } catch (error) {
                            reject(new Error('Failed to parse DOCX: ' + error.message));
                        }
                    };
                    reader.onerror = () => reject(new Error('Failed to read file'));
                    reader.readAsArrayBuffer(file);
                });
            }

            // ============================================================
            // PDF HEALTH DETECTION (from extracted text)
            // ============================================================
            
            function analyzeExtractedHealth(text, pageCount, extractionMethod, qualityData = null) {
                // If Azure returned quality data, use it directly
                if (qualityData && qualityData.issues && qualityData.issues.length > 0) {
                    return {
                        score: qualityData.score || 70,
                        issues: qualityData.issues.map(issue => ({
                            type: issue.type,
                            severity: issue.severity,
                            message: issue.message,
                            fix: issue.fix || getFixForIssue(issue.type)
                        })),
                        extractionMethod: extractionMethod,
                        extractionConfidence: 95
                    };
                }
                
                // Otherwise, perform local analysis
                const issues = [];
                let score = 100;
                
                // Page count check
                if (pageCount > 2) {
                    issues.push({
                        type: 'page_count',
                        severity: 'low',
                        message: `${pageCount} pages detected`,
                        fix: 'Consider condensing to 2 pages'
                    });
                    score -= (pageCount - 2) * 3;
                }
                
                // Text length check
                if (text.length < 500) {
                    issues.push({
                        type: 'short_text',
                        severity: 'medium',
                        message: `Only ${text.length} characters extracted`,
                        fix: 'Ensure your PDF contains selectable text, not just images'
                    });
                    score -= 20;
                }
                
                // Character corruption detection
                const nonPrintableCount = (text.match(/[^\x20-\x7E\x0A\x0D\x09]/g) || []).length;
                if (nonPrintableCount > 5) {
                    issues.push({
                        type: 'corruption',
                        severity: 'high',
                        message: `${nonPrintableCount} non-printable characters detected`,
                        fix: 'Re-save the PDF from the original source'
                    });
                    score -= 30;
                }
                
                // Multi-column detection (simple heuristic)
                const lines = text.split('\n');
                const shortLines = lines.filter(l => l.trim().length > 0 && l.length < 40).length;
                if (shortLines > lines.length * 0.3 && lines.length > 20) {
                    issues.push({
                        type: 'multi_column',
                        severity: 'medium',
                        message: 'Possible multi-column layout detected',
                        fix: 'Convert to single-column format for better ATS compatibility'
                    });
                    score -= 15;
                }
                
                return {
                    score: Math.max(0, Math.min(100, Math.round(score))),
                    issues: issues,
                    extractionMethod: extractionMethod,
                    extractionConfidence: extractionMethod === 'azure' ? 95 : 80
                };
            }
            
            function getFixForIssue(type) {
                const fixes = {
                    'scanned': 'Use OCR to extract text or recreate as a text-based PDF',
                    'multi_column': 'Convert to single-column format for ATS compatibility',
                    'headers_detected': 'Move contact information to the body of your resume',
                    'corruption': 'Re-save the PDF from the original source',
                    'short_text': 'Ensure the PDF contains selectable text',
                    'page_count': 'Consider condensing to 2 pages'
                };
                return fixes[type] || 'Review and fix the issue';
            }

            // ============================================================
            // STAGE 1 PARSER (Structured Resume)
            // ============================================================
            
            const callStage1Parser = async (cleanText) => {
                const response = await fetch(PARSER_WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ resumeText: cleanText })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    console.warn('Stage 1 parser error:', data.error);
                    return null;
                }
                
                return data;
            };

            // ============================================================
            // RESUME UPLOAD HANDLER (Unpdf + Azure fallback + DOCX)
            // ============================================================
            
            const handleResumeFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setResumeFileName(file.name);
                setResumeParseError(null);
                setExtractionMethod(null);
                setAzureHealth(null);
                setStructuredResume(null);
                setLoading(true);
                setAnalysisStage('Processing file...');

                try {
                    let extractedText = '';
                    let extractionInfo = null;
                    let azureHealthData = null;
                    
                    // Handle DOCX files
                    if (file.name.endsWith('.docx') || file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
                        setAnalysisStage('Extracting from Microsoft Word...');
                        const result = await extractWithDocx(file);
                        extractedText = result.text;
                        extractionInfo = { method: 'docx', confidence: result.confidence, pageCount: result.pageCount };
                        setExtractionMethod('📄 Microsoft Word');
                    }
                    // Handle TXT files
                    else if (file.type === 'text/plain') {
                        setAnalysisStage('Reading text file...');
                        const reader = new FileReader();
                        extractedText = await new Promise((resolve, reject) => {
                            reader.onload = (event) => resolve(event.target.result);
                            reader.onerror = () => reject(new Error('Failed to read text file'));
                            reader.readAsText(file);
                        });
                        extractionInfo = { method: 'plain-text', confidence: 100, pageCount: 1 };
                        setExtractionMethod('📄 Plain Text');
                    }
                    // Handle PDF files
                    else if (file.type === 'application/pdf') {
                        // Try Unpdf first (modern, free)
                        try {
                            setAnalysisStage('Extracting with unpdf...');
                            const result = await extractWithUnpdf(file);
                            extractedText = result.text;
                            extractionInfo = { method: 'unpdf', confidence: result.confidence, pageCount: result.pageCount };
                            setExtractionMethod('📄 unpdf (Modern)');
                            console.log(`✅ Unpdf extraction successful (${extractedText.length} chars)`);
                        } catch (unpdfError) {
                            console.warn('Unpdf failed, falling back to Azure:', unpdfError);
                            setAnalysisStage('Unpdf failed, trying Azure...');
                            const result = await extractWithAzure(file);
                            extractedText = result.text;
                            extractionInfo = { 
                                method: result.method, 
                                confidence: result.confidence, 
                                pageCount: result.pageCount,
                                quality: result.quality
                            };
                            setExtractionMethod(result.method === 'azure' ? '✅ Azure Document Intelligence' : '📄 Azure (Fallback)');
                            
                            // Store Azure health data for display
                            if (result.quality) {
                                azureHealthData = {
                                    score: result.quality.score,
                                    issues: result.quality.issues || [],
                                    needsAzure: result.quality.needs_azure
                                };
                                setAzureHealth(azureHealthData);
                            }
                            console.log(`✅ Azure extraction successful (${extractedText.length} chars)`);
                        }
                    } else {
                        setResumeParseError('Unsupported file type. Please upload .txt, .pdf, or .docx');
                        setLoading(false);
                        setAnalysisStage('');
                        return;
                    }
                    
                    if (!extractedText || extractedText.trim().length < 50) {
                        setResumeParseError('Could not extract enough text from the file. Try pasting as text.');
                        setLoading(false);
                        setAnalysisStage('');
                        return;
                    }
                    
                    // Analyze extracted text health
                    const healthData = analyzeExtractedHealth(
                        extractedText, 
                        extractionInfo.pageCount, 
                        extractionInfo.method,
                        extractionInfo.quality
                    );
                    
                    // Step 2: Call Stage 1 Parser to get structured resume
                    setAnalysisStage('Parsing resume structure...');
                    const structured = await callStage1Parser(extractedText);
                    if (structured && !structured.error) {
                        setStructuredResume(structured);
                        console.log('✅ Stage 1 parser successful - structured resume ready');
                    } else {
                        console.warn('⚠️ Stage 1 parser failed, will use raw text');
                    }
                    
                    setResumeText(extractedText);
                    setResumePdfHealth(healthData);
                    
                    if (window.amplitude) {
                        amplitude.track('File Uploaded', {
                            file_type: file.type || file.name.split('.').pop(),
                            file_size: file.size,
                            text_length: extractedText.length,
                            extraction_method: extractionInfo?.method,
                            stage1_success: !!structured,
                            pdf_health_score: healthData.score
                        });
                    }
                    
                    setAnalysisStage('');
                    setLoading(false);
                    
                } catch (error) {
                    console.error('Upload error:', error);
                    setResumeParseError(error.message);
                    if (window.amplitude) {
                        amplitude.track('File Upload Error', {
                            error_message: error.message,
                            file_type: file.type || file.name.split('.').pop()
                        });
                    }
                    setLoading(false);
                    setAnalysisStage('');
                }
            };

            // ============================================================
            // JD UPLOAD HANDLER (Supports DOCX as well)
            // ============================================================
            
            const handleJobDescriptionFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setJobDescriptionFileName(file.name);
                setJobDescriptionParseError(null);
                setLoading(true);
                setAnalysisStage('Loading job description...');

                try {
                    let extractedText = '';
                    
                    if (file.type === 'text/plain') {
                        const reader = new FileReader();
                        extractedText = await new Promise((resolve, reject) => {
                            reader.onload = (event) => resolve(event.target.result);
                            reader.onerror = () => reject(new Error('Failed to read text file'));
                            reader.readAsText(file);
                        });
                    } else if (file.type === 'application/pdf') {
                        // Use unpdf for JD extraction
                        const { extractText } = await import('unpdf');
                        const arrayBuffer = await file.arrayBuffer();
                        const result = await extractText(arrayBuffer);
                        extractedText = result.text;
                    } else if (file.name.endsWith('.docx') || file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
                        const arrayBuffer = await file.arrayBuffer();
                        const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                        extractedText = result.value;
                    } else {
                        setJobDescriptionParseError('Unsupported file type. Please upload .txt, .pdf, or .docx');
                        setLoading(false);
                        setAnalysisStage('');
                        return;
                    }
                    
                    if (!extractedText || extractedText.trim().length < 50) {
                        setJobDescriptionParseError('Could not extract enough text from the file.');
                        setLoading(false);
                        setAnalysisStage('');
                        return;
                    }
                    
                    setJobDescriptionText(extractedText);
                    setAnalysisStage('');
                    setLoading(false);
                    
                } catch (error) {
                    setJobDescriptionParseError(error.message);
                    setLoading(false);
                    setAnalysisStage('');
                }
            };

            // ============================================================
            // ANALYZE RESUME (With Aggregator for Resume-Only Mode)
            // ============================================================
            
            const analyzeResume = async () => {
                if (!resumeText.trim()) {
                    alert('Please provide resume text or upload a file.');
                    return;
                }

                if (isComparisonMode && !jobDescriptionText.trim()) {
                    alert('Please provide a job description or switch to Standard Mode.');
                    return;
                }

                setLoading(true);
                setResult(null);
                setAnalysisStage('Analyzing with AI...');

                if (window.amplitude) {
                    amplitude.track('Resume Analysis Started', {
                        mode: isComparisonMode ? 'comparison' : 'standard',
                        timestamp: new Date().toISOString(),
                        has_structured_resume: !!structuredResume
                    });
                }

                try {
                    // For Resume-Only Mode: Use Aggregator for scoring
                    if (!isComparisonMode) {
                        setAnalysisStage('Processing with aggregator...');
                        
                        // Build analysis data for aggregator
                        const llmAnalysis = {
                            header_issues: [],
                            missing_keywords: [],
                            bullets_analysis: [],
                            formatting_issues: [],
                            skills_issues: [],
                            buzzwords_found: [],
                            publications_present: false,
                            projects_present: false,
                            career_trajectory_flags: [],
                            career_gaps: [],
                            education_title_flags: [],
                            weak_metrics: [],
                            bloom_analysis: {
                                average_bloom: 3.5,
                                expected_bloom: 3.5,
                                gap: 0,
                                assessment: "Unknown"
                            }
                        };
                        
                        const aggregatorResponse = await fetch(AGGREGATOR_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                llm_analysis: llmAnalysis,
                                structured_resume: structuredResume || {
                                    parsed: true,
                                    detected_level: "Mid/Associate",
                                    total_years_experience: 3,
                                    summary: "",
                                    skills: [],
                                    header: { name: "", email: "", phone: "" },
                                    experience: []
                                },
                                job_description: null
                            })
                        });
                        
                        const aggregatorData = await aggregatorResponse.json();
                        
                        if (aggregatorData.error) {
                            throw new Error(aggregatorData.error);
                        }
                        
                        // Calculate interview likelihood
                        const interviewScore = calculateInterviewLikelihood(aggregatorData);
                        aggregatorData.interview_likelihood_score = interviewScore;
                        aggregatorData.pdf_health = resumePdfHealth;
                        aggregatorData.extraction_method = extractionMethod;
                        aggregatorData.structured_used = !!structuredResume;
                        aggregatorData.provider_used = "Aggregator (Deterministic)";
                        
                        setResult(aggregatorData);
                        
                        if (window.amplitude) {
                            amplitude.track('Resume Analysis Completed', {
                                total_score: aggregatorData.total_ats_score,
                                credibility_score: aggregatorData.credibility_score,
                                mode: 'standard',
                                aggregator_used: true
                            });
                        }
                        
                        setLoading(false);
                        setAnalysisStage('');
                        return;
                    }
                    
                    // For Comparison Mode: Use existing LLM worker (preserved)
                    const workerUrl = COMPARE_WORKER_URL;
                    
                    const payload = {
                        resume: structuredResume,
                        resumeText: resumeText,
                        resumePdfHealth: resumePdfHealth,
                        jobDescriptionText: jobDescriptionText
                    };
                    
                    const response = await fetch(workerUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    setAnalysisStage('Processing results...');

                    const data = await response.json();
                    
                    if (data.error) {
                        throw new Error(data.error || 'Analysis failed');
                    }

                    if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                        let jsonText = data.candidates[0].content.parts[0].text.trim();
                        jsonText = jsonText.replace(/```json\n?/g, '').replace(/```\n?/g, '');
                        const parsedResult = JSON.parse(jsonText);
                        
                        // Calculate and override interview likelihood with new formula
                        const newInterviewScore = calculateInterviewLikelihood(parsedResult);
                        parsedResult.interview_likelihood_score = newInterviewScore;
                        
                        parsedResult.pdf_health = resumePdfHealth;
                        parsedResult.extraction_method = extractionMethod;
                        parsedResult.structured_used = !!structuredResume;
                        parsedResult.azure_health = azureHealth;
                        
                        setResult(parsedResult);
                        
                        if (window.amplitude) {
                            amplitude.track('Resume Analysis Completed', {
                                total_score: parsedResult.total_ats_score,
                                credibility_score: parsedResult.credibility_score,
                                fit_score: parsedResult.fit_score,
                                interview_score: newInterviewScore,
                                mode: 'comparison',
                                structured_used: !!structuredResume
                            });
                        }
                    } else {
                        throw new Error('Invalid response format');
                    }
                } catch (error) {
                    console.error('Analysis error:', error);
                    alert('Error analyzing resume. Please try again.');
                    if (window.amplitude) {
                        amplitude.track('Resume Analysis Error', { error: error.message });
                    }
                } finally {
                    setLoading(false);
                    setAnalysisStage('');
                }
            };

            const handleEmailSubmit = async () => {
                if (!email || !email.includes('@')) {
                    alert('Please enter a valid email address');
                    return;
                }

                if (window.amplitude) {
                    amplitude.track('Email Captured', {
                        email_domain: email.split('@')[1],
                        score: result?.total_ats_score
                    });
                }

                if (typeof gtag !== 'undefined') {
                    gtag('event', 'generate_lead', {
                        'event_category': 'ATS_Scanner',
                        'event_label': email
                    });
                }

                setEmailSent(true);
                alert('Full report will be sent to: ' + email);
            };

            const getScoreGrade = (score) => {
                if (score >= 90) return 'Excellent';
                if (score >= 80) return 'Good';
                if (score >= 70) return 'Moderate';
                return 'Needs Work';
            };

            const getCredibilityLabel = (score) => {
                if (score >= 90) return { label: 'Highly Credible', color: 'high' };
                if (score >= 80) return { label: 'Credible', color: 'high' };
                if (score >= 70) return { label: 'Moderately Credible', color: 'moderate' };
                if (score >= 60) return { label: 'Questionable Credibility', color: 'moderate' };
                return { label: 'Low Credibility', color: 'low' };
            };

            const getSemanticColor = (positionScore) => {
                if (positionScore >= -1.5 && positionScore <= 1.5) return 'green';
                if (Math.abs(positionScore) <= 3.5) return 'orange';
                return 'red';
            };

            const getPositionLabel = (positionScore) => {
                if (positionScore < -3.5) return 'Severely Under-positioned';
                if (positionScore < -1.5) return 'Moderately Under-positioned';
                if (positionScore < 0) return 'Slightly Under-positioned';
                if (positionScore === 0) return 'Perfectly Positioned';
                if (positionScore <= 1.5) return 'Slightly Over-positioned';
                if (positionScore <= 3.5) return 'Moderately Over-positioned';
                return 'Severely Over-positioned';
            };

            const getScalePosition = (positionScore) => ((positionScore + 5) / 10) * 100;

            const getRiskBadgeClass = (riskLevel) => {
                if (!riskLevel) return 'risk-medium';
                const level = riskLevel.toLowerCase();
                if (level === 'low') return 'risk-low';
                if (level === 'high') return 'risk-high';
                return 'risk-medium';
            };

            const getRoleMatchDisclaimer = (roleMatches, atsScore, positionScore) => {
                if (!roleMatches || roleMatches.length === 0) return null;
                
                const strongMatches = roleMatches.filter(m => m.match_percentage >= 80);
                const strongMatchCount = strongMatches.length;
                const isPositionedOutsideRange = Math.abs(positionScore) > 1.5;
                const isLowAts = atsScore < 70;
                
                if (strongMatchCount === 0) {
                    return {
                        type: 'critical',
                        title: 'CRITICAL: No strong role matches detected',
                        message: `Your ATS score (${atsScore}) and positioning score (${positionScore > 0 ? '+' : ''}${positionScore}) are directly limiting your role matches.`,
                        actions: [
                            'Replace weak verbs ("assisted" → "managed" where accurate)',
                            'Add quantified results to bullets without metrics',
                            'Review the "Missing Keywords" section below'
                        ],
                        callToAction: 'Start with "Immediate Fixes" at the bottom of this report'
                    };
                }
                
                if (strongMatchCount === 1) {
                    if (isLowAts || isPositionedOutsideRange) {
                        const isOverPositioned = positionScore > 1.5;
                        const positionAdvice = isOverPositioned 
                            ? 'Your over-positioning score suggests your language may be inflated for your level.'
                            : positionScore < -1.5 
                                ? 'Your under-positioning score suggests your language sounds junior for your level.'
                                : 'Your ATS score indicates missing keywords and weak quantification.';
                        
                        return {
                            type: 'warning',
                            title: '⚠️ You have 1 strong role match. Aim for 2-3.',
                            message: `${positionAdvice} This is limiting you to only 1 strong match.`,
                            actions: [
                                isOverPositioned ? 'Review the "potential_inflation" flags' : 'Replace weak verbs with stronger alternatives',
                                isOverPositioned ? 'Dial back ownership claims where accuracy allows' : 'Add quantified results to bullets',
                                'Add keywords from adjacent roles to broaden your appeal'
                            ],
                            callToAction: 'Aim for 2-3 roles above 80% for better job search breadth'
                        };
                    } else {
                        return {
                            type: 'suggestion',
                            title: '📌 You have 1 strong role match. Aim for 2-3.',
                            message: 'Your resume is well-positioned, but you are currently only competitive for 1 role.',
                            actions: [
                                'Add keywords from adjacent roles',
                                'Tailor your resume to a second target role',
                                'Strengthen the 2nd and 3rd bullet in each role section'
                            ],
                            callToAction: 'Aim for 2-3 roles above 80% to keep your options open'
                        };
                    }
                }
                return null;
            };

            const getPdfHealthScore = () => {
                if (!resumePdfHealth?.issues) return null;
                const issues = resumePdfHealth.issues;
                let score = 100;
                for (const issue of issues) {
                    if (issue.severity === 'high') score -= 15;
                    else if (issue.severity === 'medium') score -= 8;
                    else if (issue.severity === 'low') score -= 3;
                }
                return Math.max(0, Math.min(100, score));
            };

                const score = getPdfHealthScore();
                return score !== null && score < 70;

                if (score >= 60) return 'Poor';
                return 'Critical';

                const score = getPdfHealthScore();

                                    <div className="v8-section">
                                        <div className="results-section">
                                            <h3>🌿 Bloom's Taxonomy Analysis</h3>
                                            <div className="bloom-stats">
                                                <div className="bloom-stat">
                                                    <div className="bloom-stat-label">Avg Bloom Level</div>
                                                    <div className="bloom-stat-value">{result.bloom_analysis.average_bloom_level}</div>
                                                </div>
                                                <div className="bloom-stat">
                                                    <div className="bloom-stat-label">Expected Level</div>
                                                    <div className="bloom-stat-value">{result.bloom_analysis.expected_bloom_level}</div>
                                                </div>
                                                <div className="bloom-stat">
                                                    <div className="bloom-stat-label">Gap</div>
                                                    <div className="bloom-stat-value" style={{ color: result.bloom_analysis.bloom_gap > 0 ? '#ef4444' : result.bloom_analysis.bloom_gap < 0 ? '#f59e0b' : '#10b981' }}>
                                                        {result.bloom_analysis.bloom_gap > 0 ? '+' : ''}{result.bloom_analysis.bloom_gap}
                                                    </div>
                                                </div>
                                                <div className="bloom-stat">
                                                    <div className="bloom-stat-label">Assessment</div>
                                                    <div className="bloom-stat-value" style={{ fontSize: '14px' }}>{result.bloom_analysis.bloom_assessment}</div>
                                                </div>
                                            </div>
                                            
                                            {result.bloom_analysis.bullets_by_level && result.bloom_analysis.bullets_by_level.length > 0 && (
                                                <div className="bullets-by-level">
                                                    <strong>Bullets by Cognitive Level:</strong>
                                                    {result.bloom_analysis.bullets_by_level.map((item, idx) => (
                                                        <div key={idx} style={{ marginTop: '8px', fontSize: '13px' }}>
                                                            <span className={`level-badge level-${item.level}`}>Level {item.level}</span>
                                                            <span>{item.count} bullet{item.count !== 1 ? 's' : ''}</span>
                                                            {item.example && <span style={{ color: '#6b7280', marginLeft: '10px' }}>— "{item.example.substring(0, 60)}..."</span>}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}

                                            {result.bloom_analysis.flags?.length > 0 && (
                                                <div style={{ marginTop: '15px' }}>
                                                    {result.bloom_analysis.flags.map((flag, idx) => (
                                                        <div key={idx} className="flag-item">
                                                            <strong>⚠️ {flag.type?.replace('_', ' ').toUpperCase()}</strong>
                                                            <div>{flag.issue}</div>
                                                            <div className="flag-suggestion">💡 {flag.suggestion}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {result.grammar_issues && result.grammar_issues.length > 0 && (
                                    <div className="v8-section">
                                        <div className="results-section">
                                            <h3>📝 Grammar & Spelling Issues</h3>
                                            {result.grammar_issues.map((issue, idx) => (
                                                <div key={idx} className="grammar-item">
                                                    <div className="error-type" style={{ color: issue.error_type === 'spelling' ? '#ef4444' : issue.error_type === 'grammar' ? '#f59e0b' : '#3b82f6' }}>
                                                        {issue.error_type.toUpperCase()}
                                                    </div>
                                                    <div className="original">"{issue.original_text}"</div>
                                                    <div style={{ fontSize: '12px', marginTop: '5px' }}>❌ {issue.issue}</div>
                                                    <div className="suggestion">✅ {issue.suggestion}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {result.missing_tools && result.missing_tools.length > 0 && (
                                    <div className="v8-section">
                                        <div className="results-section">
                                            <h3>🔧 Missing Tools Detected</h3>
                                            {result.missing_tools.map((tool, idx) => (
                                                <div key={idx} className="missing-tool-item">
                                                    <strong>{tool.tool_name}</strong> <span style={{ color: '#6b7280' }}>({tool.category})</span>
                                                    <div className="flag-suggestion">💡 {tool.suggestion}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {result.weak_metrics_details && result.weak_metrics_details.length > 0 && (
                                    <div className="v8-section">
                                        <div className="results-section">
                                            <h3>📊 Weak Metrics - Need Improvement</h3>
                                            {result.weak_metrics_details.map((metric, idx) => (
                                                <div key={idx} className="weak-metric-item" style={{ borderLeftColor: '#ef4444' }}>
                                                    <div className="original">"{metric.bullet_text}"</div>
                                                    <div style={{ fontSize: '12px', marginTop: '5px' }}>❌ {metric.reason}</div>
                                                    <div className="suggestion">✅ {metric.fix}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {result.suggested_rewrites && result.suggested_rewrites.length > 0 && (
                                    <div className="v8-section">
                                        <div className="results-section">
                                            <h3>✏️ Suggested Rewrites</h3>
                                            {result.suggested_rewrites.map((rewrite, idx) => (
                                                <div key={idx} className="rewrite-item">
                                                    <div><strong>Original:</strong> "{rewrite.original}"</div>
                                                    <div style={{ marginTop: '8px' }}>❌ {rewrite.issue}</div>
                                                    <div style={{ marginTop: '8px', color: '#10b981' }}><strong>Suggested:</strong> "{rewrite.suggested_rewrite}"</div>
                                                    <div style={{ marginTop: '5px', fontSize: '12px', color: '#6b7280' }}>💡 {rewrite.reason}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                <div className="results-grid">
                                    <div className="results-section">
                                        <h3>✅ What's Working Well</h3>
                                        {result.strengths?.length > 0 ? (
                                            <ul className="strengths-list">
                                                {result.strengths.map((strength, idx) => (<li key={idx}>{strength}</li>))}
                                            </ul>
                                        ) : (<p>No strengths identified</p>)}

                                        {result.market_positioning && (
                                            <>
                                                <h3 style={{ marginTop: '20px' }}>📊 Market Positioning</h3>
                                                <p><strong>Level:</strong> {result.market_positioning.level}</p>
                                                <p><strong>Assessment:</strong> {result.market_positioning.assessment}</p>
                                            </>
                                        )}

                                        {result.missing_keywords?.length > 0 && (
                                            <>
                                                <h3 style={{ marginTop: '20px' }}>🔍 Missing Keywords</h3>
                                                <ul className="missing-keywords-list">
                                                    {result.missing_keywords.map((keyword, idx) => (<li key={idx}>{keyword}</li>))}
                                                </ul>
                                            </>
                                        )}

                                        {result.role_adjustment_note && (
                                            <div style={{ marginTop: '15px', padding: '10px', background: '#e0f2fe', borderRadius: '8px', fontSize: '13px' }}>
                                                ℹ️ {result.role_adjustment_note}
                                            </div>
                                        )}
                                    </div>

                                    <div className="results-section">
                                        <h3>🎯 Role Match Scores</h3>
                                        {result.role_match?.length > 0 ? (
                                            <>
                                                {result.role_match.map((role, idx) => (
                                                    <div key={idx} className="role-match-item">
                                                        <span>{role.role}</span>
                                                        <span className={role.match_percentage >= 80 ? "match-strong" : "match-percentage"}>
                                                            {role.match_percentage}%
                                                        </span>
                                                    </div>
                                                ))}
                                                
                                                {(() => {
                                                    const disclaimer = getRoleMatchDisclaimer(
                                                        result.role_match, 
                                                        result.total_ats_score, 
                                                        result.semantic_analysis?.position_score || 0
                                                    );
                                                    if (disclaimer) {
                                                        return (
                                                            <div className={`disclaimer-box ${disclaimer.type}`}>
                                                                <strong>{disclaimer.title}</strong><br/><br/>
                                                                <p>{disclaimer.message}</p>
                                                                <ul style={{ marginTop: '10px', marginLeft: '20px' }}>
                                                                    {disclaimer.actions.map((action, i) => (<li key={i}>{action}</li>))}
                                                                </ul>
                                                                <p style={{ marginTop: '10px', fontWeight: 'bold' }}>→ {disclaimer.callToAction}</p>
                                                            </div>
                                                        );
                                                    }
                                                    return null;
                                                })()}
                                            </>
                                        ) : (<p>No role matches identified</p>)}

                                        {result.immediate_fixes?.length > 0 && (
                                            <>
                                                <h3 style={{ marginTop: '20px' }}>🔧 Immediate Fixes</h3>
                                                <ul>
                                                    {result.immediate_fixes.map((fix, idx) => (<li key={idx} style={{ marginBottom: '10px' }}>{fix}</li>))}
                                                </ul>
                                            </>
                                        )}
                                    </div>
                                </div>

                                {result.all_issues?.length > 0 && (
                                    <div className="results-section" style={{ marginTop: '20px' }}>
                                        <h3>📋 All Identified Issues ({result.all_issues.length})</h3>
                                        <table className="issues-table">
                                            <thead><tr><th>Priority</th><th>Issue</th><th>Location</th><th>How to Fix</th></tr></thead>
                                            <tbody>
                                                {result.all_issues.map((issue, idx) => (
                                                    <tr key={idx}>
                                                        <td className={`priority-${issue.priority?.toLowerCase() || 'medium'}`}>{issue.priority || 'Medium'}</td>
                                                        <td><strong>{issue.issue}</strong></td>
                                                        <td><small style={{ color: '#6b7280' }}>{issue.location || 'General'}</small></td>
                                                        <td>{issue.fix || issue.suggestion || 'Review and improve'}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                {result.metric_quality_breakdown && (
                                    <div className="results-section" style={{ marginTop: '20px' }}>
                                        <h3>📊 Metric Quality Breakdown</h3>
                                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '15px', textAlign: 'center' }}>
                                            <div>
                                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#ef4444' }}>{result.metric_quality_breakdown.weak_count || 0}</div>
                                                <div style={{ fontSize: '12px', color: '#6b7280' }}>Weak Metrics</div>
                                            </div>
                                            <div>
                                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#f59e0b' }}>{result.metric_quality_breakdown.good_count || 0}</div>
                                                <div style={{ fontSize: '12px', color: '#6b7280' }}>Good Metrics</div>
                                            </div>
                                            <div>
                                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: '#10b981' }}>{result.metric_quality_breakdown.strong_count || 0}</div>
                                                <div style={{ fontSize: '12px', color: '#6b7280' }}>Strong Metrics</div>
                                            </div>
                                        </div>
                                        <div style={{ marginTop: '15px', textAlign: 'center', fontSize: '13px', color: '#6b7280' }}>
                                            Overall Quality Score: {result.metric_quality_breakdown.overall_score}/100
                                        </div>
                                    </div>
                                )}

                                {!isPdfHealthCritical() && renderPdfHealthSection(false)}

                                {result.breakdown && (
                                    <div className="results-section" style={{ marginTop: '20px' }}>
                                        <h3>📊 Score Breakdown</h3>
                                        <table className="issues-table">
                                            <thead><tr><th>Category</th><th>Score</th><th>Max</th></tr></thead>
                                            <tbody>
                                                <tr><td>Header & Contact</td><td>{result.breakdown.header_contact || 0}</td><td>10</td></tr>
                                                <tr><td>Keyword Density</td><td>{result.breakdown.keyword_density || 0}</td><td>20</td></tr>
                                                <tr><td>Quantified Results</td><td>{result.breakdown.quantified_results || 0}</td><td>20</td></tr>
                                                <tr><td>Action Verbs</td><td>{result.breakdown.action_verbs || 0}</td><td>15</td></tr>
                                                <tr><td>Formatting & Structure</td><td>{result.breakdown.formatting_structure || 0}</td><td>10</td></tr>
                                                <tr><td>Skills Section</td><td>{result.breakdown.skills_section || 0}</td><td>10</td></tr>
                                                <tr><td>Length & Brevity</td><td>{result.breakdown.length_brevity || 0}</td><td>5</td></tr>
                                                <tr><td>Publications & Projects</td><td>{result.breakdown.publications_projects || 0}</td><td>5</td></tr>
                                                {result.breakdown.recruiter_scan_penalty !== undefined && <tr><td>Recruiter Scan Penalty</td><td>{result.breakdown.recruiter_scan_penalty}</td><td>0</td></tr>}
                                                {result.breakdown.buzzword_repetition_penalty !== undefined && <tr><td>Buzzword/Repetition Penalty</td><td>{result.breakdown.buzzword_repetition_penalty}</td><td>0</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                )}

                                <div className="email-capture">
                                    <h3>📧 Get Your Full Report</h3>
                                    <p>Enter your email to receive a detailed PDF with all findings, personalized recommendations, and a complete action plan.</p>
                                    {!emailSent ? (
                                        <div className="email-input">
                                            <input type="email" placeholder="your.email@example.com" value={email} onChange={(e) => setEmail(e.target.value)} />
                                            <button onClick={handleEmailSubmit}>Send Full Report</button>
                                        </div>
                                    ) : (<p style={{ color: '#10b981', fontWeight: 'bold' }}>✅ Full report will be sent to {email}</p>)}
                                </div>

                                <button 
                                    onClick={() => {
                                        setResult(null);
                                        setResumeText('');
                                        setResumeFileName('');
                                        setResumeParseError(null);
                                        setResumePdfHealth(null);
                                        setExtractionMethod(null);
                                        setAzureHealth(null);
                                        setStructuredResume(null);
                                        setJobDescriptionText('');
                                        setJobDescriptionFileName('');
                                        setJobDescriptionParseError(null);
                                        setEmail('');
                                        setEmailSent(false);
                                        setShowCredibilityExplainer(false);
                                        setShowSemanticExplainer(false);
                                        setShowPositionExplainer(false);
                                        setShowCredibilityShortExplainer(false);
                                        setAnalysisStage('');
                                    }}
                                    style={{ marginTop: '30px', background: '#6b7280', width: '100%', padding: '16px', borderRadius: '8px', border: 'none', color: 'white', fontWeight: '600', cursor: 'pointer' }}
                                >
                                    Scan Another Resume
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="back-link">
                        <a href="https://jkh-consulting.keron62.workers.dev/index.html">← Back to JKH Consulting</a>
                    </div>
                    
                    <div className="privacy-note">
                        🔒 Your resume is sent to a secure proxy for analysis. No data is stored permanently. Analytics help us improve the tool.
                    </div>
                </div>
            );
        }

        ReactDOM.render(<ATSScanner />, document.getElementById('root'));
    </script>
</body>
</html>
